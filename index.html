/* ---------- Spaced repetition (Review Realm) ---------- */
// Question ids are stable strings derived from their fixed position in the
// track's data (subject:level:index) since arrays are never reordered.
function questionId(subjectKey, levelIdx, qIdx){ return `${subjectKey}:${levelIdx}:${qIdx}`; }
function findQuestionById(track, id){
  const [subjectKey, levelIdx, qIdx] = id.split(':');
  const levels = track.subjects[subjectKey].levels;
  const li = parseInt(levelIdx), qi = parseInt(qIdx);
  if(!levels[li] || !levels[li][qi]) return null;
  return { q: levels[li][qi], subject: subjectKey, levelIdx: li };
}
function addIdsToTrackQuestions(track){
  // idempotent: tags every question object with its own stable id, once
  Object.keys(track.subjects).forEach(subjectKey=>{
    track.subjects[subjectKey].levels.forEach((qs, li)=>{
      qs.forEach((q, qi)=>{ if(!q._id) q._id = questionId(subjectKey, li, qi); });
    });
  });
}
function recordMiss(p, track, subjectKey, questionObj){
  if(!questionObj._id) return;
  const today = todayStr();
  const existing = p.reviewQueue.find(item=>item.id===questionObj._id);
  if(existing){
    existing.missCount += 1;
    existing.dueDate = today; // due again soon since they missed it again
  } else {
    const due = new Date(); due.setDate(due.getDate()+2);
    p.reviewQueue.push({ id: questionObj._id, subject: subjectKey, dueDate: due.toISOString().slice(0,10), missCount:1 });
  }
  if(p.reviewQueue.length>60) p.reviewQueue.shift();
}
function reviewsDueToday(p){
  const today = todayStr();
  return p.reviewQueue.filter(item=>item.dueDate<=today);
}

/* ---------- Day-over-day enemy scaling ---------- */
// Counts distinct calendar days this explorer has played (not a "streak" —
// it never resets, so enemies keep getting tougher across the whole summer).
/* If more than 1 calendar day has passed since the player was last active,
   their streak is broken — this is checked proactively (dashboard render,
   start of any play session) rather than waiting for them to win a battle,
   so a broken streak shows immediately instead of lagging a session behind. */
function checkStreakBreak(p){
  if(p.lastActiveDate){
    const gap = daysBetween(p.lastActiveDate, todayStr());
    if(gap > 1) p.streak = 0;
  }
}

function registerDayPlayed(p){
  checkStreakBreak(p);
  const today = todayStr();
  if(p.lastDayCounted !== today){
    p.totalDaysPlayed = (p.totalDaysPlayed||0) + 1;
    p.lastDayCounted = today;
  }
  // Capture a "start of day" snapshot the first time this player does
  // anything today, before any of today's progress is applied. This is
  // what "Reset Today" rolls back to, so it can undo EVERYTHING gained
  // today (XP, badges, streak, stats) — not just HP/completions.
  if(p.dayStartSnapshotDate !== today){
    p.dayStartSnapshot = snapshotProfile(p);
    p.dayStartSnapshotDate = today;
  }
}

// Fields deliberately left OUT of the snapshot/rollback: character identity
// (name/avatar/etc. — editing your character shouldn't be undone by a daily
// reset), and the today-asked-question tracker + HP (those are handled
// separately by resetToday itself, with their own intended behavior).
const SNAPSHOT_EXCLUDE = ['name','avatarEmoji','avatarColor','bodyShape','weapon','grade','createdAt',
  'todayAskedIds','todayAskedDate','dayStartSnapshot','dayStartSnapshotDate','hp','hpDate'];
function snapshotProfile(p){
  const clone = JSON.parse(JSON.stringify(p));
  SNAPSHOT_EXCLUDE.forEach(k=> delete clone[k]);
  return clone;
}

/* Lets a player start today completely over: this fully reverts XP, badges,
   streak, subject stats, earnings, and every other bit of progress made
   today back to how things stood before they played — restoring the
   start-of-day snapshot. Character identity (name/avatar/build/weapon) is
   untouched. HP refills fresh. Deliberately does NOT clear
   todayAskedIds/todayAskedDate, so the question picker keeps avoiding
   whatever was already shown today, guaranteeing different questions. */
function resetToday(p){
  const today = todayStr();
  if(p.dayStartSnapshot && p.dayStartSnapshotDate === today){
    const snap = p.dayStartSnapshot;
    Object.keys(snap).forEach(k=>{ p[k] = snap[k]; });
  } else {
    // Fallback if no snapshot is available for some reason — still clear
    // today's gating state so the day isn't stuck.
    p.completedTodaySubjects = [];
    if(p.bossLastCompletedDate === today) p.bossLastCompletedDate = null;
    p.dailyLog[today] = {
      subjects:{math:{correct:0,total:0},science:{correct:0,total:0},history:{correct:0,total:0},reading:{correct:0,total:0},writing:{correct:0,total:0}},
      bossesDefeated:[], finalBossResult:null, xpEarned:0, rewardTiersClaimed:[]
    };
  }
  p.hp = PLAYER_MAX_HP; p.hpDate = today;
}
const MAX_DIFFICULTY_DAY = 15; // difficulty ramps up until day 15, then holds steady
function dayDifficultyFactor(p){
  return Math.min(MAX_DIFFICULTY_DAY, Math.max(0, (p.totalDaysPlayed||1) - 1));
}
// Kept intentionally gentle now — the actual pacing (6-10 hits to defeat a
// boss, 10-12 wrong answers before HP hits 0) is controlled directly in
// startBattle() via a per-battle random hit target, not by these alone.
function scaledBossMaxHP(p){ return BOSS_MAX_HP + Math.round(dayDifficultyFactor(p) * 2); }
function scaledWrongDamage(p){ return Math.round(WRONG_DAMAGE + dayDifficultyFactor(p) * 0.3); }

/* ---------- Persistent daily HP ---------- */
// HP now carries across every battle within the same day (not reset per
// battle) — it only refills to full when the calendar date changes.
function getDailyHP(p){
  const today = todayStr();
  if(p.hpDate !== today || p.hp===null || p.hp===undefined){
    p.hp = PLAYER_MAX_HP;
    p.hpDate = today;
  }
  return p.hp;
}
function setDailyHP(p, value){
  p.hp = Math.max(0, Math.min(PLAYER_MAX_HP, value));
  p.hpDate = todayStr();
}

/* ---------- Adaptive performance momentum ---------- */
// A light rolling signal (not a grade/ability label — never shown on screen)
// that nudges the weighted question mix toward harder or easier content
// based on how the last few answers went, layered on top of the track's
// base curriculum mix.
function updateMomentum(p, subjectKey, correct){
  const cur = p.subjectMomentum[subjectKey] || 0;
  const next = correct ? Math.min(4, cur+1) : Math.max(-4, cur-1);
  p.subjectMomentum[subjectKey] = next;
}
function momentumAdjustedWeights(baseWeights, momentum){
  const n = baseWeights.length;
  if(n<2) return baseWeights;
  const w = baseWeights.slice();
  const shift = Math.min(0.5, Math.abs(momentum) * 0.08); // up to 40% of mass shifted at momentum=±5
  if(momentum>=2){
    // shift mass from the lowest tier toward the highest tier
    const move = Math.min(w[0], shift);
    w[0] -= move; w[n-1] += move;
  } else if(momentum<=-2){
    const move = Math.min(w[n-1], shift);
    w[n-1] -= move; w[0] += move;
  }
  return w;
}

function todayLogEntry(p){
  const today = todayStr();
  if(!p.dailyLog[today]){
    p.dailyLog[today] = {
      subjects:{math:{correct:0,total:0},science:{correct:0,total:0},history:{correct:0,total:0},reading:{correct:0,total:0},writing:{correct:0,total:0}},
      bossesDefeated:[], finalBossResult:null, xpEarned:0, rewardTiersClaimed:[]
    };
  }
  if(!p.dailyLog[today].rewardTiersClaimed) p.dailyLog[today].rewardTiersClaimed = [];
  return p.dailyLog[today];
}

function pruneDailyLog(p, keepDays=21){
  const keys = Object.keys(p.dailyLog).sort();
  while(keys.length>keepDays){ delete p.dailyLog[keys.shift()]; }
}

const EARNING_TYPES = [
  {id:'ipad', emoji:'📱', label:'iPad Time'},
  {id:'tv', emoji:'📺', label:'TV Time'},
  {id:'free', emoji:'🎈', label:'Free Time'}
];
function grantEarning(p, minutes, reason){
  const type = EARNING_TYPES[Math.floor(Math.random()*EARNING_TYPES.length)];
  p.earnings[type.id] += minutes;
  p.earningsLog.unshift({ date: todayStr(), type: type.id, minutes, reason });
  if(p.earningsLog.length>40) p.earningsLog.length = 40;
  return type;
}

/* Rewards are now earned from the day's AGGREGATE XP total, not handed out
   after every single battle — crossing each XP milestone for the day grants
   a reward exactly once. */
const XP_REWARD_TIERS = [
  {xp:100, minutes:10},
  {xp:250, minutes:15},
  {xp:450, minutes:15},
  {xp:700, minutes:20},
  {xp:1000, minutes:25}
];
function nextXPRewardTier(p){
  const log = todayLogEntry(p);
  return XP_REWARD_TIERS.find(t=>!log.rewardTiersClaimed.includes(t.xp)) || null;
}

const DAILY_XP_CAP_FULL = 1000;   // only reachable by defeating all 5 realms + the Final Boss the same day
const DAILY_XP_CAP_PARTIAL = 700; // the ceiling for normal play without full completion
/* "Full quest" = every subject boss AND the Final Boss defeated on today's date. */
function isFullQuestCompletedToday(p){
  const log = todayLogEntry(p);
  return p.completedTodaySubjects.length >= 5 && log.finalBossResult === 'won';
}
/* All XP gains funnel through here so the daily cap is enforced in exactly
   one place, no matter which activity (battle, Final Boss, Review,
   Practice) earned it. Returns the amount actually awarded (may be less
   than requested, or 0, if the day's cap has already been reached) so
   callers can show a "hit your daily cap" message if they want to. */
function awardXP(p, amount){
  if(amount<=0) return 0;
  const log = todayLogEntry(p);
  const cap = isFullQuestCompletedToday(p) ? DAILY_XP_CAP_FULL : DAILY_XP_CAP_PARTIAL;
  const remaining = Math.max(0, cap - log.xpEarned);
  const granted = Math.min(amount, remaining);
  p.xpTotal += granted;
  p.gearWallet = (p.gearWallet||0) + granted;
  log.xpEarned += granted;
  return granted;
}
/* Called right after the Final Boss is defeated: tops today's XP up to the
   full 1000 if it isn't already there, so completing the whole quest always
   guarantees exactly 1000 XP for the day, regardless of how the individual
   battles scored. */
function topUpFullQuestXP(p){
  const log = todayLogEntry(p);
  if(log.xpEarned < DAILY_XP_CAP_FULL){
    const bonus = DAILY_XP_CAP_FULL - log.xpEarned;
    p.xpTotal += bonus;
    log.xpEarned += bonus;
    return bonus;
  }
  return 0;
}

function checkDailyXPRewards(p){
  const log = todayLogEntry(p);
  const earned = [];
  XP_REWARD_TIERS.forEach(tier=>{
    if(log.xpEarned >= tier.xp && !log.rewardTiersClaimed.includes(tier.xp)){
      log.rewardTiersClaimed.push(tier.xp);
      const type = grantEarning(p, tier.minutes, `Reached ${tier.xp} XP today!`);
      earned.push({ type, minutes: tier.minutes, xp: tier.xp });
    }
  });
  return earned;
}

function firebaseHandlesKey(key){

const Store = (function(){
  const hasClaudeStorage = (typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function');
  return {
    mode: firebaseReady ? 'firebase-shared' : (hasClaudeStorage ? 'claude-artifact' : 'local-browser'),
    async get(key){
      if(firebaseHandlesKey(key)){
        try{
          const snap = await firebaseDb.ref(key).once('value');
          const val = snap.val();
          if(val===null || val===undefined) return null;
          return typeof val === 'string' ? val : JSON.stringify(val);
        }catch(e){ /* fall through to local as a safety net */ }
      }
      if(hasClaudeStorage){
        try{
          const res = await window.storage.get(key, false);
          return (res && res.value) ? res.value : null;
        }catch(e){ return null; }
      } else {
        try{ return window.localStorage.getItem('segw:'+key); }catch(e){ return null; }
      }
    },
    async set(key, value){
      if(firebaseHandlesKey(key)){
        try{ await firebaseDb.ref(key).set(value); return true; }catch(e){ /* fall through */ }
      }
      if(hasClaudeStorage){
        try{ await window.storage.set(key, value, false); return true; }catch(e){ return false; }
      } else {
        try{ window.localStorage.setItem('segw:'+key, value); return true; }catch(e){ return false; }
      }
    },
    async delete(key){
      if(firebaseHandlesKey(key)){
        try{ await firebaseDb.ref(key).remove(); return true; }catch(e){ /* fall through */ }
      }
      if(hasClaudeStorage){
        try{ await window.storage.delete(key, false); return true; }catch(e){ return false; }
      } else {
        try{ window.localStorage.removeItem('segw:'+key); return true; }catch(e){ return false; }
      }
    }
  };
})();

/* =========================================================================
   FORWARD-COMPATIBLE PROFILE LOADING
   Whenever this app is updated with new features (new profile fields, new
   tracked stats, etc.), a returning player's saved data won't have those
   new fields yet. Rather than crash or silently drop old progress, every
   loaded profile is deep-merged onto a fresh defaultProfile(): any field
   the saved profile already has is kept exactly as-is (preserving real
   progress), and any field that's new since their last visit is filled in
   with its default value automatically. Arrays (badges, reviewQueue, etc.)
   are taken as-is from the save rather than merged item-by-item.
   Going forward: purely additive schema changes (new fields) need NO extra
   migration code — just add the field to defaultProfile() above. Only a
   field being renamed or changing shape would need a manual migration step.
   ========================================================================= */
function deepMergeDefaults(saved, defaults){
  if(typeof defaults !== 'object' || defaults===null || Array.isArray(defaults)){
    return saved!==undefined ? saved : defaults;
  }
  const result = {};
  for(const key in defaults){
    result[key] = (saved && Object.prototype.hasOwnProperty.call(saved,key))
      ? deepMergeDefaults(saved[key], defaults[key])
      : defaults[key];
  }
  if(saved && typeof saved==='object' && !Array.isArray(saved)){
    for(const key in saved){ if(!(key in result)) result[key] = saved[key]; }
  }
  return result;
}

async function loadProfile(playerId){
  const raw = await Store.get('profile:'+playerId);
  if(raw){
    try{
      const saved = JSON.parse(raw);
      return deepMergeDefaults(saved, defaultProfile(saved.grade));
    }catch(e){ /* corrupted save — fall through to a fresh profile */ }
  }
  return defaultProfile();
}

/* =========================================================================
   SIBLING CHALLENGES
   A challenge is a shared object (not nested in either player's profile)
   stored in the top-level 'challenges' collection, since it must be
   visible to both the initiator and the recipient regardless of which
   profile is currently active. The XP stake is drawn from gearWallet, not
   xpTotal — losing a friendly challenge should never demote a player's
   displayed rank or leaderboard position, the same reasoning that led to
   gearWallet existing in the first place for gear purchases.
   ========================================================================= */
const CHALLENGE_STAKE = 100;
const CHALLENGE_QUESTION_COUNT = 5;

function challengeInvolvesPlayer(c, playerId){ return c.fromPlayerId===playerId || c.toPlayerId===playerId; }
function activeChallengesForPlayer(playerId){
  return state.challenges.filter(c => (c.status==='pending'||c.status==='active') && challengeInvolvesPlayer(c, playerId));
}
function playerHasActiveChallengeInSubject(playerId, subject){
  return activeChallengesForPlayer(playerId).some(c => c.subject===subject);
}

/* Up to 5 simultaneous challenges per player — one per subject, matching
   the 5 realms, so a player can have a challenge going in every subject
   at once but never two at the same time in the same subject. */
function createChallenge(fromId, toId, subject){
  if(fromId===toId) return {ok:false, reason:'You can\'t challenge yourself!'};
  if(playerHasActiveChallengeInSubject(fromId, subject)) return {ok:false, reason:'You already have a challenge going in this subject.'};
  if(playerHasActiveChallengeInSubject(toId, subject)) return {ok:false, reason:'They already have a challenge going in this subject.'};
  if(activeChallengesForPlayer(fromId).length >= 5) return {ok:false, reason:'You already have the maximum of 5 active challenges (one per subject).'};
  const challenge = {
    id: 'chal_'+Date.now()+'_'+Math.floor(Math.random()*100000),
    subject, fromPlayerId: fromId, toPlayerId: toId,
    status: 'pending', // pending -> active (accepted) -> completed
    fromScore: null, toScore: null,
    createdAt: Date.now(), resolvedAt: null, winnerId: null
  };
  state.challenges.push(challenge);
  return {ok:true, challenge};
}
function acceptChallenge(challengeId){
  const c = state.challenges.find(x=>x.id===challengeId);
  if(!c || c.status!=='pending') return {ok:false};
  c.status = 'active';
  return {ok:true};
}
function declineChallenge(challengeId){
  state.challenges = state.challenges.filter(x=>x.id!==challengeId);
  return {ok:true};
}
/* Records one player's round score. Comparison — and the whole point of
   this function's name — can only happen once BOTH scores are in, which
   itself can only happen after acceptance moved the challenge to 'active'.
   That's what enforces "must be accepted in order to compare score." */
async function submitChallengeScore(challengeId, playerId, correctCount){
  const c = state.challenges.find(x=>x.id===challengeId);
  if(!c || c.status!=='active') return null;
  if(c.fromPlayerId===playerId) c.fromScore = correctCount;
  else if(c.toPlayerId===playerId) c.toScore = correctCount;
  if(c.fromScore!==null && c.toScore!==null){
    await resolveChallenge(c);
  } else {
    await saveChallenges(state.challenges);
  }
  return c;
}
async function resolveChallenge(c){
  c.status = 'completed';
  c.resolvedAt = Date.now();
  const fromP = state.profiles[c.fromPlayerId] || await loadProfile(c.fromPlayerId);
  const toP = state.profiles[c.toPlayerId] || await loadProfile(c.toPlayerId);
  if(c.fromScore > c.toScore){
    c.winnerId = c.fromPlayerId;
    fromP.gearWallet = (fromP.gearWallet||0) + CHALLENGE_STAKE;
    toP.gearWallet = Math.max(0, (toP.gearWallet||0) - CHALLENGE_STAKE);
  } else if(c.toScore > c.fromScore){
    c.winnerId = c.toPlayerId;
    toP.gearWallet = (toP.gearWallet||0) + CHALLENGE_STAKE;
    fromP.gearWallet = Math.max(0, (fromP.gearWallet||0) - CHALLENGE_STAKE);
  } else {
    c.winnerId = 'tie'; // no stakes exchanged on a tie
  }
  state.profiles[c.fromPlayerId] = fromP;
  state.profiles[c.toPlayerId] = toP;
  await Promise.all([saveProfile(c.fromPlayerId, fromP), saveProfile(c.toPlayerId, toP), saveChallenges(state.challenges)]);
}

/* One-time migration: earlier versions of this app had exactly three fixed
   player slots ('A','B','C', one per grade). If someone's returning with
   progress saved that way and hasn't been migrated to the new dynamic
   player-list system yet, bring those three across as real players so
   nobody loses their summer's progress. */
async function migrateLegacyProfilesIfNeeded(){
  const existingIds = await loadPlayerIds();
  if(existingIds) return existingIds;
  const legacyGrades = {A:3, B:4, C:6};
  const ids = [];
  for(const legacyId of ['A','B','C']){
    const raw = await Store.get('profile:'+legacyId);
    if(raw){

        const saved = JSON.parse(raw);
        if(saved && saved.name){

          ids.push(legacyId);
        }
      }catch(e){}
    }
  }
  await Store.set('playerIds', JSON.stringify(ids));
  return ids;
}

const Sound = (function(){
  let ctx = null;
  let unlocked = false;
  let musicSchedulerId = null;
  let musicStep = 0;
  let currentZone = null;
  let currentVariantIndex = -1;

  function getCtx(){
    if(!ctx){
      const AC = window.AudioContext || window.webkitAudioContext;
      ctx = new AC();
    }
    return ctx;
  }
  function unlock(){
    if(unlocked) return;
    const c = getCtx();
    if(c.state === 'suspended') c.resume();
    unlocked = true;
  }

  function tone(freq, start, dur, type='sine', peakGain=0.18, glideTo=null){
    const c = getCtx();
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, c.currentTime + start);
    if(glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, c.currentTime + start + dur*0.9);
    gain.gain.setValueAtTime(0, c.currentTime + start);
    gain.gain.linearRampToValueAtTime(peakGain, c.currentTime + start + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + start + dur);
    osc.connect(gain).connect(c.destination);
    osc.start(c.currentTime + start);
    osc.stop(c.currentTime + start + dur + 0.05);
  }

  /* short filtered-noise burst — used for percussive "hi-hat"/"snap" hits */
  function noiseHit(start, dur, peakGain=0.12, hp=4000){
    const c = getCtx();
    const bufferSize = Math.max(1, Math.floor(c.sampleRate * dur));
    const buffer = c.createBuffer(1, bufferSize, c.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
    const src = c.createBufferSource();
    src.buffer = buffer;
    const filter = c.createBiquadFilter();
    filter.type = 'highpass'; filter.frequency.value = hp;
    const gain = c.createGain();
    gain.gain.setValueAtTime(peakGain, c.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + start + dur);
    src.connect(filter).connect(gain).connect(c.destination);
    src.start(c.currentTime + start);
  }

  /* punchy low "kick"-style thump for the beat */
  function kick(start, peakGain=0.22){
    const c = getCtx();
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, c.currentTime + start);
    osc.frequency.exponentialRampToValueAtTime(45, c.currentTime + start + 0.11);
    gain.gain.setValueAtTime(peakGain, c.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + start + 0.16);
    osc.connect(gain).connect(c.destination);
    osc.start(c.currentTime + start);
    osc.stop(c.currentTime + start + 0.2);
  }

  function click(){
    if(!SETTINGS.sfxOn) return;
    tone(680, 0, 0.05, 'square', 0.10);
  }
  function correct(){
    if(!SETTINGS.sfxOn) return;
    // bright ascending arpeggio with a snappy attack — feels like a game "ding! ding! ding!"
    tone(659.25, 0, 0.09, 'square', 0.13);
    tone(880.00, 0.06, 0.10, 'square', 0.13);
    tone(1174.66, 0.12, 0.20, 'triangle', 0.16);
    noiseHit(0.12, 0.08, 0.06, 6000);
  }
  function incorrect(){
    if(!SETTINGS.sfxOn) return;
    // punchy downward buzzer, quick — energetic rather than sad
    tone(300, 0, 0.14, 'sawtooth', 0.14, 130);
  }
  function levelUp(){
    if(!SETTINGS.sfxOn) return;
    [523.25,659.25,783.99,1046.5,1318.5].forEach((f,i)=> tone(f, i*0.07, 0.22, 'square', 0.15));
    noiseHit(0.28, 0.15, 0.08, 5000);
  }
  function badge(){
    if(!SETTINGS.sfxOn) return;
    [783.99,987.77,1174.66,1567.98,1975.5].forEach((f,i)=> tone(f, i*0.055, 0.3, 'triangle', 0.15));
    tone(2400, 0.05, 0.4, 'sine', 0.05);
  }
  function questComplete(){
    if(!SETTINGS.sfxOn) return;
    // triumphant layered chord fanfare
    [523.25,659.25,783.99].forEach(f=> tone(f, 0, 0.5, 'square', 0.11));
    [659.25,830.61,987.77].forEach(f=> tone(f, 0.18, 0.5, 'square', 0.11));
    [783.99,987.77,1174.66,1567.98].forEach(f=> tone(f, 0.36, 0.7, 'triangle', 0.14));
    for(let i=0;i<5;i++) kick(0.36 + i*0.02, 0.1);
  }
  function tick(){
    if(!SETTINGS.sfxOn) return;
    tone(950, 0, 0.045, 'square', 0.07);
  }
  function hitVillain(){
    if(!SETTINGS.sfxOn) return;
    // sword-slash feel: quick pitch-drop swoosh + a metallic clang
    tone(720, 0, 0.09, 'sawtooth', 0.13, 260);
    noiseHit(0.02, 0.07, 0.10, 8500);
  }
  function hitPlayer(){
    if(!SETTINGS.sfxOn) return;
    // low impact thud, like getting knocked back
    tone(190, 0, 0.18, 'sawtooth', 0.17, 75);
    noiseHit(0, 0.06, 0.09, 1800);
  }
  function villainDefeated(){
    if(!SETTINGS.sfxOn) return;
    // dramatic collapse: descending groan + rumble, then a triumphant sting
    tone(480, 0, 0.55, 'sawtooth', 0.16, 55);
    noiseHit(0.08, 0.35, 0.13, 2500);
    [523.25,659.25,783.99,1046.5].forEach((f,i)=> tone(f, 0.42+i*0.08, 0.32, 'triangle', 0.14));
  }
  function comboHit(){
    if(!SETTINGS.sfxOn) return;
    // punchier, brighter than a normal hit — a little reward sting for streaks
    [880,1108.73,1318.51].forEach((f,i)=> tone(f, i*0.06, 0.14, 'square', 0.11));
    noiseHit(0, 0.05, 0.08, 9000);
  }
  function heartbeat(){
    if(!SETTINGS.sfxOn) return;
    // low urgent thud-thud, used sparingly when HP is critically low
    tone(90, 0, 0.11, 'sine', 0.15, 55);
    tone(90, 0.18, 0.11, 'sine', 0.12, 50);
  }
  function relicFound(shiny){
    if(!SETTINGS.sfxOn) return;
    if(shiny){
      // extra sparkly ascending run for the rare version
      [523.25,659.25,783.99,1046.5,1318.51].forEach((f,i)=> tone(f, i*0.09, 0.3, 'triangle', 0.13));
    } else {
      [523.25,783.99,1046.5].forEach((f,i)=> tone(f, i*0.1, 0.28, 'triangle', 0.14));
    }
  }

  /* Energetic looping background beat: steady kick/hi-hat pulse + a bouncy
     arpeggiated synth riff on top, scheduled at 128 BPM. All synthesized —
     no external audio files. */
  function startAmbient(subjectKey, forceIdx){
    if(!SETTINGS.musicOn) return;
    stopAmbient();
    const zone = subjectKey || currentZone || 'math';
    const theme = ZONE_THEMES[zone] || ZONE_THEMES.math;
    const bpm = 128;
    const stepDur = 60/bpm/2; // 8th notes
    let idx = (forceIdx!==undefined && forceIdx!==null) ? forceIdx : Math.floor(Math.random()*theme.riffs.length);
    if(zone===currentZone && idx===currentVariantIndex && theme.riffs.length>1) idx = (idx+1) % theme.riffs.length;
    currentZone = zone;
    currentVariantIndex = idx;
    const riff = theme.riffs[idx];
    musicStep = 0;
    function scheduleStep(){
      if(!SETTINGS.musicOn) return;
      const beatInBar = musicStep % 8;
      if(theme.kickBeats.includes(beatInBar)) kick(0, 0.15);
      if(beatInBar % theme.hihatMod === 0) noiseHit(0, 0.04, 0.04, 7500);
      const note = riff[beatInBar];
      tone(note, 0, stepDur*0.92, 'triangle', 0.06);
      // Harmony layer — a quiet perfect-fifth above the melody note, for a
      // fuller chord-like sound instead of a single bare melodic line.
      tone(note*1.5, 0, stepDur*0.85, 'sine', 0.022);
      // Soft echo — a faint, slightly-delayed repeat of the same note,
      // giving the loop some sense of space/depth.
      tone(note, stepDur*0.55, stepDur*0.35, 'sine', 0.018);
      // Rolling bass layer — a sustained low note every 2 beats (not just
      // once per bar) gives the loop a fuller, less thin sound throughout.
      if(beatInBar%2===0) tone(riff[0]/2, 0, stepDur*1.9, 'sine', 0.05);
      musicStep++;
      musicSchedulerId = setTimeout(scheduleStep, stepDur*1000);
    }
    scheduleStep();
  }
  function stopAmbient(){
    if(musicSchedulerId) clearTimeout(musicSchedulerId);
    musicSchedulerId = null;
  }

  return { unlock, click, correct, incorrect, levelUp, badge, questComplete, tick, startAmbient, stopAmbient, hitVillain, hitPlayer, villainDefeated, comboHit, heartbeat, relicFound };
})();

// Battles can now run up to 45 minutes (Final Boss) — without this, the same
// 8-note loop would repeat for the whole fight, which is what made the music
// feel like it "never changes." This rotates to a fresh random track every
// ~90 seconds while a battle is actually in progress.
let musicRotationInterval = null;
function startMusicRotation(){
  stopMusicRotation();
  musicRotationInterval = setInterval(()=>{ if(SETTINGS.musicOn) Sound.startAmbient(); }, 90000);
}
function stopMusicRotation(){
  if(musicRotationInterval) clearInterval(musicRotationInterval);
  musicRotationInterval = null;
}

function fireConfetti(count=26){

function getTodayAskedSet(p){
  const today = todayStr();
  if(p.todayAskedDate !== today){ p.todayAskedIds = []; p.todayAskedDate = today; }
  return new Set(p.todayAskedIds);
}
function recordAskedToday(p, id){
  if(!id) return;
  const today = todayStr();
  if(p.todayAskedDate !== today){ p.todayAskedIds = []; p.todayAskedDate = today; }
  if(!p.todayAskedIds.includes(id)) p.todayAskedIds.push(id);
}

function todayStr(){ return new Date().toISOString().slice(0,10); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }

function attachHeaderEvents(){
  const changePlayerBtn = document.getElementById('changePlayerBtn');
  if(changePlayerBtn) changePlayerBtn.addEventListener('click', ()=>{
    Sound.unlock(); Sound.click();
    if(state.screen==='battle' || state.screen==='finalboss' || state.screen==='practice'){
      const ok = window.confirm('Leave now? Progress on the current activity will end.');
      if(!ok) return;
      const p = getActiveProfile();
      if(state.screen==='battle' && state.battle){ setDailyHP(p, state.battle.playerHP); saveProfile(state.activePlayerId, p); }
      if(state.screen==='finalboss' && state.finalBoss){ setDailyHP(p, state.finalBoss.playerHP); saveProfile(state.activePlayerId, p); }
      if(state.battle && state.battle.timerId) clearInterval(state.battle.timerId);
      if(state.finalBoss && state.finalBoss.timerId) clearInterval(state.finalBoss.timerId);
      if(state.practice && state.practice.timerId) clearInterval(state.practice.timerId);
      Sound.stopAmbient();
      stopMusicRotation();
    }
    state.tempAvatar = null;
    state.screen = 'pick-track';
    render();
  });
  const musicBtn = document.getElementById('musicToggleBtn');
  const sfxBtn = document.getElementById('sfxToggleBtn');
  if(musicBtn) musicBtn.addEventListener('click', async ()=>{
    SETTINGS.musicOn = !SETTINGS.musicOn;
    if(SETTINGS.musicOn){
      Sound.unlock(); Sound.startAmbient();
      if(state.screen==='battle' || state.screen==='finalboss') startMusicRotation();
    } else {
      Sound.stopAmbient(); stopMusicRotation();
    }
    await saveSettings();
    render();
  });
  if(sfxBtn) sfxBtn.addEventListener('click', async ()=>{
    SETTINGS.sfxOn = !SETTINGS.sfxOn;
    Sound.unlock();
    if(SETTINGS.sfxOn) Sound.click();
    await saveSettings();
    render();
  });
}

function gearItemById(id){ return GEAR_CATALOG.find(g=>g.id===id); }

function buyGearItem(p, itemId){
  const item = gearItemById(itemId);
  if(!item) return {ok:false, reason:'Item not found'};
  if(p.ownedGear.includes(itemId)) return {ok:false, reason:'Already owned'};
  if((p.gearWallet||0) < item.cost) return {ok:false, reason:'Not enough XP'};
  p.gearWallet -= item.cost;
  p.ownedGear.push(itemId);
  return {ok:true};
}
function sellGearItem(p, itemId){
  const item = gearItemById(itemId);
  if(!item) return {ok:false, reason:'Item not found'};
  if(!p.ownedGear.includes(itemId)) return {ok:false, reason:'Not owned'};
  const refund = Math.floor(item.cost * 0.5);
  p.ownedGear = p.ownedGear.filter(id=>id!==itemId);
  p.gearWallet = (p.gearWallet||0) + refund;
  if(p.equippedGear[item.slot] === itemId) p.equippedGear[item.slot] = null;
  return {ok:true, refund};
}
function equipGearItem(p, itemId){
  const item = gearItemById(itemId);
  if(!item || !p.ownedGear.includes(itemId)) return {ok:false};
  p.equippedGear[item.slot] = itemId;
  return {ok:true};
}
function unequipGearSlot(p, slot){
  p.equippedGear[slot] = null;
}

/* Small, position-tuned SVG icon per gear slot, tinted to the specific
   item's color. Premium ("glow") items get a soft ring accent so a shiny
   upgrade is visually obvious even at this small scale. */
function gearIconSVG(slot, color, glow){
  const shapes = {

    gloves: `<circle r="4.5" fill="${color}" stroke="#1c1533" stroke-width="0.6"/><rect x="-1.8" y="-7" width="3.6" height="4.5" rx="1.3" fill="${color}" stroke="#1c1533" stroke-width="0.6"/>`,

  };
  const glowRing = glow ? `<circle r="11" fill="none" stroke="${color}" stroke-width="1" opacity="0.65" class="node-ring-pulse"/>` : '';
  return `${glowRing}${shapes[slot]||''}`;
}

const SUBJECT_ORDER = ['math','science','history','reading','writing'];
function isSubjectDefeatedToday(p, key){
  return p.completedTodaySubjects.includes(key) && p.lastActiveDayForFullQuest===todayStr();
}
function isFinalBossDefeatedToday(p){
  return p.bossLastCompletedDate===todayStr();
}
/* Index of the node (0-4 subject, 5 = final boss, 6 = all done) the player is
   currently standing at / should tackle next. */
function currentFrontierIndex(p){
  // Order-independent: subjects can be tackled in any sequence. This just
  // counts how many of the 5 are done today (0-5), used to (a) position the
  // avatar visually along the trail, and (b) gate the Final Boss behind
  // "all 5 done" without caring which order they were completed in.
  const defeatedCount = SUBJECT_ORDER.filter(k=>isSubjectDefeatedToday(p,k)).length;
  if(defeatedCount < 5) return defeatedCount;
  if(!isFinalBossDefeatedToday(p)) return 5;
  return 6;
}

function terrainForLocation(key, x, y, color){
  // Background terrain silhouette unique to each realm, drawn behind its node
  // so the map reads like distinct fantasy locations rather than plain dots.
  const terrains = {

  };

// Smooth winding trail between waypoints (cubic-bezier "S" curves) instead
// of straight segments — reads far more like an adventure-game world map.
function buildSmoothPath(positions){
  let path = `M ${positions[0][0]} ${positions[0][1]}`;
  for(let i=0;i<positions.length-1;i++){
    const [x1,y1] = positions[i];
    const [x2,y2] = positions[i+1];
    const midX = x1 + (x2-x1)/2;
    path += ` C ${midX},${y1} ${midX},${y2} ${x2},${y2}`;
  }
  return path;
}

/* =========================================================================
   LOOT / RELIC SYSTEM
   Defeating a subject boss for the FIRST TIME EVER (not daily — this is a
   permanent, one-time-per-subject reward) drops a themed relic. There's a
   small chance it's a rare "shiny" version instead of the normal one.
   ========================================================================= */
const SHINY_CHANCE = 0.12;
const RELIC_DEFS = {
  math: { name:'Compass of Numbers', flavor:'Always points toward the correct answer... probably.', color:'#FF9F1C' },
  science: { name:'Beaker of Discovery', flavor:'Bubbles mysteriously when you\'re close to a breakthrough.', color:'#00D9C0' },
  history: { name:'Medallion of Ages', flavor:'Engraved with the names of a thousand summers past.', color:'#FF4D6D' },
  reading: { name:'Quill of Storytelling', flavor:'Once belonged to a legendary tale-weaver.', color:'#4D8DFF' },
  writing: { name:'Inkwell of Ideas', flavor:'Never runs dry, no matter how much you write.', color:'#B14AFF' }
};
function relicIconSVG(subjectKey, shiny, size){
  const def = RELIC_DEFS[subjectKey];
  const color = shiny ? '#FFD166' : def.color;
  const shapes = {
    math: `<circle r="14" fill="none" stroke="${color}" stroke-width="2.5"/><line x1="0" y1="-14" x2="0" y2="14" stroke="${color}" stroke-width="2"/><polygon points="0,-9 4,0 0,9 -4,0" fill="${color}"/>`,
    science: `<path d="M-7,-13 h14 v9 l9,17 a4,4 0 0 1 -4,6 h-24 a4,4 0 0 1 -4,-6 l9,-17 z" fill="${color}"/><circle cx="-3" cy="6" r="2.4" fill="#fff" opacity="0.6"/>`,
    history: `<circle r="14" fill="${color}" opacity="0.9"/><polygon points="0,-8 2.4,-2.4 8,-2.4 3.2,1.6 5,8 0,4 -5,8 -3.2,1.6 -8,-2.4 -2.4,-2.4" fill="#fff" opacity="0.85"/>`,
    reading: `<path d="M0,14 C-2,4 -12,2 -12,-10 C-6,-13 0,-9 0,-2 C0,-9 6,-13 12,-10 C12,2 2,4 0,14 Z" fill="${color}"/>`,
    writing: `<path d="M-8,10 C-8,-4 -3,-14 6,-14 C6,-2 2,6 -8,10 Z" fill="${color}"/><circle cy="10" r="9" fill="${color}" opacity="0.3"/>`
  };
  const s = size || 44;
  return `<svg viewBox="-16 -16 32 32" width="${s}" height="${s}">
    ${shiny ? `<circle r="15" fill="none" stroke="#FFD166" stroke-width="1.5" opacity="0.7" class="relic-shiny-ring"/>` : ''}
    ${shapes[subjectKey] || shapes.math}
  </svg>`;
}
function grantRelic(p, subjectKey){
  if(p.relics[subjectKey] !== null) return null; // already earned — permanent, one-time reward
  const shiny = Math.random() < SHINY_CHANCE;
  p.relics[subjectKey] = shiny ? 'shiny' : 'normal';
  return p.relics[subjectKey];
}

/* Relics can be spent mid-battle for a Heal or an Attack. Their impact
   scales up both with how far into the summer the player is (same ramp
   that drives the Final Boss and enemy toughness) and with the difficulty
   tier of whatever question is currently on screen — so a relic used
   during a late-summer, high-tier fight hits noticeably harder than one
   used on day 1. Shiny relics get an extra 50% on top. Once used, a relic
   is consumed (its slot returns to null) — but that slot can be earned
   again later by defeating that subject's boss again. */
function relicPowerMultiplier(p, levelIdx){
  const tierMult = 0.85 + (levelIdx||0) * 0.1;
  const dayMult = 1 + dayDifficultyFactor(p) / MAX_DIFFICULTY_DAY; // 1.0 (day 1) -> 2.0 (day 15+)
  return tierMult * dayMult;
}
const RELIC_BASE_HEAL = 30;
const RELIC_BASE_DAMAGE_HITS = 3; // a relic attack is worth roughly this many normal hits at baseline
function relicHealAmount(p, levelIdx, shiny){
  return Math.round(RELIC_BASE_HEAL * relicPowerMultiplier(p, levelIdx) * (shiny ? 1.5 : 1));
}
function relicDamageAmount(p, correctDamageBase, levelIdx, shiny){
  const raw = correctDamageBase * RELIC_BASE_DAMAGE_HITS * relicPowerMultiplier(p, levelIdx) * (shiny ? 1.5 : 1);
  // Hard cap: relics should meaningfully help, not one-shot a boss. Capped
  // well under 100 HP regardless of how the day/tier multipliers scale up.
  return Math.min(90, Math.round(raw));
}
/* Consumes the relic (returns its shiny-ness so the caller can compute the
   effect before it's gone), or null if that slot was already empty. */
function consumeRelic(p, subjectKey){
  const had = p.relics[subjectKey];
  if(!had) return null;
  p.relics[subjectKey] = null;
  return had;
}

/* ---------- Battle logic ---------- */
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function pickWeightedLevel(track, subjectKey, profile){
  const baseWeights = (track.mixWeights && (track.mixWeights[subjectKey] || track.mixWeights.default)) || null;
  if(!baseWeights) return null;
  const momentum = profile ? (profile.subjectMomentum[subjectKey]||0) : 0;
  const weights = momentumAdjustedWeights(baseWeights, momentum);
  const r = Math.random();
  let acc = 0;
  for(let i=0;i<weights.length;i++){
    acc += weights[i];
    if(r <= acc) return i;
  }
  return weights.length-1;
}

const PLAYER_MAX_HP = 100, BOSS_MAX_HP = 100;
const CORRECT_DAMAGE = 20, WRONG_DAMAGE = 18;

function startBattle(subjectKey){
  const track = getActiveTrack();
  const p = getActiveProfile();
  registerDayPlayed(p);
  const startingHP = getDailyHP(p);
  if(startingHP<=0){
    window.alert("You're out of HP for today! Rest up and come back tomorrow, or visit the Review Realm / Practice Zone in the meantime.");
    return;
  }
  if(SETTINGS.musicOn){ Sound.unlock(); Sound.startAmbient(subjectKey); startMusicRotation(); }
  const levels = track.subjects[subjectKey].levels;
  let startLevel = p.levelBySubject[subjectKey];
  startLevel = Math.max(0, Math.min(startLevel, levels.length-1));
  const weighted = pickWeightedLevel(track, subjectKey, p);
  if(weighted!==null) startLevel = weighted;

  const bossMaxHp = scaledBossMaxHP(p);
  // Pace battles around explicit hit-count targets rather than letting combo
  // streaks / tier multipliers swing the count unpredictably:
  //  - defeating a boss normally takes about 10-12 correct hits
  //  - grades 3 and 6 specifically require MORE hits (~30% more), per
  //    parent feedback that those grades felt too easy
  //  - going from full HP to 0 takes about 10-12 wrong answers, unchanged
  // A modest per-question difficulty multiplier (applied at hit-time, based
  // on that question's tier) still makes harder questions hit harder, but
  // only by roughly ±15%, so the overall hit counts stay close to target.
  const harderGrade = (p.grade===3 || p.grade===6);
  const targetHitsToWin = harderGrade ? randInt(14, 16) : randInt(10, 12);
  const targetHitsToLose = randInt(10, 12);
  const correctDamageBase = bossMaxHp / targetHitsToWin;
  const wrongDamageBase = PLAYER_MAX_HP / targetHitsToLose;

  state.battle = {
    subject: subjectKey,
    levelIdx: startLevel,
    maxLevelReached: startLevel,
    usedQuestions: new Set(), // guarantees no repeats within this battle
    correctStreak:0, wrongStreak:0,
    correctCount:0, answeredCount:0,
    xpEarned:0,
    playerHP: startingHP, bossHP: bossMaxHp, bossMaxHp,
    correctDamageBase, wrongDamageBase, targetHitsToWin, targetHitsToLose,
    shrineTriggered:false, showShrine:false, matching:null, relicMenuKey:null,
    currentQ:null, awaitingNext:false, chosenIdx:null,
    timeLeft: SESSION_MINUTES*60,
    timerId:null,
    result:null // 'victory' | 'defeat' | 'timeup'
  };
  nextBattleQuestion();
  state.screen='battle';
  render();
  startBattleTimer();
}

/* Picks the next question with a hard guarantee against repeats within the
   current battle. Prefers the target difficulty tier, falls back to any tier
   with unused questions, and only allows a repeat once every question for
   that subject has already been asked this battle. */
// Prefers candidates whose _concept tag differs from whatever was just asked
// (recentConcepts = last 1-2 concepts used in this battle). Questions without
// a _concept tag (most hand-authored ones, for now) are unaffected and just
// pass through — this currently sharpens variety most for Math, since every
// procedurally-generated math question carries a concept label.
function preferDifferentConcept(pool, recentConcepts){
  if(!recentConcepts || recentConcepts.length===0) return pool;
  const filtered = pool.filter(item=>{
    // Distinguish a wrapped {q, levelIdx} entry from a raw Q object — raw Q
    // objects have their OWN field literally named "q" (the question text),
    // so a naive `item.q || item` check would always grab that string
    // instead of the real question object, silently defeating this filter.
    const q = ('levelIdx' in item) ? item.q : item;
    return !q._concept || !recentConcepts.includes(q._concept);
  });
  return filtered.length>0 ? filtered : pool;
}

function pickNextUniqueQuestion(levels, targetLevelIdx, usedSet, avoidIds, recentConcepts){
  avoidIds = avoidIds || new Set();
  // Search tiers in order of DISTANCE from the target tier (target itself
  // first, then ±1, then ±2, ...) rather than jumping to a random tier
  // anywhere in the subject. Without this, once the target tier's "fresh"
  // pool ran low (easy to happen with today's-question-avoidance active),
  // the picker would grab from ANY tier with equal odds — including the
  // hardest or easiest in the whole subject — producing a jarring,
  // unexplained difficulty spike or drop mid-battle.
  const tierOrder = levels.map((_,li)=>li).sort((a,b)=> Math.abs(a-targetLevelIdx) - Math.abs(b-targetLevelIdx));

  // Preference 1: not used this battle AND not already asked today (covers the daily-reset case)
  for(const li of tierOrder){
    const pool = levels[li].filter(q=>!usedSet.has(q) && !avoidIds.has(q._id));
    if(pool.length>0){
      const filtered = preferDifferentConcept(pool, recentConcepts);
      return { q: filtered[Math.floor(Math.random()*filtered.length)], levelIdx: li };
    }
  }
  // Preference 2: relax the today-avoidance (small subjects may not have enough content) — still avoid this battle's repeats, still distance-ordered
  for(const li of tierOrder){
    const pool = levels[li].filter(q=>!usedSet.has(q));
    if(pool.length>0){
      const filtered = preferDifferentConcept(pool, recentConcepts);
      return { q: filtered[Math.floor(Math.random()*filtered.length)], levelIdx: li };
    }
  }
  // Fully exhausted — start a fresh cycle at the target tier
  usedSet.clear();
  const fresh = levels[targetLevelIdx];
  return { q: fresh[Math.floor(Math.random()*fresh.length)], levelIdx: targetLevelIdx };
}

function nextBattleQuestion(){
  const s = state.battle;
  const track = getActiveTrack();
  const p = getActiveProfile();
  const levels = track.subjects[s.subject].levels;
  const weighted = pickWeightedLevel(track, s.subject, p);
  const targetLevel = weighted!==null ? weighted : s.levelIdx;

  const avoidIds = getTodayAskedSet(p);
  if(!s.recentConcepts) s.recentConcepts = [];
  const picked = pickNextUniqueQuestion(levels, targetLevel, s.usedQuestions, avoidIds, s.recentConcepts);
  s.currentQ = picked.q;
  s.levelIdx = picked.levelIdx;
  s.maxLevelReached = Math.max(s.maxLevelReached, picked.levelIdx);
  s.usedQuestions.add(picked.q);
  recordAskedToday(p, picked.q._id);
  if(picked.q._concept){
    s.recentConcepts.push(picked.q._concept);
    if(s.recentConcepts.length>2) s.recentConcepts.shift();
  }
  s.awaitingNext = false;
  s.chosenIdx = null;
}

function startBattleTimer(){
  const s = state.battle;
  if(s.timerId) clearInterval(s.timerId);
  s.timerId = setInterval(()=>{
    s.timeLeft -= 1;
    if(s.timeLeft <= 0){
      clearInterval(s.timerId);
      s.result = 'timeup';
      endBattle();
    } else {
      updateBattleTimerDisplay();
    }
  }, 1000);
}
function updateBattleTimerDisplay(){
  const el = document.getElementById('timerDisplay');
  if(!el) return;
  const s = state.battle;
  const m = Math.floor(s.timeLeft/60), sec = s.timeLeft%60;
  el.textContent = `${m}:${sec.toString().padStart(2,'0')}`;
  el.parentElement.classList.toggle('warn', s.timeLeft<=60);
  if(s.timeLeft<=10 && s.timeLeft>0) Sound.tick();
}

/* Shared question renderer used by Battles, Practice, and Review — shows a
   passage box above the question when one is attached (used for Reading
   Realm passages so 2-3 questions can reference the same short text). */
/* =========================================================================
   CHART/DIAGRAM GENERATORS
   These map directly to verified FCPS Data Analysis curriculum requirements:
   pictographs and bar graphs are core Grade 3 standards, line graphs are
   core Grade 4/5 standards, and circle graphs are a core Grade 6 standard.
   Charts are built from fixed, hand-verified data at question-authoring
   time (not randomly generated) so every answer can be checked by hand.
   ========================================================================= */
function barChartSVG(data, title){
  const w=360, h=230, padL=48, padB=42, padT=32, padR=20;
  const chartW=w-padL-padR, chartH=h-padT-padB;
  const maxVal = Math.max(...data.map(d=>d.value)) * 1.15;
  const gap = chartW/data.length, barW = gap*0.6;
  const bars = data.map((d,i)=>{
    const barH = (d.value/maxVal)*chartH;
    const x = padL + i*gap + (gap-barW)/2;
    const y = padT + chartH - barH;
    return `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="#7C5CFF" rx="3"/>
      <text x="${x+barW/2}" y="${padT+chartH+16}" text-anchor="middle" font-size="11" fill="#3a3450">${d.label}</text>
      <text x="${x+barW/2}" y="${y-6}" text-anchor="middle" font-size="11" font-weight="700" fill="#3a3450">${d.value}</text>`;
  }).join('');
  let gridlines = '';
  for(let i=0;i<=4;i++){
    const gy = padT + chartH - (i/4)*chartH;
    const val = Math.round((i/4)*maxVal);
    gridlines += `<line x1="${padL}" y1="${gy}" x2="${padL+chartW}" y2="${gy}" stroke="#E1DBFF" stroke-width="1"/><text x="${padL-8}" y="${gy+4}" text-anchor="end" font-size="10" fill="#8b87a8">${val}</text>`;
  }
  return `<svg viewBox="0 0 ${w} ${h}" width="340" xmlns="http://www.w3.org/2000/svg">
    <text x="${w/2}" y="18" text-anchor="middle" font-size="13" font-weight="800" fill="#241c48">${title}</text>
    ${gridlines}
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+chartH}" stroke="#3a3450" stroke-width="1.5"/>
    <line x1="${padL}" y1="${padT+chartH}" x2="${padL+chartW}" y2="${padT+chartH}" stroke="#3a3450" stroke-width="1.5"/>
    ${bars}
  </svg>`;
}
function pictographSVG(data, title, icon, symbolValue){
  const rowH=32, labelW=100, startX=labelW+12, startY=42;
  const maxCount = Math.max(...data.map(d=>Math.round(d.count/symbolValue)));
  const rows = data.map((d,i)=>{
    const count = Math.round(d.count/symbolValue);
    const icons = Array.from({length:count}).map((_,j)=>`<text x="${startX+j*24}" y="${startY+i*rowH+8}" font-size="18">${icon}</text>`).join('');
    return `<text x="${labelW}" y="${startY+i*rowH+8}" text-anchor="end" font-size="12" fill="#3a3450">${d.label}</text>${icons}`;
  }).join('');
  const w = Math.max(320, startX + maxCount*24 + 20);
  const h = startY + data.length*rowH + 26;
  return `<svg viewBox="0 0 ${w} ${h}" width="${Math.min(w,380)}" xmlns="http://www.w3.org/2000/svg">
    <text x="${w/2}" y="18" text-anchor="middle" font-size="13" font-weight="800" fill="#241c48">${title}</text>
    ${rows}
    <text x="${labelW}" y="${h-6}" text-anchor="end" font-size="10" fill="#8b87a8">Key: each ${icon} = ${symbolValue}</text>
  </svg>`;
}
function lineChartSVG(points, title){
  const w=360,h=230,padL=42,padB=40,padT=32,padR=20;
  const chartW=w-padL-padR, chartH=h-padT-padB;
  const maxY = Math.max(...points.map(p=>p.y))*1.15;
  const stepX = points.length>1 ? chartW/(points.length-1) : 0;
  const coords = points.map((p,i)=>({ x: padL+i*stepX, y: padT+chartH-(p.y/maxY)*chartH, label:p.x, val:p.y }));
  const path = coords.map((c,i)=> (i===0?'M':'L')+c.x+','+c.y).join(' ');
  const dots = coords.map(c=>`<circle cx="${c.x}" cy="${c.y}" r="4" fill="#00A88F"/><text x="${c.x}" y="${c.y-10}" text-anchor="middle" font-size="10" font-weight="700" fill="#3a3450">${c.val}</text><text x="${c.x}" y="${padT+chartH+16}" text-anchor="middle" font-size="10" fill="#3a3450">${c.label}</text>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" width="340" xmlns="http://www.w3.org/2000/svg">
    <text x="${w/2}" y="18" text-anchor="middle" font-size="13" font-weight="800" fill="#241c48">${title}</text>
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+chartH}" stroke="#3a3450" stroke-width="1.5"/>
    <line x1="${padL}" y1="${padT+chartH}" x2="${padL+chartW}" y2="${padT+chartH}" stroke="#3a3450" stroke-width="1.5"/>
    <path d="${path}" fill="none" stroke="#00D9C0" stroke-width="2.5"/>
    ${dots}
  </svg>`;
}
function pieChartSVG(data, title){
  const total = data.reduce((s,d)=>s+d.value,0);
  const cx=110, cy=115, r=80;
  let angle=-90;
  const colors = ['#7C5CFF','#00D9C0','#FF9F1C','#FF4D6D','#4D8DFF','#B14AFF'];
  const slices = data.map((d,i)=>{
    const sliceAngle = (d.value/total)*360;
    const startAngle = angle, endAngle = angle+sliceAngle;
    const x1 = cx + r*Math.cos(startAngle*Math.PI/180), y1 = cy + r*Math.sin(startAngle*Math.PI/180);
    const x2 = cx + r*Math.cos(endAngle*Math.PI/180), y2 = cy + r*Math.sin(endAngle*Math.PI/180);
    const largeArc = sliceAngle>180?1:0;
    const midAngle = (startAngle+endAngle)/2;
    const labelX = cx + (r*0.62)*Math.cos(midAngle*Math.PI/180), labelY = cy + (r*0.62)*Math.sin(midAngle*Math.PI/180);
    const pct = Math.round((d.value/total)*100);
    angle = endAngle;
    return `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc} 1 ${x2},${y2} Z" fill="${colors[i%colors.length]}" stroke="#fff" stroke-width="2"/>${pct>=8?`<text x="${labelX}" y="${labelY}" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">${pct}%</text>`:''}`;
  }).join('');
  const legend = data.map((d,i)=>`<rect x="230" y="${20+i*22}" width="14" height="14" fill="${colors[i%colors.length]}"/><text x="250" y="${31+i*22}" font-size="12" fill="#3a3450">${d.label} (${d.value})</text>`).join('');
  const h = Math.max(220, 30+data.length*22);
  return `<svg viewBox="0 0 380 ${h}" width="360" xmlns="http://www.w3.org/2000/svg">
    <text x="110" y="18" text-anchor="middle" font-size="13" font-weight="800" fill="#241c48">${title}</text>
    ${slices}${legend}
  </svg>`;
}

function genChartQuestion(chartType, theme){
  const numCats = chartType==='pie' ? (4+Math.floor(Math.random()*2)) : (4+Math.floor(Math.random()*3));
  const cats = shuffle(theme.categories).slice(0, Math.min(numCats, theme.categories.length));
  let data, diagramSpec;
  const chartLabel = chartType==='pictograph' ? 'pictograph' : chartType==='line' ? 'line graph' : chartType==='pie' ? 'circle graph' : 'bar graph';

  if(chartType==='bar'){
    data = cats.map(c=>({label:c, value: randInt(theme.min, theme.max)}));
    diagramSpec = {type:'bar', data, title:theme.title};
  } else if(chartType==='pictograph'){
    const symbolValue = choose([1,2,5]);
    data = cats.map(c=>({label:c, value: randInt(1,8)*symbolValue}));
    diagramSpec = {type:'pictograph', data:data.map(d=>({label:d.label,count:d.value})), title:theme.title, icon:theme.icon, symbolValue};
  } else if(chartType==='line'){
    const span = theme.max-theme.min;
    let val = randInt(theme.min, theme.min+Math.round(span/3));
    data = cats.map(c=>{
      val += randInt(-Math.round(span*0.12), Math.round(span*0.28));
      val = Math.max(theme.min, Math.min(theme.max, val));
      return {label:c, value: val};
    });
    diagramSpec = {type:'line', data:data.map(d=>({x:d.label,y:d.value})), title:theme.title};
  } else { // pie — values sum to 100 for clean percentage questions
    let remaining = 100;
    data = cats.map((c,i)=>{
      const isLast = i===cats.length-1;
      const minLeft = 5*(cats.length-i-1);
      const val = isLast ? remaining : randInt(10, Math.max(10, remaining-minLeft-5));
      remaining -= val;
      return {label:c, value: val};
    });
    diagramSpec = {type:'pie', data, title:theme.title};
  }

  const sorted = [...data].sort((a,b)=>b.value-a.value);
  const highest = sorted[0], lowest = sorted[sorted.length-1];
  const total = data.reduce((s,d)=>s+d.value,0);
  const catList = cats.join(', ');
  const unitTxt = theme.unit ? ' '+theme.unit : '';
  const meanExact = total/data.length;
  const meanRounded = Math.round(meanExact*10)/10;

  const qTypePool = chartType==='pie'
    ? ['pct-combo','pct-remaining','pct-rank','pct-highest']
    : ['range','mean','above-mean','rank','difference','total'];
  const qType = choose(qTypePool);

  let stem, correctAns, distractors, explain;
  if(qType==='highest'){
    stem = `Looking at the "${theme.title}" ${chartLabel} (comparing ${catList}), which category has the HIGHEST value?`;
    correctAns = highest.label;
    distractors = data.filter(d=>d.label!==highest.label).map(d=>d.label);
    explain = `"${highest.label}" has the highest value (${highest.value}${unitTxt}).`;
  } else if(qType==='rank'){
    const second = sorted[1];
    stem = `Looking at the "${theme.title}" ${chartLabel} (comparing ${catList}), which category has the SECOND-HIGHEST value?`;
    correctAns = second.label;
    distractors = data.filter(d=>d.label!==second.label).map(d=>d.label);
    explain = `Ranked highest to lowest: ${sorted.map(d=>d.label+' ('+d.value+')').join(', ')} — "${second.label}" is second.`;
  } else if(qType==='difference'){
    const [a,b] = shuffle(data).slice(0,2);
    const diff = Math.abs(a.value-b.value);
    stem = `On the "${theme.title}" ${chartLabel}, what is the difference between "${a.label}" and "${b.label}"?`;
    correctAns = String(diff);
    distractors = [String(a.value+b.value), String(diff+randInt(2,6)), String(Math.max(0,diff-randInt(2,6)) || diff+1)];
    explain = `|${a.value} − ${b.value}| = ${diff}${unitTxt}.`;
  } else if(qType==='range'){
    const range = highest.value - lowest.value;
    stem = `On the "${theme.title}" ${chartLabel} (${catList}), what is the RANGE (highest value minus lowest value) of the data shown?`;
    correctAns = String(range);
    distractors = [String(highest.value), String(total-range), String(range+randInt(2,6))];
    explain = `Highest ("${highest.label}", ${highest.value}) minus lowest ("${lowest.label}", ${lowest.value}) = ${range}${unitTxt}.`;
  } else if(qType==='total'){
    stem = `On the "${theme.title}" ${chartLabel} (${catList}), what is the total of all categories combined?`;
    correctAns = String(total);
    distractors = [String(total - lowest.value), String(total+randInt(3,10)), String(highest.value*data.length)];
    explain = `Adding all values together: ${data.map(d=>d.value).join(' + ')} = ${total}${unitTxt}.`;
  } else if(qType==='mean'){
    stem = `On the "${theme.title}" ${chartLabel} (${catList}), what is the MEAN (average) of the values shown?`;
    correctAns = String(meanRounded);
    const meanMinusOne = Math.round((total/(data.length-1))*10)/10;
    distractors = [String(total), String(meanMinusOne), String(Math.round((meanExact+randInt(2,5))*10)/10)];
    explain = `Mean = total ÷ number of categories = ${total} ÷ ${data.length} = ${meanRounded}${unitTxt}. (A common mistake is forgetting to divide, or dividing by the wrong count.)`;
  } else if(qType==='above-mean'){
    const aboveCount = data.filter(d=>d.value>meanExact).length;
    stem = `On the "${theme.title}" ${chartLabel} (${catList}), how many categories have a value ABOVE the mean (average)?`;
    correctAns = String(aboveCount);
    const alt1 = Math.max(0, Math.min(data.length, aboveCount+1));
    const alt2 = Math.max(0, Math.min(data.length, aboveCount-1));
    distractors = [String(alt1), String(alt2), String(data.length)];
    explain = `The mean is ${meanRounded}${unitTxt}. ${aboveCount} of the ${data.length} categories are above that value.`;
  } else if(qType==='pct-combo'){
    const [a,b] = shuffle(data).slice(0,2);
    const sum = a.value+b.value;
    stem = `On the "${theme.title}" circle graph, what percentage is "${a.label}" and "${b.label}" combined?`;
    correctAns = sum+'%';
    distractors = [(100-sum)+'%', (sum+5)+'%', Math.max(0,sum-5)+'%'];
    explain = `${a.value}% + ${b.value}% = ${sum}%.`;
  } else if(qType==='pct-remaining'){
    const [a,b] = shuffle(data).slice(0,2);
    const remaining = 100-a.value-b.value;
    stem = `On the "${theme.title}" circle graph, what percentage is NEITHER "${a.label}" NOR "${b.label}"?`;
    correctAns = remaining+'%';
    distractors = [(a.value+b.value)+'%', (100-a.value)+'%', (100-b.value)+'%'];
    explain = `100% − ${a.value}% − ${b.value}% = ${remaining}%. (A common mistake is only subtracting one of the two categories.)`;
  } else if(qType==='pct-rank'){
    const second = sorted[1];
    stem = `On the "${theme.title}" circle graph (${catList}), which category has the SECOND-LARGEST percentage?`;
    correctAns = second.label;
    distractors = data.filter(d=>d.label!==second.label).map(d=>d.label);
    explain = `Ranked largest to smallest: ${sorted.map(d=>d.label+' ('+d.value+'%)').join(', ')} — "${second.label}" is second.`;
  } else {
    stem = `On the "${theme.title}" circle graph (${catList}), which category has the LARGEST percentage?`;
    correctAns = highest.label;
    distractors = data.filter(d=>d.label!==highest.label).map(d=>d.label);
    explain = `"${highest.label}" has the largest slice at ${highest.value}%.`;
  }

  const {c,a} = buildMCQ(correctAns, distractors);
  return Q(stem, c, a, explain, null, null, diagramSpec);
}

/* =========================================================================
   LARGE-SCALE CHART QUESTION EXPANSION
   The hand-authored batch earlier (41 questions) was a good proof of
   concept but nowhere near enough for meaningful diagram coverage
   throughout gameplay. This scales it up using the procedural chart
   generator across every math/science/history tier in all four tracks,
   targeting roughly 20% of the entire question bank being diagram/chart-
   based — matching real FCPS Data Analysis requirements per grade
   (pictographs/bar graphs, line graphs, circle graphs) while also
   extending chart literacy into science and social studies data, not
   just math.
   ========================================================================= */
function expandChartContent(perTierAdd){
  const mathGenerators = [
    G(()=>genChartQuestion('bar', choose(CHART_THEMES_MATH)),'chart-bar'),
    G(()=>genChartQuestion('pictograph', choose(CHART_THEMES_MATH)),'chart-pictograph'),
    G(()=>genChartQuestion('line', choose(CHART_THEMES_MATH)),'chart-line'),
    G(()=>genChartQuestion('pie', choose(CHART_THEMES_MATH)),'chart-pie')
  ];
  const scienceGenerators = [
    G(()=>genChartQuestion('bar', choose(CHART_THEMES_SCIENCE)),'chart-bar'),
    G(()=>genChartQuestion('pictograph', choose(CHART_THEMES_SCIENCE)),'chart-pictograph'),
    G(()=>genChartQuestion('line', choose(CHART_THEMES_SCIENCE)),'chart-line'),
    G(()=>genChartQuestion('pie', choose(CHART_THEMES_SCIENCE)),'chart-pie')
  ];
  // Charts are exclusively math/science content now — no history/social
  // studies charts. Reallocating that density into math+science also means
  // both subjects have MORE diagram questions per tier than before, making
  // them show up more reliably (including during the Final Boss, which
  // picks a random subject each question).
  [trackA, trackB, trackC, trackAdult].forEach(track=>{
    track.subjects.math.levels.forEach(levelArr=>{
      fillMathLevelToTarget(levelArr, mathGenerators, levelArr.length + perTierAdd);
    });
    track.subjects.science.levels.forEach(levelArr=>{
      fillMathLevelToTarget(levelArr, scienceGenerators, levelArr.length + perTierAdd);
    });
  });
}
expandChartContent(250);

function buildDiagramFromSpec(spec){
  if(spec.type==='bar') return barChartSVG(spec.data, spec.title);
  if(spec.type==='pictograph') return pictographSVG(spec.data, spec.title, spec.icon, spec.symbolValue);
  if(spec.type==='line') return lineChartSVG(spec.data, spec.title);
  if(spec.type==='pie') return pieChartSVG(spec.data, spec.title);
  return '';
}

function renderQuestionBody(q){
  const passageHTML = q.passage ? `<div class="passage-box"><div class="passage-label">📖 Read this, then answer:</div>${q.passage}</div>` : '';
  // Diagram questions generated at scale store a lightweight spec instead
  // of a pre-built SVG string (building 7,800+ SVG strings up front was a
  // major contributor to slow app startup). The actual SVG is built here,
  // once, the first time this specific question is shown — and cached on
  // the question object so re-rendering the same question doesn't rebuild it.
  if(!q.diagram && q.diagramSpec){ q.diagram = buildDiagramFromSpec(q.diagramSpec); }
  const diagramHTML = q.diagram ? `<div class="diagram-box">${q.diagram}</div>` : '';
  return `${passageHTML}${diagramHTML}<div class="q-text">${q.q}</div>`;
}

/* =========================================================================
   WISDOM SHRINE — matching mini-game data. A shared vocabulary bank per
   subject (not tied to a specific track/tier, since this is a bonus
   moment, not core assessment). Each visit picks 4 random term/definition
   pairs to match.
   ========================================================================= */
const MATCHING_BANKS = {
  math: [
    {term:'Sum', def:'The result of adding two or more numbers'},
    {term:'Product', def:'The result of multiplying two or more numbers'},
    {term:'Quotient', def:'The result of dividing one number by another'},
    {term:'Perimeter', def:'The distance all the way around a shape'},
    {term:'Area', def:'The amount of space inside a flat shape'},
    {term:'Factor', def:'A number that divides evenly into another number'},
    {term:'Numerator', def:'The top number in a fraction'},
    {term:'Denominator', def:'The bottom number in a fraction'}
  ],
  science: [
    {term:'Producer', def:'An organism that makes its own food from sunlight'},
    {term:'Consumer', def:'An organism that eats other organisms for energy'},
    {term:'Adaptation', def:'A trait that helps a living thing survive its environment'},
    {term:'Evaporation', def:'When liquid water turns into water vapor'},
    {term:'Habitat', def:'The natural environment where an organism lives'},
    {term:'Gravity', def:'The force that pulls objects toward Earth'},
    {term:'Igneous rock', def:'Rock formed when melted magma or lava cools and hardens'},
    {term:'Circuit', def:'A complete loop that allows electricity to flow'}
  ],
  history: [
    {term:'Democracy', def:'A system of government run by the people'},
    {term:'Primary source', def:'Firsthand evidence created during the time period studied'},
    {term:'Tariff', def:'A tax placed on goods imported from another country'},
    {term:'Civilization', def:'An organized society with cities, government, and culture'},
    {term:'Colony', def:'A settlement controlled by a distant ruling country'},
    {term:'Constitution', def:'A written document that establishes a government\'s rules'},
    {term:'Scarcity', def:'Having limited resources but unlimited wants'},
    {term:'Reconstruction', def:'The period of rebuilding the South after the Civil War'}
  ],
  reading: [
    {term:'Simile', def:'A comparison using the words "like" or "as"'},
    {term:'Metaphor', def:'A direct comparison without using "like" or "as"'},
    {term:'Theme', def:'The central message or lesson of a text'},
    {term:'Inference', def:'A conclusion drawn from clues rather than stated directly'},
    {term:'Setting', def:'The time and place where a story happens'},
    {term:'Personification', def:'Giving human qualities to something non-human'},
    {term:'Main idea', def:'The most important point an author is making'},
    {term:'Conflict', def:'The main problem or struggle a character faces'}
  ],
  writing: [
    {term:'Thesis', def:'The sentence that states an essay\'s main argument'},
    {term:'Transition', def:'A word or phrase that connects ideas smoothly'},
    {term:'Counterargument', def:'An opposing viewpoint addressed in an essay'},
    {term:'Topic sentence', def:'The sentence that states a paragraph\'s main idea'},
    {term:'Evidence', def:'Facts or details used to support a claim'},
    {term:'Conclusion', def:'The closing part that wraps up and summarizes an essay'},
    {term:'Narrative', def:'Writing that tells a story with characters and events'},
    {term:'Persuasive', def:'Writing meant to convince the reader of a viewpoint'}
  ]
};
function initMatching(subjectKey){
  const bank = shuffle(MATCHING_BANKS[subjectKey]);
  const pairs = bank.slice(0,4);
  return {
    pairs,
    termOrder: shuffle([0,1,2,3]),
    defOrder: shuffle([0,1,2,3]),
    matchedSet: new Set(),
    selectedTerm: null, selectedDef: null,
    wrongTerm: null, wrongDef: null
  };
}
function tryResolveMatch(battleState){
  const m = battleState.matching;
  if(m.selectedTerm===null || m.selectedDef===null) return;
  const pairIdxTerm = m.termOrder[m.selectedTerm];
  const pairIdxDef = m.defOrder[m.selectedDef];
  if(pairIdxTerm === pairIdxDef){
    m.matchedSet.add(pairIdxTerm);
    m.selectedTerm = null; m.selectedDef = null;
    Sound.correct();
    if(m.matchedSet.size >= m.pairs.length){ fireConfetti(20); Sound.badge(); }
  } else {
    m.wrongTerm = m.selectedTerm; m.wrongDef = m.selectedDef;
    m.selectedTerm = null; m.selectedDef = null;
    Sound.incorrect();
    setTimeout(()=>{ m.wrongTerm=null; m.wrongDef=null; render(); }, 550);
  }
}

function bossMeta(subjectKey){
  const names = {math:'the Number Golem',science:'the Lab Specter',history:'the Time Warden',reading:'the Story Sphinx',writing:'the Ink Wraith'};
  const emojis = {math:'⛰️',science:'🔬',history:'🏛️',reading:'📖',writing:'✍️'};
  return { name: names[subjectKey], icon: emojis[subjectKey] };
}

    <div class="battle-arena ${s.playerHP>0 && s.playerHP<30 ? 'low-hp':''}">
      ${battleBackdropSVG(s.subject)}

function renderRelicTray(p, relicMenuKey, levelIdx, correctDamageBase, trayId){
  const owned = Object.entries(p.relics).filter(([k,v])=>v);
  if(owned.length===0) return '';
  const tray = `<div class="relic-tray">
    <span style="font-size:11.5px;font-weight:700;color:var(--text-dim);align-self:center;">🎒 Relics:</span>
    ${owned.map(([key,type])=>`
      <button class="relic-tray-btn ${relicMenuKey===key?'active':''}" data-relic="${key}" data-tray="${trayId||'battle'}" title="${RELIC_DEFS[key].name}">
        ${relicIconSVG(key, type==='shiny', 30)}
      </button>`).join('')}
  </div>`;
  if(!relicMenuKey || !p.relics[relicMenuKey]) return tray;
  const key = relicMenuKey;
  const type = p.relics[key];
  const def = RELIC_DEFS[key];
  const healAmt = relicHealAmount(p, levelIdx, type==='shiny');
  const dmgAmt = relicDamageAmount(p, correctDamageBase, levelIdx, type==='shiny');
  return tray + `<div class="relic-use-panel">
    <p style="margin:0 0 8px;font-weight:800;">${def.name}${type==='shiny'?' ✨':''} — use it now?</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn" id="relicHealBtn" style="background:linear-gradient(135deg,#00D9C0,#00A88F);color:#04332C;">💚 Heal +${healAmt} HP</button>
      <button class="btn" id="relicAttackBtn" style="background:linear-gradient(135deg,#FF4D6D,#B14AFF);color:#fff;">⚔️ Attack -${dmgAmt} Boss HP</button>
      <button class="btn ghost" id="relicCancelBtn">Cancel</button>
    </div>
    <p style="margin:8px 0 0;font-size:11.5px;color:var(--text-dim);">Using a relic consumes it — defeat this realm's boss again later to earn a new one.</p>
  </div>`;
}
