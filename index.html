<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Explorer's Guild</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Public+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<!-- Optional: enables cross-device sync (leaderboard/parent dashboard seeing all
     players regardless of which device they played on). Harmless if Firebase
     isn't configured below — the app just falls back to local-only storage. -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
  :root{
    --bg-deep:#0D1128;
    --bg-deep-2:#171233;
    --panel:#FFFFFF;
    --panel-tint:#F6F3FF;
    --text-dark:#1C1533;
    --text-dim:#5B5470;
    --ink-text:#EAF0FF;
    --line: rgba(234,240,255,0.14);

    --violet:#7C5CFF;
    --violet-light:#9B82FF;
    --teal:#00D9C0;
    --teal-light:#4CF0DD;
    --amber:#FFB020;
    --amber-light:#FFCB61;
    --coral:#FF4D6D;
    --coral-light:#FF7590;

    --math:#FF9F1C;
    --science:#00D9C0;
    --history:#FF4D6D;
    --reading:#4D8DFF;
    --writing:#B14AFF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 700px 500px at 12% -6%, rgba(124,92,255,0.35), transparent 60%),
      radial-gradient(ellipse 600px 480px at 92% 8%, rgba(0,217,192,0.25), transparent 55%),
      radial-gradient(ellipse 700px 600px at 50% 110%, rgba(255,77,109,0.18), transparent 55%),
      linear-gradient(160deg, var(--bg-deep-2), var(--bg-deep) 55%);
    background-attachment:fixed;
    color:var(--ink-text);
    font-family:'Public Sans', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }
  body::before{
    content:'';
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      radial-gradient(1.5px 1.5px at 10% 20%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 80% 15%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 60% 65%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1.5px 1.5px at 30% 80%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 90% 75%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1.5px 1.5px at 45% 40%, rgba(255,255,255,0.3), transparent);
    background-size:100% 100%;
    animation:twinkle 4s ease-in-out infinite alternate;
  }
  @keyframes twinkle{from{opacity:0.5;}to{opacity:1;}}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  @keyframes popIn{0%{transform:scale(0.3) translateY(14px);opacity:0;}65%{transform:scale(1.12);opacity:1;}100%{transform:scale(1);}}
  @keyframes floatY{0%,100%{transform:translateY(0px);}50%{transform:translateY(-6px);}}
  @keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 4px currentColor);}50%{filter:drop-shadow(0 0 16px currentColor);}}
  @keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
  @keyframes confettiFall{
    0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
    100%{transform:translateY(240px) rotate(380deg);opacity:0;}
  }
  .confetti-piece{position:fixed;top:0;width:9px;height:9px;border-radius:3px;pointer-events:none;z-index:999;animation:confettiFall 1.7s ease-in forwards;}
  .stamp{animation:popIn .45s cubic-bezier(.3,1.4,.5,1);}
  .display{font-family:'Baloo 2', sans-serif;}
  .mono{font-family:'JetBrains Mono', monospace;}
  .app{max-width:1000px;margin:0 auto;padding:28px 20px 80px;position:relative;z-index:1;}

  /* ---------- Header ---------- */
  .brand{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
  .brand-badge{
    width:50px;height:50px;border-radius:16px;
    background:linear-gradient(135deg, var(--violet), var(--teal));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 3px rgba(234,240,255,0.08), 0 6px 18px rgba(124,92,255,0.45);
    animation:floatY 3.5s ease-in-out infinite;
  }
  .brand h1{font-family:'Baloo 2',sans-serif;font-size:24px;margin:0;font-weight:700;letter-spacing:0.2px;
    background:linear-gradient(90deg, #fff, var(--teal-light));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .brand p{margin:0;font-size:12px;color:var(--violet-light);letter-spacing:1.8px;text-transform:uppercase;font-weight:700;}
  .brand-spacer{flex:1;}
  .sound-controls{display:flex;gap:8px;}
  .sound-btn{
    width:42px;height:42px;border-radius:14px;border:1px solid var(--line);
    background:rgba(255,255,255,0.06);color:var(--ink-text);cursor:pointer;font-size:18px;
    display:flex;align-items:center;justify-content:center;transition:all .15s ease;
    backdrop-filter:blur(6px);
  }
  .sound-btn:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,217,192,0.3);}
  .sound-btn.off{opacity:.4;}

  .hero-banner{margin:-4px 0 22px;filter:drop-shadow(0 10px 30px rgba(124,92,255,0.25));}
  .hero-banner svg{width:100%;height:auto;display:block;}

  .node-illustration{transition:transform .15s ease;}
  .node-btn{cursor:pointer;}
  .node-btn:hover .node-illustration{transform:translateY(-4px) scale(1.05);}
  .node-glow{animation:pulseGlow 2.2s ease-in-out infinite;}

  /* ---------- Profile tabs ---------- */
  .profile-tabs{display:flex;gap:10px;margin-bottom:26px;flex-wrap:wrap;}
  .profile-tab{
    flex:1; min-width:150px;
    background:rgba(255,255,255,0.05); border:1.5px solid var(--line); border-radius:16px;
    padding:13px 15px; cursor:pointer; transition:all .18s ease; text-align:left;
    backdrop-filter:blur(8px);
  }
  .profile-tab:hover{border-color:var(--violet-light); transform:translateY(-2px);}
  .profile-tab.active{border-color:var(--teal); background:linear-gradient(135deg, rgba(0,217,192,0.18), rgba(124,92,255,0.10)); box-shadow:0 4px 20px rgba(0,217,192,0.2);}
  .profile-tab .name{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:16px;}
  .profile-tab .sub{font-size:11.5px;color:#B7B4D6;margin-top:2px;}
  .profile-tab .flame{font-size:12px;color:var(--amber-light);margin-top:6px;display:flex;align-items:center;gap:5px;font-weight:600;}

  /* ---------- Card base ---------- */
  .card{
    background:linear-gradient(180deg, var(--panel), var(--panel-tint));
    color:var(--text-dark);
    border-radius:22px;
    padding:24px;
    box-shadow:0 20px 50px rgba(5,5,20,0.45), 0 0 0 1px rgba(124,92,255,0.15);
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:'';
    position:absolute; top:0; left:0; right:0; height:5px;
    background:linear-gradient(90deg, var(--violet), var(--teal), var(--amber), var(--coral));
  }

  /* ---------- Setup screen ---------- */
  .setup-card h2{margin-top:0;font-family:'Baloo 2',sans-serif;}
  .setup-card input{
    width:100%; padding:13px 15px; border-radius:12px; border:2px solid #E1DBFF;
    font-size:15px; font-family:inherit; background:#FBFAFF; margin-top:6px; color:var(--text-dark);
  }
  .setup-card input:focus{outline:none;border-color:var(--violet);}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:linear-gradient(135deg, var(--violet), #5B3FE0); color:#F5F0FF; border:none; border-radius:14px;
    padding:13px 22px; font-size:15px; font-weight:700; cursor:pointer;
    font-family:'Public Sans',sans-serif; transition:transform .12s ease, box-shadow .15s ease;
    box-shadow:0 6px 18px rgba(124,92,255,0.4);
  }
  .btn:hover{transform:translateY(-2px) scale(1.015); box-shadow:0 10px 26px rgba(124,92,255,0.55);}
  .btn:active{transform:translateY(0px) scale(0.98);}
  .btn.brass{background:linear-gradient(135deg, var(--amber), #FF8A3D); box-shadow:0 6px 18px rgba(255,176,32,0.4);}
  .btn.brass:hover{box-shadow:0 10px 26px rgba(255,176,32,0.55);}
  .btn.ghost{background:rgba(124,92,255,0.06);border:2px solid var(--violet);color:var(--violet);box-shadow:none;}
  .btn.ghost:hover{background:rgba(124,92,255,0.12);box-shadow:0 6px 16px rgba(124,92,255,0.2);}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}

  /* ---------- Dashboard: trail map ---------- */
  .trail-wrap{margin:20px 0 28px;border-radius:18px;overflow:hidden;box-shadow:0 8px 28px rgba(20,10,50,0.35);}
  .trail-svg{width:100%;height:auto;display:block;}
  .node-label{font-family:'Baloo 2',sans-serif;font-weight:700;}
  .trail-path-glow{animation:dashFlow 1.6s linear infinite;}
  @keyframes dashFlow{to{stroke-dashoffset:-24;}}
  .map-star{animation:starTwinkle 2.4s ease-in-out infinite;}
  @keyframes starTwinkle{0%,100%{opacity:0.15;}50%{opacity:0.9;}}
  .map-clouds-far{animation:cloudDriftSlow 60s linear infinite;}
  .map-clouds-near{animation:cloudDriftFast 40s linear infinite;}
  @keyframes cloudDriftSlow{0%{transform:translateX(0);}100%{transform:translateX(-60px);}}
  @keyframes cloudDriftFast{0%{transform:translateX(0);}100%{transform:translateX(-90px);}}
  .node-ring-pulse{animation:nodeRingPulse 2.4s ease-in-out infinite;}
  @keyframes nodeRingPulse{0%,100%{opacity:0.2;stroke-width:1;}50%{opacity:0.6;stroke-width:2;}}

  .stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:22px;}
  .stat-pill{
    background:rgba(255,255,255,0.06); border:1.5px solid var(--line); border-radius:16px;
    padding:13px 16px; flex:1; min-width:130px; backdrop-filter:blur(8px);
  }
  .stat-pill .num{font-family:'JetBrains Mono',monospace;font-size:23px;font-weight:700;
    background:linear-gradient(90deg, var(--teal-light), var(--violet-light));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .stat-pill .lbl{font-size:11px;color:#B7B4D6;text-transform:uppercase;letter-spacing:1.2px;font-weight:700;}

  .section-title{font-family:'Baloo 2',sans-serif;font-size:20px;font-weight:700;margin:26px 0 12px;color:var(--ink-text);}

  /* ---------- Badges / passport ---------- */
  .passport{display:flex;flex-wrap:wrap;gap:12px;}
  .relic-reveal{background:linear-gradient(135deg,#F1EDFF,#E4DCFF);border:2px solid var(--violet);}
  .relic-reveal.shiny{background:linear-gradient(135deg,#FFF7DD,#FFECAD);border:2px solid #FFD166;box-shadow:0 0 24px rgba(255,209,102,0.5);}
  .relic-shiny-ring{animation:shinyRingPulse 1.6s ease-in-out infinite;}
  @keyframes shinyRingPulse{0%,100%{opacity:0.4;r:15;}50%{opacity:0.9;r:15.8;}}
  .relic-slot{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 10px;border-radius:14px;background:var(--panel-tint);text-align:center;}
  .relic-slot.locked{opacity:0.45;}
  .relic-slot.shiny{background:linear-gradient(135deg,#FFF7DD,#FFECAD);border:2px solid #FFD166;}
  .gear-item-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);}
  .gear-item-row:last-child{border-bottom:none;}
  .gear-item-row.equipped{background:linear-gradient(135deg,#F1EDFF,#E4DCFF);border-radius:10px;padding-left:8px;margin:0 -8px;}
  .gear-item-icon{width:40px;height:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--panel-tint);border-radius:10px;}
  .gear-item-info{flex:1;min-width:0;}
  .gear-item-actions{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
  .relic-tray{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:10px 0;padding:8px 10px;background:var(--panel-tint);border-radius:12px;}
  .relic-tray-btn{width:38px;height:38px;border-radius:10px;border:2px solid transparent;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:2px;}
  .relic-tray-btn.active{border-color:var(--violet);background:#F1EDFF;}
  .relic-use-panel{background:linear-gradient(135deg,#F1EDFF,#E4DCFF);border:2px solid var(--violet);border-radius:14px;padding:14px;margin-bottom:10px;}
  .stamp{
    width:90px;height:90px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    background:linear-gradient(150deg, #fff, var(--panel-tint));
    border:3px solid var(--amber); color:var(--text-dark); text-align:center; padding:6px;
    font-size:10.5px; font-weight:700; line-height:1.2;
    box-shadow:0 6px 18px rgba(255,176,32,0.35);
  }
  .stamp .emoji{font-size:23px;margin-bottom:2px;}
  .stamp.locked{opacity:.28; border-style:dashed; border-color:#6b6690; box-shadow:none;}

  /* ---------- Subject session ---------- */
  .session-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .timer{
    font-family:'JetBrains Mono',monospace; font-size:27px; font-weight:700;
    background:linear-gradient(135deg, rgba(124,92,255,0.12), rgba(0,217,192,0.12)); border:2px solid var(--violet-light); border-radius:14px; padding:8px 18px;
    color:var(--violet);
  }
  .timer.warn{color:var(--coral); border-color:var(--coral); animation:pulseGlow 0.9s ease-in-out infinite;}
  .level-chip{
    display:inline-block; background:linear-gradient(135deg, var(--teal), #00A88F); color:#053B34; font-size:11.5px; font-weight:800;
    padding:6px 14px; border-radius:999px; text-transform:uppercase; letter-spacing:0.5px;
  }
  .score-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:12px 0;}
  .score-badge{
    display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:800;
    background:var(--panel-tint);border:1.5px solid #E1DBFF;border-radius:999px;padding:6px 13px;color:var(--text-dark);
  }
  .score-badge.alt{background:#EFEBFF;}
  .combo-flame{
    font-size:13px;font-weight:800;color:#FF8A00;
    background:linear-gradient(135deg,#FFF3E0,#FFE0B2);border:1.5px solid #FFB020;border-radius:999px;padding:6px 13px;
    animation:popIn .3s ease-out;
  }
  .combo-bonus{color:var(--amber);font-weight:800;}
  .mascot-bubble{
    width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:19px;border:2px solid; animation:floatY 2.4s ease-in-out infinite;
  }
  .battle-arena{
    display:flex;align-items:center;gap:14px;margin:14px 0 18px;
    background:var(--panel-tint);border-radius:16px;padding:16px;
    position:relative; overflow:hidden; z-index:1;
  }
  .battle-arena.dark{background:rgba(255,255,255,0.06);}
  .battle-backdrop{
    position:absolute; inset:0; width:100%; height:100%; z-index:-1;
    opacity:0.9; border-radius:16px;
  }
  .combatant{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:1;}
  .combatant-label{font-weight:800;font-size:13.5px;color:var(--text-dark);text-align:center;text-shadow:0 1px 3px rgba(0,0,0,0.4);}
  .battle-arena.dark .combatant-label{color:#EDE6FF;}
  .combatant-icon{
    display:inline-flex;align-items:center;justify-content:center;border-radius:50%;position:relative;
  }
  .player-portrait{width:76px;height:76px;}
  .player-aura{animation:playerAuraPulse 2.4s ease-in-out infinite;}
  @keyframes playerAuraPulse{0%,100%{opacity:.25;}50%{opacity:.5;}}
  .player-emoji-badge{position:absolute;font-size:34px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4));}
  .boss-portrait{width:118px;height:118px;filter:drop-shadow(0 0 18px rgba(255,45,99,0.55));}
  .boss-emoji-badge{position:absolute;font-size:40px;bottom:-2px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));}
  .boss-aura{animation:bossAuraPulse 2s ease-in-out infinite;}
  .boss-aura-ring{animation:bossRingPulse 2.4s ease-in-out infinite;}
  @keyframes bossAuraPulse{0%,100%{opacity:.28;}50%{opacity:.58;}}
  @keyframes bossRingPulse{0%,100%{opacity:.3;transform:scale(1);}50%{opacity:.7;transform:scale(1.06);}}
  .vs-badge{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:15px;color:var(--coral);flex-shrink:0;text-shadow:0 1px 3px rgba(0,0,0,0.4);}
  .hp-wrap{display:flex;flex-direction:column;gap:4px;width:100%;}
  .hp-bar-bg{height:16px;border-radius:999px;background:rgba(0,0,0,0.12);overflow:hidden;}
  .hp-bar-fill{height:100%;border-radius:999px;transition:width .4s ease;}
  .hp-bar-fill.player{background:linear-gradient(90deg,#00D9C0,#00A88F);}
  .hp-bar-fill.boss{background:linear-gradient(90deg,#FF4D6D,#B14AFF);}
  @keyframes lungeRight{0%{transform:translateX(0);}35%{transform:translateX(16px) scale(1.15);}100%{transform:translateX(0);}}
  @keyframes lungeLeft{0%{transform:translateX(0);}35%{transform:translateX(-16px) scale(1.15);}100%{transform:translateX(0);}}
  @keyframes shakeHit{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
  @keyframes flashHit{0%,100%{filter:none;}40%{filter:brightness(1.8) saturate(2);}}
  .combatant-icon.attack-right{animation:lungeRight .4s ease;}
  .combatant-icon.attack-left{animation:lungeLeft .4s ease;}
  .combatant-icon.hit-shake{animation:shakeHit .4s ease, flashHit .4s ease;}
  .impact-star{
    position:absolute; top:-10px; right:-10px; font-size:20px; pointer-events:none;
    animation:impactPop .5s ease forwards;
  }
  @keyframes impactPop{0%{transform:scale(0.3) rotate(0deg);opacity:1;}100%{transform:scale(1.6) rotate(30deg);opacity:0;}}
  .impact-particle{
    position:absolute; top:50%; left:50%; font-size:15px; pointer-events:none; z-index:5;
    animation:particleFly .55s ease-out forwards;
  }
  @keyframes particleFly{
    0%{ transform:translate(-50%,-50%) scale(0.6); opacity:1; }
    100%{ transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.15); opacity:0; }
  }
  @keyframes arenaShake{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-5px); }
    40%{ transform:translateX(5px); }
    60%{ transform:translateX(-3px); }
    80%{ transform:translateX(3px); }
  }
  .battle-arena.arena-shake{ animation: arenaShake 0.35s ease-in-out; }
  .battle-arena.low-hp::after{
    content:''; position:absolute; inset:0; border-radius:16px; pointer-events:none; z-index:2;
    box-shadow: inset 0 0 40px 10px rgba(255,45,99,0.55);
    animation: lowHpPulse 1.1s ease-in-out infinite;
  }
  @keyframes lowHpPulse{0%,100%{opacity:0.4;}50%{opacity:0.9;}}
  .hp-text{font-size:11.5px;font-weight:700;color:var(--text-dim);}
  .battle-arena.dark .hp-text{color:#D8CFFF;}
  .node-disabled{cursor:default;}
  .q-card{margin-top:6px;}
  .q-text{font-size:24px;font-weight:700;line-height:1.4;margin-bottom:20px;font-family:'Baloo 2',sans-serif;}
  .passage-box{
    background:var(--panel-tint); border:2px solid #D9CFFF; border-radius:14px;
    padding:16px 18px; margin-bottom:16px; font-size:16px; line-height:1.7; color:var(--text-dark);
  }
  .passage-label{font-weight:800;font-size:12.5px;text-transform:uppercase;letter-spacing:0.6px;color:var(--violet);margin-bottom:8px;}
  .diagram-box{
    background:#fff; border:2px solid #D9CFFF; border-radius:14px;
    padding:12px; margin-bottom:16px; display:flex; justify-content:center;
  }
  .diagram-box svg{max-width:100%; height:auto; display:block;}
  .choice{
    display:block; width:100%; text-align:left; padding:16px 19px; margin-bottom:12px;
    border-radius:14px; border:2px solid #E1DBFF; background:#FBFAFF; cursor:pointer;
    font-size:18px; font-family:inherit; color:var(--text-dark); transition:all .12s ease;
    font-weight:600;
  }
  .choice:hover{border-color:var(--violet); transform:translateX(3px); box-shadow:0 4px 14px rgba(124,92,255,0.18);}
  .choice.correct{background:linear-gradient(135deg,#DFFBF3,#C8F5E8);border-color:var(--teal); box-shadow:0 4px 16px rgba(0,217,192,0.3);}
  .choice.incorrect{background:linear-gradient(135deg,#FFE4EA,#FFD1DC);border-color:var(--coral); box-shadow:0 4px 16px rgba(255,77,109,0.25);}
  .choice:disabled{cursor:default;}
  .explain{
    margin-top:14px; padding:15px 17px; border-radius:14px; background:var(--panel-tint);
    font-size:14px; border-left:5px solid var(--violet); font-weight:500;
  }

  .match-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .match-col{display:flex;flex-direction:column;gap:10px;}
  .match-btn{
    padding:14px 12px; border-radius:12px; border:2px solid #E1DBFF; background:#FBFAFF;
    font-family:inherit; font-size:14px; font-weight:600; color:var(--text-dark); cursor:pointer;
    text-align:center; transition:all .15s ease; min-height:56px; display:flex; align-items:center; justify-content:center;
  }
  .match-btn.def{font-size:12.5px; font-weight:500; line-height:1.3;}
  .match-btn:hover:not([disabled]){border-color:var(--amber); transform:translateY(-1px);}
  .match-btn.selected{border-color:var(--amber); background:linear-gradient(135deg,#FFF3D6,#FFE7A8); box-shadow:0 0 0 2px var(--amber);}
  .match-btn.matched{background:linear-gradient(135deg,#DFFBF3,#C8F5E8); border-color:var(--teal); opacity:0.7; cursor:default;}
  .match-btn.wrong{background:linear-gradient(135deg,#FFE4EA,#FFD1DC); border-color:var(--coral); animation:shakeHit .4s ease;}
  @media (max-width:600px){ .match-btn{font-size:12.5px; padding:10px 8px; min-height:48px;} }
  .guidance ul{margin:6px 0 0; padding-left:18px;}
  textarea{
    width:100%; min-height:110px; border-radius:12px; border:2px solid #E1DBFF;

  }
  textarea:focus{outline:none;border-color:var(--violet);}

  .progressbar{height:10px;border-radius:999px;background:var(--panel-tint);overflow:hidden;margin-bottom:16px;}
  .progressbar > div{height:100%;background:linear-gradient(90deg, var(--violet), var(--teal));
    background-size:200% 100%; animation:shimmer 1.6s linear infinite;}

  .summary-stat{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1.5px solid #EDE8FF;font-size:15px;font-weight:600;}
  .summary-stat:last-child{border-bottom:none;}

  .back-link{color:var(--teal-light);cursor:pointer;font-size:13.5px;font-weight:700;display:inline-flex;align-items:center;gap:5px;margin-bottom:14px;}
  .back-link:hover{text-decoration:underline;}

  @media (max-width:600px){
    .q-text{font-size:20px;}
    .choice{font-size:16px;padding:14px 16px;}

  }

  .hidden{display:none !important;}

/* =========================================================================

const trackA = {

    math:{ levels:[
      [ // L0: 2nd grade review — regrouping, skip counting, comparing, time, shapes
        Q('What is 48 + 27?',['65','75','85','95'],1,'Add the ones (8+7=15, regroup 1 ten), then tens: 40+20+10=70, plus 5 = 75.'),
        Q('What is 82 − 47?',['25','35','45','55'],1,'Regroup: 82−47 = 35.'),
        Q('Skip counting by 5s: 5, 10, 15, 20, ___?',['22','24','25','30'],2,'Each step adds 5: 20+5=25.'),
        Q('Which number is greater: 342 or 324?',['342','324','They are equal','Cannot tell'],0,'Comparing tens digits: 342 has 4 tens, 324 has 2 tens, so 342 is greater.'),
        Q('A shape has exactly 3 sides. What shape is it?',['Square','Triangle','Pentagon','Hexagon'],1,'A shape with 3 sides is a triangle.'),
        Q('Jake had 36 marbles in his collection. For his birthday, his friend gave him 28 more. How many marbles does Jake have now?',['54','64','74','84'],1,'Regroup the ones: 6+8=14 (carry 1 ten), then 30+20+10=60, plus 4 = 64.'),
        Q('Grandma starts a photo album with 10 photos, and adds 5 more photos every week. After 3 more weeks, how many photos will be in the album?',['15','20','25','30'],2,'Each week adds 5: 10 + 5 + 5 + 5 = 25.')
      ],
      [ // L1: 3rd grade + SOL — multiplication fluency, area/perimeter, fraction equivalence, time
        Q('A rectangle is 6 units long and 4 units wide. What is its area?',['10 sq units','20 sq units','24 sq units','28 sq units'],2,'Area = length × width = 6 × 4 = 24. (VA SOL 3.7)'),
        Q('Which fraction is equivalent to 1/2?',['2/5','3/6','4/9','5/8'],1,'3/6 simplifies to 1/2 (divide both by 3). (VA SOL 3.3)'),
        Q('A movie starts at 3:45 PM and lasts 1 hour 30 minutes. When does it end?',['4:45 PM','5:00 PM','5:15 PM','5:30 PM'],2,'3:45 + 1:30 = 5:15 PM. (VA SOL 3.10)'),
        Q('What is the perimeter of a square with sides of 9 cm?',['18 cm','27 cm','36 cm','81 cm'],2,'Perimeter = 4 × side = 4 × 9 = 36 cm. (VA SOL 3.7)'),
        Q('9 × 8 = ?',['63','72','81','64'],1,'9 groups of 8 = 72. (VA SOL 3.4)'),
        Q('Mr. Kim is planting vegetables in a rectangular garden that measures 7 feet long and 5 feet wide. How much total space does he have to plant in?',['12 sq ft','24 sq ft','35 sq ft','40 sq ft'],2,'Area = length × width = 7 × 5 = 35 square feet.'),
        Q('Three friends shared a pizza cut into 8 equal slices. They ate 6 slices altogether. What fraction of the pizza is left, in simplest form?',['1/4','2/8','3/4','1/2'],0,'2 slices remain out of 8, and 2/8 simplifies to 1/4.')
      ],
      [ // L2: 4th grade Q1-Q2 — multi-digit mult, division, fraction ops, factors/multiples, decimals intro, geometry
        Q('What is 34 × 6?',['184','194','204','214'],2,'34 × 6 = (30×6)+(4×6) = 180+24 = 204.'),
        Q('84 ÷ 4 = ?',['19','20','21','22'],2,'4 × 21 = 84.'),
        Q('Which of these is a multiple of 6?',['16','21','28','42'],3,'42 ÷ 6 = 7 exactly, so it is a multiple of 6.'),
        Q('3/8 + 2/8 = ?',['5/8','5/16','1/8','6/8'],0,'Same denominator: add the numerators, keep the denominator: 3+2=5, so 5/8.'),
        Q('A shape has 4 right angles and opposite sides equal, but is not a square. What is it most likely?',['Triangle','Rectangle','Pentagon','Circle'],1,'A rectangle has 4 right angles with opposite sides equal — a square is a special rectangle.'),
        Q('Which decimal is the same as the fraction 3/10?',['0.3','0.03','3.10','0.13'],0,'3/10 means 3 tenths, written as 0.3.'),
        Q('What is 503 − 268?',['235','245','335','345'],0,'Regrouping across the zero: 503 − 268 = 235.'),
        Q('Which pair of lines will never cross, no matter how far they extend?',['Perpendicular lines','Parallel lines','Intersecting lines','Curved lines'],1,'Parallel lines stay the same distance apart and never intersect.'),
        Q('A librarian is organizing 27 boxes of books, with 6 books packed in each box. How many books are there in total?',['152','162','172','182'],1,'27 × 6 = (27×6) = 162.'),
        Q('Sophie\'s cookie recipe calls for 7/10 of a cup of flour. What decimal represents 7/10?',['0.7','0.07','7.10','0.17'],0,'7/10 means 7 tenths, written as 0.7.')
      ]
    ], stretch: {prompt:'You run a lemonade stand for one week. On rainy days you sell fewer cups. Design a simple plan: how many cups would you make each day, and why? What pattern do you notice between weather and sales?', guidance:['Look for a pattern (weather → sales) — that\'s systems thinking.','Explain your reasoning, not just your answer.','Bonus: what would you change if lemons got more expensive? (opportunity + tradeoffs)']}},

    science:{ levels:[
      [ // L0: 2nd grade review — living things, seasons, basic needs, materials
        Q('Which of these do plants need to grow?',['Sunlight, water, and soil','Only darkness','Only rocks','Nothing at all'],0,'Plants need sunlight, water, and soil (or another growing medium) to grow.'),

        Q('An animal that eats only plants is called a:',['Carnivore','Herbivore','Omnivore','Predator'],1,'A plant-only eater is a herbivore.'),
        Q('Which material would work best for a raincoat?',['Waterproof plastic','Cotton','Paper','Sponge'],0,'Waterproof plastic repels water, unlike absorbent materials like cotton, paper, or sponge.'),
        Q('Every spring, Grandpa notices the flowers in his yard start to bloom and the days get warmer after the cold winter. Which season is Grandpa noticing?',['Summer','Spring','Fall','Winter'],1,'Flowers blooming and warming temperatures after winter describe spring.'),

        Q('A puppy needs food, water, and shelter to survive and grow. These are examples of an animal\'s:',['Wants','Basic needs','Adaptations','Symbols'],1,'Food, water, and shelter are basic needs every animal requires to survive.'),
        Q('Ice, liquid water, and water vapor are three different:',['Colors','States of matter of the same substance','Types of rocks','Kinds of plants'],1,'Water can exist as a solid (ice), liquid, or gas (vapor) — these are its three states of matter.')
      ],
      [ // L1: 3rd grade + SOL — forces & motion, ecosystems, adaptations, water cycle
        Q('What force pulls objects toward the Earth?',['Friction','Magnetism','Gravity','Tension'],2,'Gravity pulls objects toward the Earth\'s center. (VA SOL 3.2)'),
        Q('A polar bear\'s thick white fur is an example of what?',['A habitat','An adaptation','A food chain','An ecosystem'],1,'An adaptation is a trait that helps a living thing survive in its environment. (VA SOL 3.5)'),
        Q('In a food chain, what is a plant usually called?',['Predator','Producer','Consumer','Decomposer'],1,'Plants make their own food from sunlight, so they are producers. (VA SOL 3.5)'),
        Q('Which step of the water cycle turns liquid water into vapor?',['Condensation','Precipitation','Evaporation','Collection'],2,'Evaporation is when the sun heats water and turns it into vapor. (VA SOL 3.9)'),
        Q('Friction is a force that mostly does what to moving objects?',['Speeds them up','Slows them down','Makes them float','Has no effect'],1,'Friction resists motion between two surfaces, slowing things down. (VA SOL 3.2)'),
        Q('Camila drops a ball off her porch and watches it fall straight to the ground every single time. What force is responsible for pulling it down?',['Friction','Magnetism','Gravity','Tension'],2,'Gravity pulls objects toward the Earth every time, which is why the ball always falls down.'),
        Q('Scientists notice that an arctic fox has thick fur and small ears that help it survive freezing temperatures. What is this an example of?',['A food chain','An adaptation','An ecosystem','A habitat'],1,'A trait that helps a living thing survive its environment is called an adaptation.'),
        Q('A deer bounding away quickly the moment it senses danger is an example of the deer using:',['An adaptation for survival','The rock cycle','An electric circuit','A map key'],0,'Quick escape behavior is an adaptation that helps the deer survive predators.'),
        Q('In the food chain grass → rabbit → fox, what role does the rabbit play?',['A producer that makes its own food','A consumer that eats the grass','A decomposer that breaks down waste','The sun\'s energy source'],1,'The rabbit eats the grass (a producer), making the rabbit a consumer.')
      ],
      [ // L2: 4th grade - energy transfer, VA ecosystems, circuits, rock cycle
        Q('In a simple electric circuit, what must happen for the bulb to light up?',['The circuit must be open','The circuit must be a complete loop','The battery must be removed','The wire must be broken'],1,'Electricity only flows through a closed, complete loop.'),

        Q('Which rock forms when magma or lava cools and hardens?',['Sedimentary','Igneous','Metamorphic','Mineral'],1,'Igneous rock forms from cooled magma or lava.'),
        Q('A Virginia wetland ecosystem is important mainly because it:',['Has no living things','Filters water and supports many species','Only exists near mountains','Cannot support plant life'],1,'Wetlands filter pollutants and provide habitat for many species.'),
        Q('If you wanted to test whether plants grow better in sun or shade, what should you keep the same?',['Nothing — everything should change','The type of plant, soil, and water given','The location only','The color of the pot only'],1,'A fair test changes only one variable (sunlight) and keeps everything else the same.'),
        Q('Amara built a flashlight circuit for a science project, but the bulb won\'t light up no matter what she tries. What is most likely wrong with her circuit?',['It is too bright','It is not a complete, closed loop','It has too much electricity','The bulb is too small'],1,'A bulb only lights when the circuit forms a complete, unbroken loop for electricity to flow through.'),
        Q('While hiking near a river, Diego finds a smooth gray rock that a geologist tells him formed from cooled lava long ago. What type of rock did Diego most likely find?',['Sedimentary','Igneous','Metamorphic','Soil'],1,'Rock that forms from cooled lava or magma is igneous rock.'),

    reading:{ levels:[
      [ // L0: 2nd grade review — synonyms/antonyms, sequencing, simple character feelings
        Q('Which word means almost the same as "big"?',['Large','Tiny','Quiet','Slow'],0,'"Large" is a synonym for "big."'),

        Q('"Sam smiled and jumped up and down when he got the present." How did Sam feel?',['Sad','Bored','Happy and excited','Angry'],2,'Smiling and jumping up and down show excitement and happiness.'),
        Q('The most important character in a story is called the:',['Setting','Main character','Title','Author'],1,'The main character is the central person (or animal) the story follows.'),
        Q('What is the opposite (antonym) of "hot"?',['Warm','Cold','Sunny','Bright'],1,'"Cold" is the opposite of "hot."'),
        Q('What did Mia do every morning to help her seeds grow?',['Sang to them','Watered them and made sure they got sunlight','Talked to her neighbors','Painted the pots'],1,'The passage says she watered them and made sure they got plenty of sunlight.',"Mia planted three tiny seeds in her backyard. Every morning, she watered them and made sure they got plenty of sunlight. After two weeks, Mia noticed small green sprouts poking out of the soil. She jumped with joy! By the end of summer, Mia's garden was full of bright red tomatoes and yellow flowers. She proudly shared her tomatoes with her neighbors."),
        Q('How did Mia feel when she saw the sprouts?',['Angry','Bored','Joyful','Scared'],2,'The passage says she "jumped with joy," showing she felt joyful.',"Mia planted three tiny seeds in her backyard. Every morning, she watered them and made sure they got plenty of sunlight. After two weeks, Mia noticed small green sprouts poking out of the soil. She jumped with joy! By the end of summer, Mia's garden was full of bright red tomatoes and yellow flowers. She proudly shared her tomatoes with her neighbors."),
        Q('Which word means the opposite (antonym) of "fast"?',['Quick','Slow','Loud','Happy'],1,'"Slow" is the opposite of "fast."'),
        Q('"Ben felt his stomach flip when he saw the roller coaster." How does Ben most likely feel?',['Bored','Nervous or excited','Angry','Sleepy'],1,'A "stomach flip" is a common way to describe nervous excitement.')
      ],
      [ // L1: 3rd grade + SOL — main idea, simile, setting, context clues
        Q('"Maria was nervous before her piano recital, but she took a deep breath and walked on stage." How did Maria most likely feel after the deep breath?',['More nervous','A little calmer','Angry','Confused'],1,'Taking a deep breath is a strategy people use to calm nerves. (VA SOL 3.5)'),
        Q('The main idea of a paragraph is usually:',['A tiny, unimportant detail','The most important point the paragraph is making','Always the last word','Never related to the title'],1,'The main idea is the central point the author wants readers to understand. (VA SOL 3.5)'),
        Q('If a story says a character "sulked in the corner," the character most likely feels:',['Excited','Upset or sullen','Proud','Curious'],1,'"Sulked" suggests the character is upset or moody.'),
        Q('What do we call the time and place where a story happens?',['Plot','Setting','Theme','Conflict'],1,'Setting refers to when and where a story takes place. (VA SOL 3.5)'),
        Q('Which sentence uses a simile?',['The wind howled like a wolf.','The wind was loud.','It was windy today.','The wind blew hard.'],0,'A simile compares two things using "like" or "as."'),
        Q('Why was Jayden nervous at first?',['He didn\'t like his friends','He had never been on a big field trip before','He was late for the bus','He forgot his lunch'],1,'The passage states Jayden was nervous because he had never been on a big field trip before.',"On Friday, Mr. Bennett's class took a trip to the science museum. At first, Jayden was nervous because he had never been on a big field trip before. But once they arrived, he saw a giant dinosaur skeleton and forgot all about his nerves. He asked the museum guide so many questions that his friends started calling him 'Dr. Jayden.' By the end of the day, Jayden decided that when he grew up, he wanted to study dinosaurs for a living."),
        Q('What is the best word to describe Jayden by the end of the passage?',['Fearful','Curious','Careless','Angry'],1,'Asking many questions and wanting to study dinosaurs shows Jayden became curious.',"On Friday, Mr. Bennett's class took a trip to the science museum. At first, Jayden was nervous because he had never been on a big field trip before. But once they arrived, he saw a giant dinosaur skeleton and forgot all about his nerves. He asked the museum guide so many questions that his friends started calling him 'Dr. Jayden.' By the end of the day, Jayden decided that when he grew up, he wanted to study dinosaurs for a living."),
        Q('Which sentence contains a metaphor?',['The classroom was a zoo during recess prep.','The classroom was noisy like a zoo.','The classroom was very noisy.','The classroom had animals in it.'],0,'This directly compares the classroom to a zoo without "like" or "as," making it a metaphor.'),
        Q('A story\'s main problem that the character must solve is called the:',['Setting','Conflict','Theme','Resolution'],1,'The conflict is the central problem or struggle the character faces.')

      [ // L2: 4th grade complexity — inference, text structure, figurative language, persuasion

// TRACKS now resolves dynamically per-player based on their chosen grade,
// rather than being a fixed 3-slot object — this lets any number of players
// be created, each independently picking grade 3, 4, or 6.
const TRACKS = new Proxy({}, {
  get(target, playerId){
    const p = (typeof state !== 'undefined' && state.profiles) ? state.profiles[playerId] : null;
    const grade = (p && p.grade) ? p.grade : 3;
    return GRADE_TRACKS[grade] || GRADE_TRACKS[3];

});

/* =========================================================================
   PROCEDURAL MATH GENERATOR
   Hand-authoring 500 unique, correct questions per tier isn't realistic in
   one pass — but math problems are highly templatable, so this generates
   effectively unlimited, verifiably-correct unique problems per tier by
   randomizing numbers within each tier's existing topic scope. Every
   generated question's answer is computed programmatically (not guessed),
   and duplicates are filtered out by question text.
   ========================================================================= */
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function choose(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function buildMCQ(correctLabel, distractorLabels){
  correctLabel = String(correctLabel);
  const uniqueDistractors = [...new Set(distractorLabels.map(String))].filter(d=>d!==correctLabel).slice(0,3);
  // Some fact categories genuinely only have 2 or 3 total possible values
  // (e.g. state of matter: solid/liquid/gas), so 3 real distractors aren't
  // always available. Rather than fabricate a fake placeholder option like
  // "label_0" (which looks broken to a kid), just return a smaller but
  // fully legitimate set of choices — a clean 2 or 3-choice question beats
  // a 4-choice question with one nonsense answer.
  const options = shuffle([correctLabel, ...uniqueDistractors]);
  return { c: options, a: options.indexOf(correctLabel) };
}

function genAddition(minA,maxA,minB,maxB){

  return Q(`What is ${a} + ${b}?`, c, ai, `${a} + ${b} = ${ans}.`);
}
function genSubtraction(minA,maxA,minGap,maxGap){
  const a=randInt(minA,maxA), b=randInt(minGap, Math.max(minGap,Math.min(maxGap, a-1)));
  const ans=a-b;
  const {c,a:ai}=buildMCQ(ans, [ans+10,ans-10,ans+1]);
  return Q(`What is ${a} − ${b}?`, c, ai, `${a} − ${b} = ${ans}.`);
}
function genMultiplication(minA,maxA,minB,maxB){

  return Q(`What is ${a} × ${b}?`, c, ai, `${a} × ${b} = ${ans}.`);
}
function genDivision(minDivisor,maxDivisor,minQuotient,maxQuotient){

  const {c,a:ai}=buildMCQ(q, [q+1,q-1,q+2]);
  return Q(`${a} ÷ ${b} = ?`, c, ai, `${b} × ${q} = ${a}, so ${a} ÷ ${b} = ${q}.`);
}
function genCompare(minV,maxV){

  const bigger = Math.max(a,b);
  const opts=[String(a),String(b),'They are equal','Cannot tell'];
  const ai = a>b?0:1;
  return Q(`Which number is greater: ${a} or ${b}?`, opts, ai, `${bigger} is greater.`);
}
function genSkipCounting(step,startMin,startMax){

  return Q(`Skip counting by ${step}s: ${seq.join(', ')}, ___?`, c, ai, `Each step adds ${step}: ${seq[3]}+${step}=${ans}.`);
}
function genAreaRect(minSide,maxSide){

}

}
function genPerimeterSquare(minSide,maxSide){

function gcd(a,b){ return b===0 ? a : gcd(b, a%b); }
function coprimeFractionBases(maxDenom){
  const bases=[];
  for(let d=2; d<=maxDenom; d++){
    for(let n=1; n<d; n++){ if(gcd(n,d)===1) bases.push([n,d]); }
  }
  return bases;
}
function genFractionEquivalence(){

  const {c,a:ai}=buildMCQ(correct, [`${n*k+1}/${d*k}`, `${n}/${d*k}`, `${n*k}/${d*k+1}`]);
  return Q(`Which fraction is equivalent to ${n}/${d}?`, c, ai, `${n}/${d} scaled by ${k} is ${n*k}/${d*k}.`);
}
function genFractionAddSameDenom(){

}

function genMean(avgMin,avgMax){
  const avg=randInt(avgMin,avgMax), total=avg*5;
  let vals=[], remaining=total;
  for(let i=0;i<4;i++){
    const maxV=Math.max(1, Math.min(remaining-(4-i), avg*2));
    const v=randInt(1,maxV);
    vals.push(v); remaining-=v;
  }
  if(remaining<1) return genMean(avgMin,avgMax);
  vals.push(remaining);
  const {c,a:ai}=buildMCQ(avg, [avg+1,avg-1,avg+2]);
  return Q(`What is the mean (average) of ${shuffle(vals).join(', ')}?`, c, ai, `Sum = ${total}, divided by 5 values = ${avg}.`);
}

function genSynonym(){

  const d1 = choose(distractorPool), d2 = choose(distractorPool.filter(x=>x!==d1));
  const phrasing = choose([

  const {c,a} = buildMCQ(syn, [d1,d2,word+'ish']);

  const d1 = choose(distractorPool), d2 = choose(distractorPool.filter(x=>x!==d1));

function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function genCapitalization(){
  const name = choose(PROPER_NAMES), place = choose(PROPER_PLACES);
  const nameLower = name.toLowerCase(), placeLower = place.toLowerCase();
  const templates = [
    { correct:`${name} visited ${place} last summer.`, wrong:[`${nameLower} visited ${placeLower} last summer.`, `${name} visited ${place} Last Summer.`, `${nameLower} Visited ${place} last summer.`] },
    { correct:`My friend ${name} lives near ${place}.`, wrong:[`My friend ${nameLower} lives near ${placeLower}.`, `my friend ${name} lives near ${place}.`, `My friend ${name} Lives near ${place}.`] }
  ];
  const t = choose(templates);
  const {c,a} = buildMCQ(t.correct, t.wrong);
  // The name/place are embedded in the question stem itself (not just the
  // choices) so each combination generates a genuinely distinct question —
  // otherwise every instance would look identical to the uniqueness check.
  return Q(`Which sentence about ${name} and ${place} uses capitalization correctly?`, c, a, 'Proper nouns (names and places) and the first word of a sentence should be capitalized.');

function genPunctuationList(){
  const itemBank = ['apples','bananas','grapes','carrots','pretzels','sandwiches','cookies','oranges','crackers','pears','muffins','berries','peaches','nuts','raisins'];
  const items = shuffle(itemBank).slice(0,3);

  const wrong1 = `I packed ${items[0]} ${items[1]} and ${items[2]} for the trip.`;

  const {c,a} = buildMCQ(correct, [wrong1, wrong2, wrong3]);
  return Q(`Which sentence about packing ${items[0]}, ${items[1]}, and ${items[2]} uses commas correctly?`, c, a, 'Items in a list are separated by commas, including before "and."');

function genSubjectVerbAgreement(){
  const singularSubjects = ['The dog','My teacher','She','He','The bird','A student','The chef','My neighbor','The artist','The doctor','My cousin','The pilot','The farmer','My uncle','The coach'];
  const pluralSubjects = ['The dogs','My teachers','They','We','The birds','The students','The chefs','My neighbors','The artists','The doctors','My cousins','The pilots','The farmers','My uncles','The coaches'];
  const verbPairs = [['runs','run'],['jumps','jump'],['sings','sing'],['reads','read'],['writes','write'],['plays','play'],['cooks','cook'],['paints','paint'],['travels','travel'],['teaches','teach'],['builds','build'],['dances','dance']];
  const usePlural = Math.random()<0.5;
  const idx = Math.floor(Math.random()*singularSubjects.length);
  const subject = usePlural ? pluralSubjects[idx] : singularSubjects[idx];
  const [singularVerb, pluralVerb] = choose(verbPairs);
  const correctVerb = usePlural ? pluralVerb : singularVerb;
  const wrongVerb = usePlural ? singularVerb : pluralVerb;
  const correct = `${subject} ${correctVerb} every day.`;
  const wrong = `${subject} ${wrongVerb} every day.`;
  const {c,a} = buildMCQ(correct, [wrong]);
  return Q(`Which sentence uses correct subject-verb agreement for "${subject}" with the verb "${singularVerb.replace(/s$/,'')}"?`, c, a, `"${subject}" requires the verb form "${correctVerb}."`);
}

function genWorldCapital(){
  const [country, capital] = choose(WORLD_CAPITAL_TABLE);
  const distractors = shuffle(WORLD_CAPITAL_TABLE.filter(x=>x[0]!==country)).slice(0,3).map(x=>x[1]);
  const phrasing = choose([
    `What is the capital of ${country}?`,
    `Which city is the capital of ${country}?`,
    `${cap(country)}'s capital city is which of these?`
  ]);
  const {c,a} = buildMCQ(capital, distractors);
  return Q(phrasing, c, a, `${capital} is the capital of ${country}.`);
}
function genHistoricalFigure(){
  const [figure, achievement] = choose(HISTORICAL_FIGURE_TABLE);
  const distractors = shuffle(HISTORICAL_FIGURE_TABLE.filter(x=>x[0]!==figure)).slice(0,3).map(x=>x[0]);
  const phrasing = choose([
    `Who is known for ${achievement}?`,
    `Which historical figure is credited with ${achievement}?`,
    `History remembers which person for ${achievement}?`
  ]);
  const {c,a} = buildMCQ(figure, distractors);
  return Q(phrasing, c, a, `${figure} is known for ${achievement}.`);

function genPresidentOrder(){
  const [name, order] = choose(PRESIDENT_ORDER_TABLE);
  const mode = choose(['byName','byOrder']);
  if(mode==='byName'){
    const distractors = shuffle(PRESIDENT_ORDER_TABLE.filter(x=>x[0]!==name)).slice(0,3).map(x=>ordinalSuffix(x[1]));
    const {c,a} = buildMCQ(ordinalSuffix(order), distractors);
    return Q(`${name} was the which president of the United States?`, c, a, `${name} was the ${ordinalSuffix(order)} U.S. President.`);
  } else {
    const distractors = shuffle(PRESIDENT_ORDER_TABLE.filter(x=>x[0]!==name)).slice(0,3).map(x=>x[0]);
    const {c,a} = buildMCQ(name, distractors);
    return Q(`Who was the ${ordinalSuffix(order)} President of the United States?`, c, a, `${name} was the ${ordinalSuffix(order)} U.S. President.`);
  }
}

function genWordDefinition(table){
  const [word, correct, w1, w2, w3] = choose(table);
  const phrasing = choose([
    `What does the word "${word}" mean?`,

    `If someone is described as "${word}," what does that mean?`

function genContextClue(){
  const item = choose(CONTEXT_CLUE_TABLE);
  const phrasing = choose([
    `Based on context clues, which word best completes the sentence: "${item.sentence}"`,
    `Which word makes the most sense in this sentence: "${item.sentence}"`
  ]);
  const {c,a} = buildMCQ(item.answer, item.distractors);
  return Q(phrasing, c, a, `The rest of the sentence gives clues that "${item.answer}" is the best fit.`);
}
function genTextStructure(){
  const item = choose(TEXT_STRUCTURE_TABLE);
  const allStructures = ['Sequence','Compare and contrast','Cause and effect','Problem and solution','Description'];
  const distractors = shuffle(allStructures.filter(s=>s!==item.structure)).slice(0,3);
  const phrasing = choose([
    `Which text structure does this passage use: "${item.sentence}"`,
    `How is this passage organized: "${item.sentence}"`
  ]);
  const {c,a} = buildMCQ(item.structure, distractors);
  return Q(phrasing, c, a, `This passage is organized using ${item.structure.toLowerCase()} structure.`);
}

    ];

}

function fillMathLevelToTarget(levelArr, generators, target){
  const seen = new Set(levelArr.map(q=>q.q));
  let attempts=0;
  while(levelArr.length<target && attempts<target*25){
    attempts++;
    const gen = choose(generators);
    let q;
    try{ q = gen.fn(); }catch(e){ continue; }
    if(!q || seen.has(q.q)) continue;
    q._concept = gen.concept;
    seen.add(q.q);
    levelArr.push(q);
  }
}

    Q('A shirt costs $40. It goes on sale for 25% off, then an additional 10% off the sale price. What is the final price?',['$27','$26','$30','$24'],0,'First 25% off: $40×0.75=$30. Then 10% off that: $30×0.9=$27. (Adding the percentages to get "35% off" and computing $26 is a very common mistake — sequential discounts don\'t simply add together.)'),
    Q('What is the ratio 15:20 written in simplest form?',['3:4','15:20','5:4','4:3'],0,'Dividing both sides by their greatest common factor (5): 15÷5=3, 20÷5=4, giving 3:4.'),
    Q('What is −3 × 4 + (−2)?',['−14','−10','10','14'],0,'−3×4=−12, then −12+(−2)=−14. (Sign errors during multiplication are a common trap.)'),
    Q('The mean of 5 test scores is 82. Four of the scores are 78, 85, 90, and 80. What is the fifth score?',['77','80','82','85'],0,'The sum needed is 5×82=410. The known four sum to 333, so the fifth score is 410−333=77.'),
    Q('What is −10 ÷ (−2)?',['5','−5','−20','20'],0,'A negative divided by a negative is positive: −10÷−2=5.'),
    Q('A map has a scale of 1 inch = 20 miles. Two cities are 3.5 inches apart on the map. How far apart are they in real life?',['70 miles','60 miles','23.5 miles','17.5 miles'],0,'3.5 × 20 = 70 miles.'),
    Q('What is 4 − 9?',['−5','5','−13','13'],0,'4−9=−5. (Computing 9−4=5 and forgetting the sign is a very common mistake.)')
  ];
  const mathTrickL2 = [
    Q('Solve for x: 3x + 5 = 20',['x = 5','x = 8.33','x = 7.5','x = 15'],0,'3x=20−5=15, so x=15÷3=5. (Dividing 20÷3 before subtracting 5 gives trap answers like 7.5.)'),
    Q('What is the slope of a line that passes through (2, 3) and (6, 11)?',['2','8','4','0.5'],0,'Slope = (11−3)/(6−2) = 8/4 = 2. (Forgetting to divide, or dividing the wrong way, are common traps.)'),
    Q('If f(x) = 2x² − 3, what is f(3)?',['15','9','33','3'],0,'f(3) = 2(3)² − 3 = 2(9) − 3 = 18 − 3 = 15. (Computing (2×3)² instead of 2×(3²) gives the trap answer 33.)'),
    Q('Simplify: 4(x + 3) − 2x',['2x + 12','2x + 3','6x + 12','2x + 6'],0,'4(x+3)=4x+12. Then 4x+12−2x=2x+12. (Forgetting to distribute to both terms is a common mistake.)'),
    Q('Solve for x: 2(x − 4) = 10',['x = 9','x = 5','x = 7','x = 3'],0,'2x−8=10, so 2x=18, so x=9. (Forgetting to distribute the 2 gives trap answers like x=14 or x=5.)'),
    Q('What is the slope of a line that passes through (−1, 4) and (3, −4)?',['−2','2','−0.5','0.5'],0,'Slope = (−4−4)/(3−(−1)) = −8/4 = −2. (Sign errors when subtracting negative coordinates are a common trap.)'),
    Q('If f(x) = 3x − 5, for what value of x does f(x) = 10?',['x = 5','x = 15','x = 1.67','x = 3.33'],0,'3x−5=10, so 3x=15, so x=5.'),
    Q('Simplify: 5x − 2(x + 4)',['3x − 8','3x + 8','7x − 8','3x − 4'],0,'5x−2x−8=3x−8. (Forgetting to distribute the negative sign to both terms gives trap answers like 3x+8.)'),
    Q('Solve for x: x/3 + 4 = 9',['x = 15','x = 39','x = 5','x = 27'],0,'x/3=5, so x=15. (Multiplying 9 by 3 before subtracting 4 gives the trap answer 27.)'),
    Q('What is the y-intercept of the line y = 4x − 7?',['−7','7','4','−4'],0,'In slope-intercept form y=mx+b, b is the y-intercept: −7. (Confusing the slope and y-intercept is a common mistake.)'),
    Q('If f(x) = x² + 2x, what is f(−3)?',['3','15','−3','−15'],0,'f(−3)=(−3)²+2(−3)=9−6=3. (Forgetting that a negative squared is positive gives the trap answer −15.)'),
    Q('Solve for x: 7 − 2x = 1',['x = 3','x = 4','x = −3','x = −4'],0,'−2x=1−7=−6, so x=(−6)/(−2)=3. (Sign errors when moving terms across the equals sign are a common trap.)')
  ];
  const mathTrickL3 = [
    Q('A triangle has a base of 10 cm and a height of 6 cm. What is its area?',['30 cm²','60 cm²','16 cm²','48 cm²'],0,'Area of a triangle = ½ × base × height = ½ × 10 × 6 = 30 cm². (Forgetting the ½ gives the trap answer 60 cm².)'),
    Q('Two angles are complementary. If one measures 35°, what is the measure of the other?',['55°','145°','65°','325°'],0,'Complementary angles sum to 90°: 90−35=55°. (Confusing complementary with supplementary and computing 180−35=145° is a very common trap.)'),
    Q('A triangular prism has a triangular base with an area of 20 cm² and a length of 8 cm. What is its volume?',['160 cm³','28 cm³','80 cm³','200 cm³'],0,'Volume of a prism = base area × length = 20×8=160 cm³.'),
    Q('A fence needs posts every 4 feet along a straight 40-foot wall, including posts at both ends. How many posts are needed?',['11','10','9','12'],0,'There are 40÷4=10 gaps, which requires 10+1=11 posts. (Forgetting the "+1" for a fence-post problem is a classic mistake, giving the trap answer 10.)'),
    Q('Two angles are supplementary. If one measures 112°, what is the measure of the other?',['68°','78°','22°','258°'],0,'Supplementary angles sum to 180°: 180−112=68°. (Confusing supplementary with complementary is a very common trap.)'),
    Q('A triangle has a base of 14 cm and an area of 42 cm². What is its height?',['6 cm','3 cm','84 cm','1.5 cm'],0,'Area=½×base×height, so 42=½×14×h=7h, so h=6 cm. (Forgetting to account for the ½ gives the trap answer 3 cm.)'),
    Q('A triangular flower bed has the same base (8 m) and height (5 m) as a rectangular garden\'s width and length. What is the area of the triangular flower bed?',['20 m²','40 m²','13 m²','26 m²'],0,'Triangle area = ½ × base × height = ½ × 8 × 5 = 20 m². (Using the rectangle formula instead of the triangle formula gives the trap answer 40 m².)'),
    Q('A cube has a volume of 64 cm³. What is the area of one of its faces?',['16 cm²','64 cm²','32 cm²','8 cm²'],0,'Side length = cube root of 64 = 4 cm. Area of one face = 4×4=16 cm². (Confusing volume with face area is a common trap.)'),
    Q('A triangular sign has angles measuring 40° and 65°. What is the measure of the third angle?',['75°','105°','115°','180°'],0,'A triangle\'s angles sum to 180°: 180−40−65=75°.'),
    Q('Fence posts are needed every 6 meters around a CLOSED rectangular field with a perimeter of 60 meters. How many posts are needed?',['10','11','9','60'],0,'For a closed loop, the number of posts equals the number of gaps: 60÷6=10. (Unlike an open fence, no extra "+1" is needed for a closed shape — this trips up many students who just learned the open-fence rule.)')
  ];
  trackC.subjects.math.levels[0].push(...mathTrickL0);
  trackC.subjects.math.levels[1].push(...mathTrickL1);
  trackC.subjects.math.levels[2].push(...mathTrickL2);
  trackC.subjects.math.levels[3].push(...mathTrickL3);

  const scienceTrick = [
    Q('Which of the following is NOT a state of matter?',['Solid','Liquid','Gas','Energy'],3,'Energy is not a state of matter — solid, liquid, gas, and plasma are the states of matter.'),
    Q('A ball is thrown straight up. At the very top of its path, what is its velocity?',['At its maximum','Zero','Constant throughout','Negative'],1,'At the peak, the ball momentarily stops before falling, so its velocity is zero — a common misconception is that it\'s still moving upward at that instant.'),
    Q('Which of these is a chemical change, NOT a physical change?',['Melting ice','Tearing paper','Rusting iron','Boiling water'],2,'Rusting forms a new substance (iron oxide), making it a chemical change. The others are physical changes.'),
    Q('Ignoring air resistance, how does the mass of two different objects affect how fast they fall?',['Heavier objects always fall faster','They fall at the same rate regardless of mass','Lighter objects always fall faster','Falling speed depends on color, not mass'],1,'Without air resistance, gravity accelerates all objects at the same rate regardless of mass — confusing weight with falling speed is a classic misconception.'),
    Q('A metal spoon and a wooden spoon are both at room temperature. Why does the metal spoon feel colder?',['The metal spoon is actually colder','Metal conducts heat away from your hand faster than wood does','Wood generates its own heat','Metal has a naturally lower temperature'],1,'Both spoons are the same temperature — metal just conducts heat away from your hand faster, making it feel colder even though it isn\'t.'),
    Q('Which of the following is NOT one of Newton\'s three laws of motion?',['An object in motion stays in motion unless acted on by a force','For every action there is an equal and opposite reaction','Force equals mass times acceleration','Energy cannot be created or destroyed'],3,'Conservation of energy is a separate scientific law, not one of Newton\'s three laws of motion — a common mix-up.'),
    Q('Most of a plant\'s mass actually comes from which source?',['Nutrients absorbed from the soil','Carbon dioxide from the air, used in photosynthesis','Water alone','Sunlight directly turning into matter'],1,'Most of a plant\'s mass comes from carbon dioxide captured from the air during photosynthesis, not from the soil — a very common misconception.'),
    Q('Which of these is NOT true about Earth\'s seasons?',['Seasons are caused by Earth\'s tilted axis','Earth is closer to the Sun in summer than in winter (Northern Hemisphere)','The tilt causes different hemispheres to receive more direct sunlight at different times','Seasons are opposite in the Northern and Southern Hemispheres'],1,'Seasons are caused by Earth\'s axial tilt, NOT distance from the Sun — Earth is actually slightly closer to the Sun during Northern Hemisphere winter, contrary to the common assumption.'),
    Q('Which gas makes up most of Earth\'s atmosphere?',['Oxygen','Nitrogen','Carbon dioxide','Hydrogen'],1,'Nitrogen makes up about 78% of the atmosphere — many people mistakenly assume it\'s oxygen (about 21%).'),
    Q('Does the Moon produce its own light?',['Yes, it glows from internal heat','No, it only reflects sunlight','Yes, it is a small star','Its light comes from Earth\'s reflection'],1,'The Moon has no light of its own — it only reflects sunlight, a very common misconception.')
  ];
  const historyTrick = [
    Q('Which statement about the Declaration of Independence is FALSE?',['It was adopted in 1776','It declared the colonies\' independence from Britain','It immediately ended the Revolutionary War','Thomas Jefferson was its primary author'],2,'The Declaration did not end the war — fighting continued for years until the Treaty of Paris in 1783, a common misconception.'),
    Q('Which is more historically accurate about Columbus and the shape of the Earth?',['Columbus was the first to discover the Earth is round','Educated Europeans already knew the Earth was round before his voyage','The Earth was believed to be flat until the 1900s','His voyage was primarily about proving Earth\'s shape'],1,'Educated people already knew the Earth was round before Columbus — his voyage aimed to find a new trade route, not prove Earth\'s shape.'),
    Q('Which of these was NOT a cause of World War I?',['Alliances between European powers','The assassination of Archduke Franz Ferdinand','Nationalism and militarism in Europe','The attack on Pearl Harbor'],3,'Pearl Harbor was an event of World War II (1941), not World War I — a common mix-up between the two world wars.'),
    Q('What is a more accurate view of the Middle Ages than "a period with zero progress"?',['It saw real advances in architecture, universities, and technology','No progress happened anywhere in the world during this era','Only warfare technology advanced','The "Dark Ages" label accurately describes the entire world at this time'],0,'The Middle Ages included real advances like Gothic architecture, the first universities, and new technologies — the "no progress" idea is an oversimplified myth.'),
    Q('Which of these events happened FIRST?',['The signing of the U.S. Constitution','The American Civil War','World War I','The Great Depression'],0,'The Constitution was signed in 1787, before the Civil War (1861-65), WWI (1914-18), and the Great Depression (1929).'),
    Q('Where did the Renaissance actually begin?',['Italy','France','England','Germany'],0,'The Renaissance began in Italy in the 14th century before spreading across Europe.'),
    Q('Which of these is NOT one of the three branches of the U.S. federal government?',['Legislative','Executive','Judicial','Regional'],3,'"Regional" is not a branch of government — the three branches are legislative, executive, and judicial.'),
    Q('Which statement about the Cold War is most accurate?',['The U.S. and Soviet Union fought each other directly in major battles','It was primarily political tension and indirect conflict, without direct large-scale fighting between the two superpowers','It lasted only two years','It ended immediately after World War II began'],1,'The "Cold War" is called that because it was fought mainly through political tension, proxy wars, and an arms race — not direct battles between the U.S. and USSR.'),
    Q('Why did American colonists use the phrase "no taxation without representation"?',['They opposed all taxation forever','They objected to being taxed by a Parliament in which they had no elected representatives','They wanted to raise their own taxes higher','It referred only to taxes on foreign goods'],1,'Colonists weren\'t opposed to taxation itself — they objected to being taxed without elected representatives who could vote on those taxes.'),
    Q('What is more historically accurate about the fall of the Roman Empire?',['The Western Roman Empire gradually declined by 476 CE, while the Eastern (Byzantine) Empire continued for centuries after','The whole Roman Empire fell instantly in 476 CE','Rome never actually declined','Both halves fell on the exact same date'],0,'The West\'s fall was gradual, and the Eastern half (Byzantine Empire) continued for nearly another thousand years — a common misconception treats the "fall of Rome" as one sudden event.')
  ];
  const readingTrick = [
    Q('In the sentence "Although it was raining, the game continued," what does "although" signal?',['The game was cancelled','A contrast between two ideas','That there is no dependent clause','That the rain caused the game to end'],1,'"Although" signals contrast — despite the rain, the game continued, not the opposite.'),
    Q('Which term describes a narrator whose account should be questioned rather than automatically trusted?',['Omniscient narrator','Unreliable narrator','First-person narrator','Objective narrator'],1,'An "unreliable narrator" may be biased, mistaken, or dishonest — not all narrators, especially first-person ones, are automatically trustworthy.'),
    Q('What is the best definition of "irony"?',['When something happens exactly as expected','A contrast between what is expected and what actually happens','A type of rhyme scheme','A synonym for coincidence'],1,'Irony involves a contrast between expectation and reality, not simply any surprising event — a common misuse of the term.'),
    Q('Does a long text automatically have a more complicated main idea?',['Yes, length always equals complexity','No — good readers identify the central idea regardless of length','Yes, so long texts should be skipped','Only the first sentence matters'],1,'Text length doesn\'t necessarily indicate complexity — the central idea can be identified by looking at how details support it, regardless of length.'),
    Q('What best distinguishes a "theme" from a "topic"?',['They mean the same thing','A topic is the subject matter; a theme is the deeper message about that subject','A theme is always stated directly in the title','A topic can only apply to nonfiction'],1,'A topic is WHAT a text is about; a theme is the deeper insight or lesson the text conveys ABOUT that topic.'),
    Q('Must a text written in first person always be true/nonfiction?',['Yes, first person can only be used in autobiographies','No — fiction can also be written in first person using an invented narrator','Yes, first-person narration is always accurate','No, only poems use first person'],1,'Fiction is often written in first person with a made-up narrator — point of view doesn\'t determine whether a text is fiction or nonfiction.'),
    Q('Which sentence contains a logical inconsistency?',['"All birds can fly, so penguins, which are birds, can fly."','"The sky is blue during a clear day."','"She studied hard, so she felt prepared for the test."','"It rained, so the ground got wet."'],0,'Not all birds can fly (penguins can\'t), so the starting premise is false, making the conclusion unreliable — a classic logical fallacy.'),
    Q('Do an author\'s opinions and a narrator\'s opinions always match?',['Yes, always','No — an author can create a narrator whose views differ from or oppose their own','Narrators never have opinions','Only nonfiction narrators can differ from the author'],1,'Authors often create narrators with very different views from their own, especially to critically explore a theme — assuming they always match is a common reading error.'),
    Q('What is the purpose of a counterargument in a persuasive text?',['To confuse the reader','To acknowledge an opposing view, which the author then addresses to strengthen their own case','To prove the author has no real argument','It should never appear in strong persuasive writing'],1,'A well-placed counterargument shows the author considered other views and can respond to them, which strengthens rather than weakens the argument.'),
    Q('Is a text\'s genre determined only by its setting?',['Yes, setting alone determines genre','No — genre is shaped by plot structure, tone, and conventions, not setting alone','Only the book cover determines genre','Genre never actually matters'],1,'Genre is shaped by many elements working together — plot patterns, tone, and reader expectations — not simply where a story takes place.')
  ];
  const writingTrick = [
    Q('Which sentence correctly uses "whom"?',['"Who did you give the book to?"','"To whom did you give the book?"','"Whom is going to the store?"','Both A and C are correct'],1,'"Whom" is the object form, correctly used after a preposition like "to" — "who" should be used as a subject, as in choice C\'s incorrect usage.'),
    Q('Is passive voice always grammatically incorrect?',['Yes, always wrong','No — it\'s grammatically valid and sometimes appropriate, though often less direct than active voice','It should never be used in any writing','Passive and active voice mean the same thing'],1,'Passive voice is grammatically valid and has legitimate uses (e.g., when the doer of an action is unknown) — it\'s a stylistic choice, not an error.'),
    Q('Which sentence correctly uses "its" vs. "it\'s"?',['"The dog wagged it\'s tail."','"Its going to rain today."','"The dog wagged its tail."','Both A and C are correct'],2,'"Its" (no apostrophe) shows possession; "it\'s" is a contraction for "it is." "The dog wagged its tail" is correct.'),
    Q('Is repeatedly using "very" and "really" the strongest way to add emphasis?',['Yes, use them as often as possible','No — choosing more precise, vivid words is usually stronger writing','Never use any adjectives instead','Only write one-word sentences'],1,'Skilled writers often replace vague intensifiers like "very tired" with precise words like "exhausted" — generally considered stronger writing.'),
    Q('Which sentence avoids a dangling modifier?',['"Running down the street, the bus was missed by John."','"Running down the street, John missed the bus."','"The bus, running down the street, was missed."','"Down the street running, missed the bus John."'],1,'The modifier "Running down the street" should describe John, the one running — placing it right before "John" avoids the dangling modifier error.'),
    Q('Should a strong thesis statement be phrased as a question?',['Yes, questions are always strongest','No — a thesis should typically make a clear, arguable claim, not just pose a question','It doesn\'t matter what form it takes','Thesis statements should never be one sentence'],1,'A thesis statement should state a clear, arguable position, not just an open question — the claim gives the essay direction.'),
    Q('Which sentence uses commas correctly with an introductory clause?',['"After the movie ended we went home."','"After the movie ended, we went home."','"After, the movie ended we went home."','"After the movie, ended we went home."'],1,'An introductory dependent clause ("After the movie ended") should be followed by a comma before the main clause.'),
    Q('Must every paragraph be exactly five sentences long?',['Yes, always exactly five','No — paragraph length should be flexible, based on fully developing one main idea','All paragraphs must be one sentence','Yes, this is a strict, universal grammar rule'],1,'There\'s no fixed sentence-count rule for paragraphs — good paragraphs are as long as needed to fully develop a single main idea.'),
    Q('Which sentence correctly avoids a run-on?',['"I finished my homework I went outside to play."','"I finished my homework, so I went outside to play."','"I finished my homework I, went outside to play."','"I finished, my homework I went outside to play."'],1,'Adding "so" with a comma correctly joins the two independent clauses, avoiding the run-on in the other choices.'),
    Q('Does swapping every simple word for a "fancier" thesaurus synonym always improve writing?',['Yes, fancier words are automatically better','No — clarity and precision matter more than sounding impressive; misused synonyms can confuse meaning','Simple words should never appear in formal writing','Thesauruses guarantee correct word choice'],1,'Swapping in unfamiliar synonyms without understanding their precise meaning often makes writing less clear, not more sophisticated — clarity should come first.')
  ];
  trackC.subjects.science.levels[2].push(...scienceTrick);
  trackC.subjects.history.levels[2].push(...historyTrick);
  trackC.subjects.reading.levels[2].push(...readingTrick);
  trackC.subjects.writing.levels[2].push(...writingTrick);
})();

/* =========================================================================
   DIAGRAM / CHART QUESTIONS
   Added after verifying against the actual FCPS curriculum: Grade 3 Math
   explicitly teaches pictographs and bar graphs, Grade 4/5 Math explicitly
   teaches line graphs, and Grade 6 Math explicitly teaches circle graphs —
   this was a genuine 0%-coverage gap in the question bank before this
   batch. Every chart uses fixed, hand-verified data (not randomly
   generated) so every answer is checked by hand against the diagram.
   ========================================================================= */
(function addDiagramQuestions(){
  // ---- GRADE 3 (Track A): pictographs + bar graphs ----
  const pets = [{label:'Dogs',count:8},{label:'Cats',count:6},{label:'Fish',count:4},{label:'Birds',count:2}];
  const petsDiagram = pictographSVG(pets, 'Favorite Pets', '🐾', 2);
  const books = [{label:'Week 1',count:3},{label:'Week 2',count:5},{label:'Week 3',count:7},{label:'Week 4',count:4}];
  const booksDiagram = pictographSVG(books, 'Books Read This Summer', '📚', 1);
  const votes = [{label:'Zoo',value:12},{label:'Museum',value:7},{label:'Aquarium',value:9},{label:'Park',value:5}];
  const votesDiagram = barChartSVG(votes, 'Class Vote for Field Trip');
  const recess = [{label:'Mon',value:20},{label:'Tue',value:25},{label:'Wed',value:15},{label:'Thu',value:30},{label:'Fri',value:20}];
  const recessDiagram = barChartSVG(recess, 'Recess Minutes by Day');

  const grade3Charts = [
    Q('According to the pictograph, how many students chose dogs as their favorite pet?',['8','6','4','2'],0,'The "Dogs" row shows 4 paw icons, and each icon = 2, so 4×2=8.',null,petsDiagram),
    Q('According to the pictograph, how many MORE students chose dogs than cats?',['2','4','8','6'],0,'Dogs=8, Cats=6, so 8−6=2 more students chose dogs.',null,petsDiagram),
    Q('According to the pictograph, how many students chose fish or birds combined?',['6','4','8','10'],0,'Fish=4 and Birds=2, so 4+2=6 students total.',null,petsDiagram),
    Q('According to the pictograph, how many books were read in Week 3?',['7','5','4','3'],0,'The Week 3 row shows 7 book icons, and each icon = 1 book, so 7 books.',null,booksDiagram),
    Q('According to the pictograph, how many total books were read across all 4 weeks?',['19','15','21','17'],0,'3+5+7+4 = 19 books total.',null,booksDiagram),
    Q('According to the pictograph, which week had the FEWEST books read?',['Week 1','Week 2','Week 3','Week 4'],0,'Week 1 shows only 3 books, the smallest amount shown.',null,booksDiagram),
    Q('According to the bar graph, how many students voted for the aquarium?',['9','12','7','5'],0,'The "Aquarium" bar reaches 9 on the vertical axis.',null,votesDiagram),
    Q('According to the bar graph, how many more students voted for the zoo than the park?',['7','5','12','2'],0,'Zoo=12, Park=5, so 12−5=7 more votes for the zoo.',null,votesDiagram),
    Q('According to the bar graph, what was the total number of votes cast for a field trip location?',['33','28','30','35'],0,'12+7+9+5 = 33 total votes.',null,votesDiagram),
    Q('According to the bar graph, on which day did students get the MOST recess minutes?',['Thursday','Tuesday','Friday','Monday'],0,'Thursday\'s bar reaches 30, the tallest bar shown.',null,recessDiagram),
    Q('According to the bar graph, what was the total number of recess minutes Monday through Friday?',['110','100','120','105'],0,'20+25+15+30+20 = 110 total minutes.',null,recessDiagram),
    Q('According to the bar graph, how many fewer recess minutes were there on Wednesday than Thursday?',['15','10','20','5'],0,'Thursday=30, Wednesday=15, so 30−15=15 fewer minutes.',null,recessDiagram)
  ];
  trackA.subjects.math.levels[1].push(...grade3Charts);

  // ---- GRADE 4 (Track B): line graphs ----
  const temps = [{x:'Mon',y:60},{x:'Tue',y:65},{x:'Wed',y:70},{x:'Thu',y:68},{x:'Fri',y:75}];
  const tempsDiagram = lineChartSVG(temps, 'Temperature Over a Week (°F)');
  const plant = [{x:'Wk1',y:2},{x:'Wk2',y:5},{x:'Wk3',y:9},{x:'Wk4',y:12},{x:'Wk5',y:14}];
  const plantDiagram = lineChartSVG(plant, 'Plant Height Over 5 Weeks (cm)');
  const bookSales = [{x:'Jan',y:40},{x:'Feb',y:55},{x:'Mar',y:50},{x:'Apr',y:65},{x:'May',y:80}];
  const salesDiagram = lineChartSVG(bookSales, 'Books Sold Each Month');

  const grade4Charts = [
    Q('According to the line graph, what was the temperature on Wednesday?',['70°F','65°F','68°F','75°F'],0,'The point above "Wed" is at 70 on the vertical axis.',null,tempsDiagram),
    Q('According to the line graph, between which two days did the temperature increase the most?',['Thursday to Friday','Monday to Tuesday','Tuesday to Wednesday','Wednesday to Thursday'],0,'Thu→Fri rises from 68 to 75, a jump of 7 — the largest increase of any interval shown.',null,tempsDiagram),
    Q('According to the line graph, what is the difference between the highest and lowest temperatures shown?',['15°F','10°F','12°F','20°F'],0,'The highest is 75°F (Friday) and the lowest is 60°F (Monday): 75−60=15°F.',null,tempsDiagram),
    Q('According to the line graph, how tall was the plant in Week 4?',['12 cm','9 cm','14 cm','5 cm'],0,'The point above "Wk4" is at 12 on the vertical axis.',null,plantDiagram),
    Q('According to the line graph, how much did the plant grow from Week 1 to Week 5?',['12 cm','14 cm','9 cm','16 cm'],0,'Week 5 height (14) minus Week 1 height (2) = 12 cm of growth.',null,plantDiagram),
    Q('According to the line graph, during which interval did the plant grow the MOST?',['Week 2 to Week 3','Week 1 to Week 2','Week 3 to Week 4','Week 4 to Week 5'],0,'Week 2→3 rises from 5 to 9, a gain of 4 — the largest jump between any two points shown.',null,plantDiagram),
    Q('According to the line graph, how many books were sold in April?',['65','55','50','80'],0,'The point above "Apr" is at 65 on the vertical axis.',null,salesDiagram),
    Q('According to the line graph, in which month were the FEWEST books sold?',['January','February','March','May'],0,'January\'s point is at 40, the lowest point on the graph.',null,salesDiagram),
    Q('According to the line graph, what was the total number of books sold from January through May?',['290','280','300','270'],0,'40+55+50+65+80 = 290 books total.',null,salesDiagram)
  ];
  trackB.subjects.math.levels[1].push(...grade4Charts);

  // ---- GRADE 6 (Track C): circle graphs ----
