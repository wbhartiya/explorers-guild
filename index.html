function scoreRowHTML(s){
  const streakFlames = s.correctStreak>=2 ? ` <span class="combo-flame">🔥 ${s.correctStreak} in a row!</span>` : '';
  return `<span class="score-badge">✅ ${s.correctCount} correct</span><span class="score-badge alt">📝 ${s.answeredCount} answered</span>${streakFlames}`;
}

function spawnParticleBurst(defender){
  const emojis = ['💥','⭐','✨','💫'];
  const count = 6;
  for(let i=0;i<count;i++){
    const p = document.createElement('span');
    p.className = 'impact-particle';
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const angle = (Math.PI*2*i/count) + (Math.random()*0.6-0.3);
    const dist = 28 + Math.random()*20;
    p.style.setProperty('--dx', Math.cos(angle)*dist+'px');
    p.style.setProperty('--dy', Math.sin(angle)*dist+'px');
    defender.appendChild(p);
    setTimeout(()=>p.remove(), 560);
  }
}

function animateAttack(attackerId, defenderId, lungeClass){
  const attacker = document.getElementById(attackerId);
  const defender = document.getElementById(defenderId);
  if(attacker){ attacker.classList.add(lungeClass); setTimeout(()=>attacker.classList.remove(lungeClass), 450); }
  if(defender){
    defender.classList.add('hit-shake');
    spawnParticleBurst(defender);
    setTimeout(()=>defender.classList.remove('hit-shake'), 500);
    const arena = defender.closest('.battle-arena');
    if(arena){
      arena.classList.add('arena-shake');
      setTimeout(()=>arena.classList.remove('arena-shake'), 350);
    }
  }
}

function attachBattleEvents(){
  const s = state.battle;
  updateBattleTimerDisplay();

  const endBtn = document.getElementById('endEarlyBtn');
  if(endBtn) endBtn.addEventListener('click', ()=>{
    const ok = window.confirm('Retreat from this battle? No rewards will be earned, but there\'s no penalty either.');
    if(!ok) return;
    if(s.timerId) clearInterval(s.timerId);
    s.result = 'retreat';
    endBattle();
  });

  app.querySelectorAll('.relic-tray-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      Sound.unlock(); Sound.click();
      const key = btn.getAttribute('data-relic');
      s.relicMenuKey = (s.relicMenuKey===key) ? null : key;
      render();
    });
  });
  const relicCancelBtn = document.getElementById('relicCancelBtn');
  if(relicCancelBtn) relicCancelBtn.addEventListener('click', ()=>{ s.relicMenuKey=null; render(); });
  const relicHealBtn = document.getElementById('relicHealBtn');
  if(relicHealBtn) relicHealBtn.addEventListener('click', async ()=>{
    Sound.unlock();
    const p = getActiveProfile();
    const key = s.relicMenuKey;
    const type = consumeRelic(p, key);
    if(!type) { s.relicMenuKey=null; render(); return; }
    const amt = relicHealAmount(p, s.levelIdx, type==='shiny');
    s.playerHP = Math.min(PLAYER_MAX_HP, s.playerHP + amt);
    s.relicMenuKey = null;
    Sound.badge(); fireConfetti(14);
    await saveProfile(state.activePlayerId, p); // persist the consumed relic right away
    render();
  });
  const relicAttackBtn = document.getElementById('relicAttackBtn');
  if(relicAttackBtn) relicAttackBtn.addEventListener('click', async ()=>{
    Sound.unlock();
    const p = getActiveProfile();
    const key = s.relicMenuKey;
    const type = consumeRelic(p, key);
    if(!type) { s.relicMenuKey=null; render(); return; }
    const amt = relicDamageAmount(p, s.correctDamageBase, s.levelIdx, type==='shiny');
    s.bossHP = Math.max(0, s.bossHP - amt);
    s.relicMenuKey = null;
    Sound.hitVillain();
    animateAttack('playerIcon','bossIcon','attack-right');
    await saveProfile(state.activePlayerId, p);
    if(s.bossHP<=0){
      Sound.villainDefeated();
      if(s.timerId) clearInterval(s.timerId);
      s.result = 'victory';
      endBattle();
      return;
    }
    render();
  });

  const claimShrineBtn = document.getElementById('claimShrineBtn');
  if(claimShrineBtn){
    claimShrineBtn.addEventListener('click', ()=>{
      Sound.unlock(); Sound.badge();
      s.playerHP = Math.min(PLAYER_MAX_HP, s.playerHP + 30);
      s.showShrine = false;
      s.matching = null;
      fireConfetti(16);
      nextBattleQuestion(); // fixes: without this, the next question's answer buttons were unresponsive
      render();
    });
  }

  app.querySelectorAll('.match-btn[data-kind="term"]:not([disabled])').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      Sound.unlock(); Sound.click();
      s.matching.selectedTerm = parseInt(btn.getAttribute('data-pos'));
      tryResolveMatch(s);
      render();
    });
  });
  app.querySelectorAll('.match-btn[data-kind="def"]:not([disabled])').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      Sound.unlock(); Sound.click();
      s.matching.selectedDef = parseInt(btn.getAttribute('data-pos'));
      tryResolveMatch(s);
      render();
    });
  });

  app.querySelectorAll('#choicesWrap .choice').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(s.awaitingNext) return;
      const idx = parseInt(btn.getAttribute('data-idx'));
      s.awaitingNext = true; s.chosenIdx = idx;
      const q = s.currentQ;
      const correct = idx === q.a;
      s.answeredCount += 1;
      const track = getActiveTrack();
      const p = getActiveProfile();
      p.answeredBySubject[s.subject] += 1;
      const log = todayLogEntry(p);
      log.subjects[s.subject].total += 1;

      app.querySelectorAll('#choicesWrap .choice').forEach((b,i)=>{
        b.disabled = true;
        if(i===q.a) b.classList.add('correct');
        else if(i===idx) b.classList.add('incorrect');
      });

      Sound.unlock();
      let comboBonus = 0;
      updateMomentum(p, s.subject, correct);
      // Damage is calibrated per-battle (see startBattle) so a boss reliably
      // takes about 6-10 correct hits, and the hero reliably takes about
      // 10-12 wrong hits to reach 0 HP. A modest tier-based multiplier still
      // makes harder questions hit harder, without swinging those counts
      // far outside that range. Combo streaks boost XP, not damage, to keep
      // the hit counts predictable.
      const tierMult = 0.85 + s.levelIdx * 0.1;
      if(correct){
        s.correctCount += 1; s.correctStreak += 1; s.wrongStreak = 0;
        p.correctBySubject[s.subject] += 1;
        log.subjects[s.subject].correct += 1;
        const xpGain = 10 + s.levelIdx*5;
        comboBonus = s.correctStreak>=3 ? 5 * (s.correctStreak-2) : 0;
        s.xpEarned += xpGain + comboBonus;
        const dmg = Math.max(1, Math.round(s.correctDamageBase * tierMult));
        s.bossHP = Math.max(0, s.bossHP - dmg);
        Sound.correct();
        Sound.hitVillain();
        animateAttack('playerIcon','bossIcon','attack-right');
        if(s.correctStreak>0 && s.correctStreak%3===0){ fireConfetti(14); Sound.comboHit(); }
      } else {
        s.correctStreak = 0; s.wrongStreak += 1;
        const dmgTaken = Math.max(1, Math.round(s.wrongDamageBase * tierMult));
        s.playerHP = Math.max(0, s.playerHP - dmgTaken);
        Sound.incorrect();
        Sound.hitPlayer();
        if(s.playerHP>0 && s.playerHP<30) Sound.heartbeat();
        animateAttack('bossIcon','playerIcon','attack-left');
        recordMiss(p, track, s.subject, q);
      }

      const bossBar = document.getElementById('bossHPBar'), bossTxt = document.getElementById('bossHPBarText');
      const playerBar = document.getElementById('playerHPBar'), playerTxt = document.getElementById('playerHPBarText');
      if(bossBar) bossBar.style.width = Math.max(0,Math.round(100*s.bossHP/s.bossMaxHp))+'%';
      if(bossTxt) bossTxt.textContent = `${Math.max(0,s.bossHP)}/${s.bossMaxHp} HP`;
      if(playerBar) playerBar.style.width = Math.max(0,Math.round(100*s.playerHP/PLAYER_MAX_HP))+'%';
      if(playerTxt) playerTxt.textContent = `${Math.max(0,s.playerHP)}/${PLAYER_MAX_HP} HP`;

      const scoreRow = document.getElementById('scoreRow');
      if(scoreRow) scoreRow.innerHTML = scoreRowHTML(s);

      if(!track.mixWeights){
        const maxLevel = track.subjects[s.subject].levels.length - 1;
        if(s.correctStreak>=3){ s.levelIdx = Math.min(maxLevel, s.levelIdx+1); s.correctStreak=0; setTimeout(()=>Sound.levelUp(), 350); }
        if(s.wrongStreak>=2){ s.levelIdx = Math.max(0, s.levelIdx-1); s.wrongStreak=0; }
      }

      const phrase = correct
        ? CORRECT_PHRASES[Math.floor(Math.random()*CORRECT_PHRASES.length)]
        : INCORRECT_PHRASES[Math.floor(Math.random()*INCORRECT_PHRASES.length)];
      const bonusNote = comboBonus>0 ? ` <span class="combo-bonus">+${comboBonus} combo bonus!</span>` : '';
      document.getElementById('explainWrap').innerHTML = `<div class="explain">${correct?'⚔️':'💥'} <strong>${phrase}</strong>${bonusNote}<br>${q.n}</div>`;

      // Boss defeated
      if(s.bossHP<=0){
        Sound.villainDefeated();
        document.getElementById('nextWrap').innerHTML = `<button class="btn brass" id="nextBtn">See Victory! 🏆</button>`;
        document.getElementById('nextBtn').addEventListener('click', ()=>{
          Sound.unlock(); if(s.timerId) clearInterval(s.timerId);
          s.result = 'victory'; endBattle();
        });
        return;
      }
      // Player defeated
      if(s.playerHP<=0){
        document.getElementById('nextWrap').innerHTML = `<button class="btn" id="nextBtn">Continue →</button>`;
        document.getElementById('nextBtn').addEventListener('click', ()=>{
          Sound.unlock(); if(s.timerId) clearInterval(s.timerId);
          s.result = 'defeat'; endBattle();
        });
        return;
      }
      // Mid-battle Wisdom Shrine opportunity (once per battle, when HP drops to half or below)
      const offerShrine = !s.shrineTriggered && s.playerHP < 30;
      const nextLabel = offerShrine ? 'Rest at a Wisdom Shrine 🏕️' : 'Next Question →';
      document.getElementById('nextWrap').innerHTML = `<button class="btn" id="nextBtn">${nextLabel}</button>`;
      document.getElementById('nextBtn').addEventListener('click', ()=>{
        Sound.unlock(); Sound.click();
        if(offerShrine){ s.shrineTriggered = true; s.showShrine = true; s.matching = initMatching(s.subject); render(); }
        else { nextBattleQuestion(); render(); }
      });
    });
  });
}

async function endBattle(){
  const s = state.battle;
  const track = getActiveTrack();
  const p = getActiveProfile();
  stopMusicRotation();

  setDailyHP(p, s.playerHP); // HP persists for the rest of the day, win or lose

  const xpAwarded = awardXP(p, s.xpEarned);
  p.xpBySubject[s.subject] += xpAwarded;
  p.levelBySubject[s.subject] = track.mixWeights ? s.maxLevelReached : s.levelIdx;
  const log = todayLogEntry(p);
  const newBadges = [];
  let dailyRewardsEarned = [];
  let relicGranted = null;

  if(s.result==='victory'){
    // streak + daily-reset handling only happens on an actual win
    const today = todayStr();
    if(p.lastActiveDate !== today){
      if(p.lastActiveDate && daysBetween(p.lastActiveDate, today)===1) p.streak += 1;
      else p.streak = 1;
      p.lastActiveDate = today;
      p.completedTodaySubjects = [];
    }
    if(!p.completedTodaySubjects.includes(s.subject)) p.completedTodaySubjects.push(s.subject);
    p.lastActiveDayForFullQuest = today;
    if(!log.bossesDefeated.includes(s.subject)) log.bossesDefeated.push(s.subject);

    if(p.streak>=3 && !p.badges.includes('streak3')){ p.badges.push('streak3'); newBadges.push('streak3'); }
    if(p.streak>=7 && !p.badges.includes('streak7')){ p.badges.push('streak7'); newBadges.push('streak7'); }
    if(p.streak>=21 && !p.badges.includes('streak21')){ p.badges.push('streak21'); newBadges.push('streak21'); }
    if(p.completedTodaySubjects.length>=5 && !p.badges.includes('fullquest')){ p.badges.push('fullquest'); newBadges.push('fullquest'); }
    const maxLevel = track.subjects[s.subject].levels.length - 1;
    const masteryId = s.subject+'-master';
    if(p.levelBySubject[s.subject]>=maxLevel && !p.badges.includes(masteryId)){ p.badges.push(masteryId); newBadges.push(masteryId); }
    relicGranted = grantRelic(p, s.subject);
  }

  dailyRewardsEarned = checkDailyXPRewards(p);

  pruneDailyLog(p);
  await saveProfile(state.activePlayerId, p);

  state.battle.xpAwarded = xpAwarded;
  state.battle.newBadges = newBadges;
  state.battle.relicGranted = relicGranted;
  state.battle.dailyRewardsEarned = dailyRewardsEarned;
  state.screen = 'battle-result';
  render();
}

/* =========================================================================
   BOSS BATTLE — 5 tough, mixed-subject questions pulled from each realm's
   hardest tier. Available once per day per explorer.
   ========================================================================= */


/* The Final Boss escalates over the whole summer: early on it's a normal
   tough fight (~8 hits), but by ~day 60 of play it demands 50+ correct
   hits — a genuine end-of-summer showdown. Boss HP is a fixed round number
   (1000) for a satisfying "epic" display; how much each hit actually chips
   off is derived from the target hit count for wherever the player is in
   the summer, so the bar visibly crawls during the big late-summer fights. */
const FINAL_BOSS_RAMP_DAYS = 60;
function finalBossTargetHits(p){
  const progress = Math.min(1, Math.max(0, ((p.totalDaysPlayed||1)-1) / (FINAL_BOSS_RAMP_DAYS-1)));
  return Math.round(8 + progress*47); // day 1 → ~8 hits, day 60+ → ~55 hits
}

function startFinalBoss(){
  const p = getActiveProfile();
  if(currentFrontierIndex(p) < 5){ return; } // safety check — must clear all 5 realms first
  registerDayPlayed(p);
  const startingHP = getDailyHP(p);
  if(startingHP<=0){
    window.alert("You're out of HP for today! Rest up and come back tomorrow.");
    return;
  }
  if(SETTINGS.musicOn){ Sound.unlock(); Sound.startAmbient('boss'); startMusicRotation(); }

  const targetHits = finalBossTargetHits(p);
  const bossMaxHp = 1000;
  const correctDamageBase = bossMaxHp / targetHits;
  const targetHitsToLose = randInt(10, 12); // same hero-survivability pacing as regular battles
  const wrongDamageBase = PLAYER_MAX_HP / targetHitsToLose;
  // Generous time budget that scales with how long the fight will realistically take
  const timeLimit = Math.min(45*60, Math.max(8*60, Math.round(targetHits * 35)));

  state.finalBoss = {
    bossHP: bossMaxHp, bossMaxHp, targetHits, correctDamageBase, targetHitsToLose, wrongDamageBase,
    playerHP: startingHP,
    correctCount: 0, answeredCount: 0,
    usedQuestions: new Set(),
    currentQ: null, currentSubject: null,
    timeLeft: timeLimit, timerId: null,
    awaitingNext: false, chosenIdx: null, result: null, relicMenuKey: null
  };
  nextFinalBossQuestion();
  state.screen = 'finalboss';
  render();
  startFinalBossTimer();
}

function nextFinalBossQuestion(){
  const bs = state.finalBoss;
  const track = getActiveTrack();
  const p = getActiveProfile();
  const subj = SUBJECTS[Math.floor(Math.random()*SUBJECTS.length)];
  const levels = track.subjects[subj.key].levels;
  const toughestIdx = levels.length - 1;
  const avoidIds = getTodayAskedSet(p);
  if(!bs.recentConcepts) bs.recentConcepts = [];
  const picked = pickNextUniqueQuestion(levels, toughestIdx, bs.usedQuestions, avoidIds, bs.recentConcepts);
  bs.currentQ = picked.q;
  bs.currentSubject = subj;
  bs.usedQuestions.add(picked.q);
  recordAskedToday(p, picked.q._id);
  if(picked.q._concept){
    bs.recentConcepts.push(picked.q._concept);
    if(bs.recentConcepts.length>2) bs.recentConcepts.shift();
  }
  bs.awaitingNext = false;
  bs.chosenIdx = null;
}

function startFinalBossTimer(){
  const bs = state.finalBoss;
  if(bs.timerId) clearInterval(bs.timerId);
  bs.timerId = setInterval(()=>{
    bs.timeLeft -= 1;
    if(bs.timeLeft<=0){ clearInterval(bs.timerId); bs.result='timeup'; endFinalBoss(); }
    else updateFinalBossTimerDisplay();
  }, 1000);
}
function updateFinalBossTimerDisplay(){
  const el = document.getElementById('bossTimerDisplay');
  if(!el) return;
  const bs = state.finalBoss;
  const m = Math.floor(bs.timeLeft/60), sec = bs.timeLeft%60;
  el.textContent = `${m}:${sec.toString().padStart(2,'0')}`;
  el.parentElement.classList.toggle('warn', bs.timeLeft<=30);
  if(bs.timeLeft<=10 && bs.timeLeft>0) Sound.tick();
}

  <div class="card" style="background:linear-gradient(180deg,#1C1533,#2A1B4D);color:#F2EFFF;">
    <div class="session-header">
      <span class="level-chip" style="background:linear-gradient(135deg,#FF4D6D,#B14AFF);color:#2A0A14;">🐉 FINAL BOSS · ${subj.icon} ${subj.name}</span>

        ${hpBarHTML(bs.bossHP, bs.bossMaxHp, 'fbBossHPBar', 'boss')}

async function endFinalBoss(){
  const bs = state.finalBoss;
  const p = getActiveProfile();
  stopMusicRotation();
  setDailyHP(p, bs.playerHP); // HP persists for the rest of the day
  const won = bs.result==='victory';
  const today = todayStr();
  const log = todayLogEntry(p);
  log.finalBossResult = won ? 'won' : 'lost';
  if(won) p.bossLastCompletedDate = today;
  // XP scales with actual effort (hits landed), plus a completion bonus for winning —
  // this matters a lot more now that a late-summer fight can be 50+ hits long.
  const xpEarned = bs.correctCount * 6 + (won ? 100 : 0);
  const xpAwarded = awardXP(p, xpEarned);
  // Winning the Final Boss means all 5 realms + the boss are done today —
  // guarantee the full 1000 XP for the day, topping up whatever was short.
  const topUpBonus = won ? topUpFullQuestXP(p) : 0;

  const newBadges = [];
  if(won){
    p.bossWinsTotal = (p.bossWinsTotal||0) + 1;
    if(!p.badges.includes('boss-slayer')){ p.badges.push('boss-slayer'); newBadges.push('boss-slayer'); }
    if(p.bossWinsTotal>=5 && !p.badges.includes('boss-champion')){ p.badges.push('boss-champion'); newBadges.push('boss-champion'); }
  }
  const dailyRewardsEarned = checkDailyXPRewards(p);
  pruneDailyLog(p);
  await saveProfile(state.activePlayerId, p);

  state.finalBoss.xpEarnedRaw = xpEarned;
  state.finalBoss.xpEarned = xpAwarded + topUpBonus;
  state.finalBoss.fullQuestBonus = topUpBonus;
  state.finalBoss.hitPartialCap = (xpAwarded < xpEarned) && !won;
  state.finalBoss.newBadges = newBadges;
  state.finalBoss.dailyRewardsEarned = dailyRewardsEarned;
  state.screen = 'finalboss-result';
  render();
}

function startPractice(subjectKey){
  const track = getActiveTrack();
  const p = getActiveProfile();
  const levels = track.subjects[subjectKey].levels;
  let startLevel = p.levelBySubject[subjectKey];
  startLevel = Math.max(0, Math.min(startLevel, levels.length-1));
  const weighted = pickWeightedLevel(track, subjectKey, p);
  if(weighted!==null) startLevel = weighted;

  state.practice = {
    subject: subjectKey, levelIdx: startLevel, maxLevelReached: startLevel,
    usedQuestions: new Set(), correctStreak:0, wrongStreak:0,
    correctCount:0, answeredCount:0, xpEarned:0,
    currentQ:null, awaitingNext:false,
    timeLeft: SESSION_MINUTES*60, timerId:null
  };
  nextPracticeQuestion();
  state.screen = 'practice';
  render();
  startPracticeTimer();
}
function nextPracticeQuestion(){
  const s = state.practice;
  const track = getActiveTrack();
  const p = getActiveProfile();
  const levels = track.subjects[s.subject].levels;
  const weighted = pickWeightedLevel(track, s.subject, p);
  const targetLevel = weighted!==null ? weighted : s.levelIdx;
  if(!s.recentConcepts) s.recentConcepts = [];
  const picked = pickNextUniqueQuestion(levels, targetLevel, s.usedQuestions, null, s.recentConcepts);
  s.currentQ = picked.q; s.levelIdx = picked.levelIdx;
  s.maxLevelReached = Math.max(s.maxLevelReached, picked.levelIdx);
  s.usedQuestions.add(picked.q);
  if(picked.q._concept){
    s.recentConcepts.push(picked.q._concept);
    if(s.recentConcepts.length>2) s.recentConcepts.shift();
  }
  s.awaitingNext = false;
}
function startPracticeTimer(){
  const s = state.practice;
  if(s.timerId) clearInterval(s.timerId);
  s.timerId = setInterval(()=>{
    s.timeLeft -= 1;
    if(s.timeLeft<=0){ clearInterval(s.timerId); endPractice(); }
    else updatePracticeTimerDisplay();
  }, 1000);
}

/* =========================================================================
   PARENT DASHBOARD — a read-only view across all three explorers: today's
   activity, accuracy by subject (flagging weak spots), streaks, badges,
   and earnings — accessible from the player-select screen.
   ========================================================================= */
/* Builds the last 7 calendar days of accuracy data for a player, including
   days with zero activity (shown as gaps rather than skipped), so parents
   can see real play patterns, not just days they happened to log in. */
function last7DaysData(p){
  const days = [];
  for(let i=6;i>=0;i--){
    const d = new Date();
    d.setDate(d.getDate()-i);
    const dateStr = d.toISOString().slice(0,10);
    const log = p.dailyLog[dateStr];
    let correct=0, total=0;
    if(log){ Object.values(log.subjects).forEach(s=>{ correct+=s.correct; total+=s.total; }); }
    const acc = total>0 ? Math.round(100*correct/total) : 0;
    const label = d.toLocaleDateString('en-US',{weekday:'short'});
    days.push({label, acc, total, dateStr});
  }
  return days;
}

function renderParentDashboard(){
  const today = todayStr();
  const cards = (state.playerIds.length===0 ? [] : state.playerIds).map(tid=>{
    const p = state.profiles[tid];
    if(!p) return '';
    const track = TRACKS[tid];
    if(!p.name){
      return `<div class="card"><h3 class="display" style="margin-top:0;">${track.label}</h3><p style="color:var(--text-dim);">Not set up yet.</p></div>`;
    }
    const todayLog = p.dailyLog[today];
    const totalAnswered = Object.values(p.answeredBySubject).reduce((a,b)=>a+b,0);
    const totalCorrect = Object.values(p.correctBySubject).reduce((a,b)=>a+b,0);
    const overallAcc = totalAnswered ? Math.round(100*totalCorrect/totalAnswered) : 0;

    // ---- Cumulative performance table (all-time totals per subject) ----
    const cumulativeRows = SUBJECTS.map(s=>{
      const c = p.correctBySubject[s.key], t = p.answeredBySubject[s.key];
      const acc = t ? Math.round(100*c/t) : null;
      return `<div class="summary-stat"><span>${s.icon} ${s.name}</span><strong>${t?`${c}/${t} correct (${acc}%)`:'No attempts yet'}</strong></div>`;
    }).join('');

    // ---- Today's performance table (today only, per subject) ----
    const todayRows = SUBJECTS.map(s=>{
      const ts = todayLog ? todayLog.subjects[s.key] : null;
      if(!ts || ts.total===0) return `<div class="summary-stat"><span>${s.icon} ${s.name}</span><strong style="color:var(--text-dim);">Not played today</strong></div>`;
      const acc = Math.round(100*ts.correct/ts.total);
      return `<div class="summary-stat"><span>${s.icon} ${s.name}</span><strong>${ts.correct}/${ts.total} correct (${acc}%)</strong></div>`;
    }).join('');

    // ---- Last 7 days trend chart ----
    const week = last7DaysData(p);
    const anyActivity = week.some(d=>d.total>0);
    const weekChart = anyActivity ? lineChartSVG(week.map(d=>({x:d.label, y:d.acc})), `${p.name}'s Accuracy — Last 7 Days`) : null;
    const daysPlayedThisWeek = week.filter(d=>d.total>0).length;

    // ---- Areas of focus: low accuracy (with a real sample size) OR neglected (not played in 3+ days) ----
    const focusItems = [];
    SUBJECTS.forEach(s=>{
      const c = p.correctBySubject[s.key], t = p.answeredBySubject[s.key];
      const acc = t ? Math.round(100*c/t) : null;
      if(acc!==null && acc<70 && t>=8) focusItems.push(`<li><strong>${s.icon} ${s.name}</strong> — ${acc}% accuracy over ${t} questions. Consider a few rounds in the Practice Zone.</li>`);
    });
    const last3 = week.slice(-3);
    SUBJECTS.forEach(s=>{
      const touchedRecently = last3.some(d=>{
        const log = p.dailyLog[d.dateStr];
        return log && log.subjects[s.key] && log.subjects[s.key].total>0;
      });
      if(!touchedRecently && p.answeredBySubject[s.key]>0){
        focusItems.push(`<li><strong>${s.icon} ${s.name}</strong> — not played in the last 3 days.</li>`);
      }
    });
    const focusHTML = focusItems.length
      ? `<ul style="margin:0;padding-left:20px;">${focusItems.join('')}</ul>`
      : `<p style="margin:0;color:var(--teal);font-weight:700;">✅ No specific concerns — accuracy and recent activity look healthy across all subjects.</p>`;

    const bossesToday = todayLog ? todayLog.bossesDefeated.length : 0;
    const finalBossToday = todayLog ? todayLog.finalBossResult : null;
    const totalEarnings = p.earnings.ipad + p.earnings.tv + p.earnings.free;

    return `
    <div class="card" style="margin-bottom:16px;">
      <h3 class="display" style="margin-top:0;">${p.avatarEmoji||'🧭'} ${p.name} <span style="font-size:13px;color:var(--text-dim);font-family:'Public Sans',sans-serif;font-weight:600;">(${track.label})</span></h3>

      <div class="stats-row">
        <div class="stat-pill"><div class="num">${p.xpTotal}</div><div class="lbl">Total XP</div></div>
        <div class="stat-pill"><div class="num">${p.streak}</div><div class="lbl">Day Streak</div></div>
        <div class="stat-pill"><div class="num">${overallAcc}%</div><div class="lbl">Overall Accuracy</div></div>
        <div class="stat-pill"><div class="num">${p.badges.length}</div><div class="lbl">Badges</div></div>
      </div>

      <div class="section-title" style="margin-top:16px;font-size:16px;">🎯 Areas of Focus</div>
      <div class="card" style="background:var(--panel-tint);">${focusHTML}</div>

      <div class="section-title" style="margin-top:16px;font-size:16px;">📅 Last 7 Days</div>
      ${weekChart ? `
        <div class="diagram-box" style="margin-bottom:8px;">${weekChart}</div>
        <p style="margin:0 0 12px;font-size:12.5px;color:var(--text-dim);">Played ${daysPlayedThisWeek} of the last 7 days.</p>
      ` : `<p style="color:var(--text-dim);font-size:13px;">No activity in the last 7 days.</p>`}

      <div class="section-title" style="margin-top:16px;font-size:16px;">☀️ Today's Performance</div>
      <div class="summary-stat"><span>Bosses defeated today</span><strong>${bossesToday} / 5</strong></div>
      <div class="summary-stat"><span>Final Boss</span><strong>${finalBossToday==='won'?'👑 Defeated':finalBossToday==='lost'?'Attempted, not yet defeated':'Not attempted'}</strong></div>
      ${todayRows}

      <div class="section-title" style="margin-top:16px;font-size:16px;">📊 Cumulative Performance (all-time)</div>
      ${cumulativeRows}

      <div class="section-title" style="margin-top:16px;font-size:16px;">Earnings Ledger</div>
      <div class="summary-stat"><span>Unredeemed rewards</span><strong>${totalEarnings} min total</strong></div>
      <div class="summary-stat"><span>📱 iPad / 📺 TV / 🎈 Free</span><strong>${p.earnings.ipad} / ${p.earnings.tv} / ${p.earnings.free} min</strong></div>
    </div>`;
  }).join('');

  return `
  ${renderHeader()}
  <div class="card setup-card" style="margin-bottom:16px;">
    <span class="back-link" id="parentBackLink">← Back</span>
    <h2 class="display" style="margin-top:0;">👪 Parent Dashboard</h2>
    <p>A read-only overview of each explorer's progress — no login required, so use discretion about who sees this screen.</p>
    ${(()=>{
      if(Store.mode==='firebase-shared') return `<p style="margin:0;font-size:13px;font-weight:700;color:var(--teal);">☁️ Cloud Sync: Connected — data consolidates across every device.</p>`;
      if(isFirebaseConfigured()) return `<p style="margin:0;font-size:13px;font-weight:700;color:var(--coral);">⚠️ Cloud Sync: Configured but not connected${firebaseInitError?' ('+firebaseInitError+')':''}. Data is local to this device only.</p>`;
      return `<p style="margin:0;font-size:13px;font-weight:700;color:var(--text-dim);">💾 Cloud Sync: Not set up — each device's progress is separate. See the setup guide to consolidate across devices.</p>`;
    })()}
  </div>
  ${state.playerIds.length===0 ? `<div class="card"><p style="color:var(--text-dim);text-align:center;">No explorers created yet.</p></div>` : cards}`;
}

/* =========================================================================
   BONUS SPARRING ARENA
   Five questions pulled from the player's own hardest available tier for a
   chosen subject — a genuine test of mastery, not a normal battle. There's
   no HP mechanic; the only way to win is a PERFECT run (5/5 correct). This
   is deliberate: if hard-tier content gives a well-prepared player roughly
   a 73-75% chance per question, requiring all 5 correct naturally lands
   the overall win probability around 20-25% (0.74^5 ≈ 22%) without needing
   to artificially rig outcomes. No penalty for losing — retry anytime.
   Winning upgrades that subject's relic (grants it if not yet owned,
   upgrades a normal relic to shiny, or grants a solid XP bonus if already
   shiny) since a repeat win still deserves a reward.
   ========================================================================= */
function renderSparringPick(){
  const p = getActiveProfile();
  const rows = SUBJECTS.map(s=>{
    const relic = p.relics[s.key];
    const relicNote = relic==='shiny' ? '✨ Shiny relic owned — win for bonus XP' : relic==='normal' ? 'Win to upgrade your relic to shiny!' : 'Win to earn this realm\'s relic!';
    return `<button class="btn ghost" style="justify-content:space-between;width:100%;margin-bottom:10px;" data-spar-subject="${s.key}">
      <span>${s.icon} ${s.name}</span><span style="font-size:11px;color:var(--text-dim);">${relicNote}</span>
    </button>`;
  }).join('');
  return `
  ${renderHeader()}
  <div class="card setup-card" style="margin-bottom:16px;background:linear-gradient(180deg,#1C1533,#2A1B4D);color:#F2EFFF;">
    <span class="back-link" id="sparringPickBackLink" style="color:#D8CFFF;">← Back</span>
    <h2 class="display" style="margin-top:0;">⚔️ Choose Your Sparring Subject</h2>
    <p style="color:#D8CFFF;">5 questions from the hardest tier you've unlocked. Miss even one, and it's a loss — but there's no other penalty, so come back anytime.</p>
  </div>
  <div class="card">${rows}</div>`;
}
function attachSparringPickEvents(){
  document.getElementById('sparringPickBackLink').addEventListener('click', ()=>{ state.screen='dashboard'; render(); });
  app.querySelectorAll('[data-spar-subject]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      Sound.unlock(); Sound.click();
      startSparring(btn.getAttribute('data-spar-subject'));
    });
  });
}

function startSparring(subjectKey){
  const p = getActiveProfile();
  const track = getActiveTrack();
  const levels = track.subjects[subjectKey].levels;
  const hardestIdx = levels.length - 1;
  const usedQuestions = new Set();
  const avoidIds = getTodayAskedSet(p);
  const recentConcepts = [];
  const questions = [];
  for(let i=0;i<5;i++){
    const picked = pickNextUniqueQuestion(levels, hardestIdx, usedQuestions, avoidIds, recentConcepts);
    questions.push(picked.q);
    usedQuestions.add(picked.q);
    recordAskedToday(p, picked.q._id);
    if(picked.q._concept){ recentConcepts.push(picked.q._concept); if(recentConcepts.length>2) recentConcepts.shift(); }
  }
  state.sparring = { subject: subjectKey, questions, idx:0, correctCount:0, awaitingNext:false, chosenIdx:null, result:null };
  state.screen = 'sparring';
  if(SETTINGS.musicOn){ Sound.startAmbient('boss'); startMusicRotation(); }
  render();
}

function renderSparring(){
  const s = state.sparring;
  const subjMeta = SUBJECTS.find(x=>x.key===s.subject);
  const q = s.questions[s.idx];
  const dots = s.questions.map((_,i)=>{
    if(i < s.idx) return '✅';
    if(i === s.idx) return '⚔️';
    return '⬜';
  }).join(' ');
  return `
  ${renderHeader()}
  <div class="card" style="background:linear-gradient(180deg,#1C1533,#2A1B4D);color:#F2EFFF;">
    <div class="session-header">
      <span class="level-chip" style="background:linear-gradient(135deg,#FF2E63,#B14AFF);color:#fff;">⚔️ SPARRING ARENA · ${subjMeta.icon} ${subjMeta.name}</span>
    </div>
    <p style="font-weight:700;color:#D8CFFF;margin:8px 0;">Round ${s.idx+1} of 5 — ${dots}</p>
    <p style="font-size:12.5px;color:#B7B4D6;margin:0 0 10px;">Perfect run required. One miss ends the attempt.</p>
    <div class="q-card">
      ${renderQuestionBody(q)}
      <div id="sparChoicesWrap">
        ${q.c.map((choice,i)=>`<button class="choice" data-idx="${i}">${choice}</button>`).join('')}
      </div>
      <div id="sparExplainWrap"></div>
      <div id="sparNextWrap" style="margin-top:16px;"></div>
    </div>
  </div>`;
}
function attachSparringEvents(){
  const s = state.sparring;
  app.querySelectorAll('#sparChoicesWrap .choice').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(s.awaitingNext) return;
      Sound.unlock();
      const idx = parseInt(btn.getAttribute('data-idx'));
      s.awaitingNext = true; s.chosenIdx = idx;
      const q = s.questions[s.idx];
      const correct = idx === q.a;
      const p = getActiveProfile();
      const log = todayLogEntry(p);
      log.subjects[s.subject].total += 1;

      app.querySelectorAll('#sparChoicesWrap .choice').forEach((b,i)=>{
        b.disabled = true;
        if(i===q.a) b.classList.add('correct');
        else if(i===idx) b.classList.add('incorrect');
      });
      document.getElementById('sparExplainWrap').innerHTML = `<div class="explain">${correct?'⚔️ Direct hit! ':'💥 Missed! '}${q.n}</div>`;

      if(correct){
        s.correctCount += 1;
        log.subjects[s.subject].correct += 1;
        Sound.correct(); Sound.hitVillain();
        if(s.idx>=4){
          document.getElementById('sparNextWrap').innerHTML = `<button class="btn brass" id="sparNextBtn">See Results! 🏆</button>`;
          document.getElementById('sparNextBtn').addEventListener('click', ()=>{ s.result='victory'; endSparring(); });
        } else {
          document.getElementById('sparNextWrap').innerHTML = `<button class="btn brass" id="sparNextBtn">Next Round →</button>`;
          document.getElementById('sparNextBtn').addEventListener('click', ()=>{ s.idx+=1; s.awaitingNext=false; s.chosenIdx=null; render(); });
        }
      } else {
        Sound.incorrect(); Sound.hitPlayer();
        document.getElementById('sparNextWrap').innerHTML = `<button class="btn" id="sparNextBtn">See Results</button>`;
        document.getElementById('sparNextBtn').addEventListener('click', ()=>{ s.result='defeat'; endSparring(); });
      }
    });
  });
}

async function endSparring(){
  const s = state.sparring;
  const p = getActiveProfile();
  stopMusicRotation();
  const won = s.result==='victory' && s.correctCount>=5;
  let rewardKind = null, xpBonus = 0;
  if(won){
    const current = p.relics[s.subject];
    if(current===null){ rewardKind = grantRelic(p, s.subject); }
    else if(current==='normal'){ p.relics[s.subject] = 'shiny'; rewardKind = 'upgraded'; }
    else { xpBonus = awardXP(p, 60); rewardKind = 'xp'; }
  }
  await saveProfile(state.activePlayerId, p);
  state.sparring.rewardKind = rewardKind;
  state.sparring.xpBonus = xpBonus;
  state.screen = 'sparring-result';
  render();
}

function renderSparringResult(){
  const s = state.sparring;
  const subjMeta = SUBJECTS.find(x=>x.key===s.subject);

      rewardHTML = `<div class="card relic-reveal ${s.rewardKind==='shiny'?'shiny':''}" style="text-align:center;margin:16px 0;">
        <p style="margin:0 0 6px;font-weight:800;font-size:13px;text-transform:uppercase;color:${s.rewardKind==='shiny'?'#B8860B':'var(--violet)'};">${s.rewardKind==='shiny'?'✨ Shiny Relic Earned! ✨':'🎁 Relic Earned!'}</p>
        <div style="margin:8px 0;">${relicIconSVG(s.subject, s.rewardKind==='shiny', 72)}</div>
        <p style="margin:0;font-weight:800;font-size:16px;">${RELIC_DEFS[s.subject].name}</p>
      </div>`;
    } else if(s.rewardKind==='upgraded'){
      rewardHTML = `<div class="card relic-reveal shiny" style="text-align:center;margin:16px 0;">
        <p style="margin:0 0 6px;font-weight:800;font-size:13px;text-transform:uppercase;color:#B8860B;">✨ Relic Upgraded to Shiny! ✨</p>
        <div style="margin:8px 0;">${relicIconSVG(s.subject, true, 72)}</div>
        <p style="margin:0;font-weight:800;font-size:16px;">${RELIC_DEFS[s.subject].name}</p>
      </div>`;
    } else if(s.rewardKind==='xp'){
      rewardHTML = `<div class="card" style="background:linear-gradient(135deg,#FFF3D6,#FFE7A8);text-align:center;margin:16px 0;"><p style="margin:0;font-weight:700;">Your relic is already shiny — enjoy a +${s.xpBonus} XP bonus instead!</p></div>`;
    }
  }
  return `
  ${renderHeader()}
  <div class="card">
    <h2 class="display" style="margin-top:0;">${won ? '🏆 Perfect Run!' : '💥 Attempt Ended'}</h2>
    <p>${won ? `Flawless — 5 for 5 in ${subjMeta.name}. That's true mastery.` : `You got ${s.correctCount} of ${s.idx+1} before a miss. No penalty — come back and try again anytime.`}</p>
    <div class="summary-stat"><span>Correct answers</span><strong>${s.correctCount} / 5</strong></div>
    ${rewardHTML}
    <div style="margin-top:22px;display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn brass" id="sparAgainBtn">⚔️ Try Again</button>
      <button class="btn ghost" id="sparBackBtn">Back to Realm Map</button>
    </div>
  </div>`;
}
function attachSparringResultEvents(){
  Sound.unlock();
  const s = state.sparring;
  if(s.result==='victory' && s.correctCount>=5){ Sound.relicFound(s.rewardKind==='shiny'||s.rewardKind==='upgraded'); fireConfetti(s.rewardKind==='shiny'||s.rewardKind==='upgraded' ? 50 : 30); }

/* =========================================================================
   GEAR SHOP — cosmetic equipment purchasable with earned XP (spent from
   gearWallet, never from xpTotal, so buying never lowers a player's rank).

function renderGearShop(){
  const p = getActiveProfile();
  const wallet = p.gearWallet||0;

  const slotSections = GEAR_SLOTS.map(slot=>{
    const meta = GEAR_SLOT_META[slot];
    const items = GEAR_CATALOG.filter(g=>g.slot===slot);
    const equippedId = p.equippedGear[slot];
    const itemRows = items.map(item=>{
      const owned = p.ownedGear.includes(item.id);
      const equipped = equippedId===item.id;
      const canAfford = wallet >= item.cost;
      const refund = Math.floor(item.cost*0.5);
      let actionHTML;
      if(equipped){
        actionHTML = `<button class="btn ghost" data-unequip-slot="${slot}" style="min-width:auto;">Unequip</button>`;

        actionHTML = `<button class="btn brass" data-equip="${item.id}" style="min-width:auto;">Equip</button> <button class="btn ghost" data-sell="${item.id}" style="min-width:auto;color:var(--coral);border-color:var(--coral);">Sell +${refund}</button>`;

        actionHTML = `<button class="btn ${canAfford?'brass':'ghost'}" data-buy="${item.id}" style="min-width:auto;" ${canAfford?'':'disabled'}>Buy ${item.cost} XP</button>`;
      }
      return `<div class="gear-item-row ${equipped?'equipped':''}">
        <div class="gear-item-icon"><svg viewBox="-13 -13 26 26" width="34" height="34">${gearIconSVG(slot, item.color, item.glow)}</svg></div>

        </div>
        <div class="gear-item-actions">${actionHTML}</div>
      </div>`;
    }).join('');
    return `<div class="card" style="margin-bottom:14px;">
      <div class="section-title" style="margin-top:0;">${meta.icon} ${meta.label}</div>
      ${itemRows}
    </div>`;
  }).join('');

  return `
  ${renderHeader()}
  <div class="card setup-card" style="margin-bottom:16px;">
    <span class="back-link" id="gearShopBackLink">← Back</span>
    <h2 class="display" style="margin-top:0;">🎽 Gear Shop</h2>
    <p>Purely cosmetic gear — helmets, armor, shields, gloves, and boots to customize your look. Bought with earned XP, and selling refunds 50% of what you paid. Buying never lowers your rank.</p>
    <div style="display:flex;align-items:center;gap:18px;margin-top:10px;">
      <div style="width:76px;height:76px;flex-shrink:0;">${playerPortraitHTML(p.avatarEmoji, p.avatarColor, 'gearPreviewIcon', p.bodyShape, p.weapon, p.equippedGear)}</div>
      <div class="stat-pill" style="margin:0;"><div class="num">${wallet}</div><div class="lbl">Spendable XP</div></div>
    </div>
  </div>
  ${slotSections}`;
}

/* =========================================================================
   CHARACTER SHEET — a big, detailed view of the character built to admire
   a fully-geared-up look. Reuses playerPortraitHTML at a much larger size
   (its SVG scales cleanly with the viewBox, so gear detail that reads as
   small badges at 76px in battle reads clearly here without any new art).
   ========================================================================= */
function renderCharacterSheet(){
  const p = getActiveProfile();
  const track = getActiveTrack();
  const title = xpToTitle(p.xpTotal);
  const totalAnswered = Object.values(p.answeredBySubject).reduce((a,b)=>a+b,0);
  const totalCorrect = Object.values(p.correctBySubject).reduce((a,b)=>a+b,0);
  const overallAcc = totalAnswered ? Math.round(100*totalCorrect/totalAnswered) : 0;

  const gearRows = GEAR_SLOTS.map(slot=>{
    const meta = GEAR_SLOT_META[slot];
    const itemId = p.equippedGear[slot];
    const item = itemId ? gearItemById(itemId) : null;
    return `<div class="summary-stat">
      <span>${meta.icon} ${meta.label}</span>
      <strong style="${item?'':'color:var(--text-dim);font-weight:600;'}">${item ? item.name : 'Empty slot'}</strong>
    </div>`;
  }).join('');

  const relicSlots = SUBJECT_ORDER.map(key=>{
    const r = p.relics[key];
    const def = RELIC_DEFS[key];
    if(!r) return `<div class="relic-slot locked" style="padding:10px 6px;"><div style="font-size:24px;">🔒</div><strong style="font-size:11px;">${def.name}</strong></div>`;
    return `<div class="relic-slot ${r==='shiny'?'shiny':''}" style="padding:10px 6px;">
      ${relicIconSVG(key, r==='shiny', 40)}
      <strong style="font-size:11px;">${def.name}</strong>
      ${r==='shiny' ? `<span style="font-size:9.5px;font-weight:800;color:#B8860B;">✨ SHINY</span>` : ''}
    </div>`;
  }).join('');

  const earnedBadges = BADGE_DEFS.filter(b=>p.badges.includes(b.id));

  return `
  ${renderHeader()}
  <div class="card setup-card" style="margin-bottom:16px;">
    <span class="back-link" id="charSheetBackLink">← Back</span>
    <h2 class="display" style="margin-top:0;">📜 Character Sheet</h2>
    <p>${track.tagline}</p>
  </div>

  <div class="card" style="text-align:center;margin-bottom:16px;background:linear-gradient(180deg,#F1EDFF,#FFFFFF);">
    <div style="width:220px;height:220px;margin:0 auto;">${playerPortraitHTML(p.avatarEmoji, p.avatarColor, 'charSheetIcon', p.bodyShape, p.weapon, p.equippedGear)}</div>
    <h2 class="display" style="margin:8px 0 2px;">${p.name}</h2>
    <p style="margin:0;font-weight:700;color:var(--violet);">${title} · ${track.label}</p>
  </div>

  <div class="card" style="margin-bottom:16px;">
    <div class="stats-row">
      <div class="stat-pill"><div class="num">${p.xpTotal}</div><div class="lbl">Total XP</div></div>
      <div class="stat-pill"><div class="num">${p.gearWallet||0}</div><div class="lbl">Spendable XP</div></div>
      <div class="stat-pill"><div class="num">${p.streak}</div><div class="lbl">Day Streak</div></div>
      <div class="stat-pill"><div class="num">${p.totalDaysPlayed||0}</div><div class="lbl">Days Played</div></div>
      <div class="stat-pill"><div class="num">${overallAcc}%</div><div class="lbl">Accuracy</div></div>
      <div class="stat-pill"><div class="num">${p.badges.length}</div><div class="lbl">Badges</div></div>
    </div>
  </div>

  <div class="card" style="margin-bottom:16px;">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div class="section-title" style="margin:0;">🎽 Equipped Gear</div>
      <span class="back-link" id="charSheetGearShopLink">Change gear →</span>
    </div>
    ${gearRows}
  </div>

  <div class="card" style="margin-bottom:16px;">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div class="section-title" style="margin:0;">🎁 Relic Collection</div>
      <span class="back-link" id="charSheetCollectionLink">View collection →</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px;">${relicSlots}</div>
  </div>

  <div class="card">
    <div class="section-title" style="margin-top:0;">🏆 Passport (Badges)</div>
    ${earnedBadges.length ? `<div class="passport">${earnedBadges.map(b=>`<div class="stamp"><div class="emoji">${b.emoji}</div>${b.label}</div>`).join('')}</div>` : `<p style="color:var(--text-dim);margin:0;">No badges earned yet — keep playing to start your collection!</p>`}
  </div>`;
}
function attachCharacterSheetEvents(){
  document.getElementById('charSheetBackLink').addEventListener('click', ()=>{ state.screen='dashboard'; render(); });
  document.getElementById('charSheetGearShopLink').addEventListener('click', ()=>{ Sound.unlock(); Sound.click(); state.screen='gear-shop'; render(); });
  document.getElementById('charSheetCollectionLink').addEventListener('click', ()=>{ Sound.unlock(); Sound.click(); state.screen='collection'; render(); });
}

/* =========================================================================
   SIBLING CHALLENGE UI
   ========================================================================= */
function renderChallengesCard(){
  const myId = state.activePlayerId;
  const incoming = state.challenges.filter(c => c.status==='pending' && c.toPlayerId===myId);
  const awaitingMyPlay = state.challenges.filter(c => c.status==='active' && challengeInvolvesPlayer(c, myId) &&
    ((c.fromPlayerId===myId && c.fromScore===null) || (c.toPlayerId===myId && c.toScore===null)));
  const waitingOnOpponent = state.challenges.filter(c => c.status==='active' && challengeInvolvesPlayer(c, myId) &&
    ((c.fromPlayerId===myId && c.fromScore!==null) || (c.toPlayerId===myId && c.toScore!==null)));
  const completed = state.challenges.filter(c => c.status==='completed' && challengeInvolvesPlayer(c, myId));

  if(!incoming.length && !awaitingMyPlay.length && !waitingOnOpponent.length && !completed.length) return '';

  const incomingHTML = incoming.map(c=>{
    const fromP = state.profiles[c.fromPlayerId];
    const subjMeta = SUBJECTS.find(x=>x.key===c.subject);
    return `<div class="gear-item-row">
      <div class="gear-item-info"><strong>${fromP?fromP.name:'Someone'}</strong> challenged you in ${subjMeta.icon} ${subjMeta.name}!</div>
      <div class="gear-item-actions">
        <button class="btn brass" data-accept-chal="${c.id}" style="min-width:auto;">Accept</button>
        <button class="btn ghost" data-decline-chal="${c.id}" style="min-width:auto;">Decline</button>
      </div>
    </div>`;
  }).join('');

  const awaitingHTML = awaitingMyPlay.map(c=>{
    const opponentId = c.fromPlayerId===myId ? c.toPlayerId : c.fromPlayerId;
    const opponent = state.profiles[opponentId];
    const subjMeta = SUBJECTS.find(x=>x.key===c.subject);
    return `<div class="gear-item-row">
      <div class="gear-item-info"><strong>${subjMeta.icon} ${subjMeta.name}</strong> vs ${opponent?opponent.name:'opponent'} — your turn to play!</div>
      <div class="gear-item-actions"><button class="btn brass" data-play-chal="${c.id}" style="min-width:auto;">Play Now</button></div>
    </div>`;
  }).join('');

  const waitingHTML = waitingOnOpponent.map(c=>{
    const opponentId = c.fromPlayerId===myId ? c.toPlayerId : c.fromPlayerId;
    const opponent = state.profiles[opponentId];
    const subjMeta = SUBJECTS.find(x=>x.key===c.subject);
    return `<div class="gear-item-row">
      <div class="gear-item-info"><strong>${subjMeta.icon} ${subjMeta.name}</strong> vs ${opponent?opponent.name:'opponent'} — <span style="color:var(--text-dim);">waiting for them to play</span></div>
    </div>`;
  }).join('');

  const completedHTML = completed.map(c=>{
    const opponentId = c.fromPlayerId===myId ? c.toPlayerId : c.fromPlayerId;
    const opponent = state.profiles[opponentId];
    const subjMeta = SUBJECTS.find(x=>x.key===c.subject);
    const myScore = c.fromPlayerId===myId ? c.fromScore : c.toScore;
    const theirScore = c.fromPlayerId===myId ? c.toScore : c.fromScore;
    const won = c.winnerId===myId;
    const tied = c.winnerId==='tie';
    return `<div class="gear-item-row">
      <div class="gear-item-info">
        <strong>${tied?'🤝 Tied':(won?'🏆 You won!':'😔 You lost')}</strong> vs ${opponent?opponent.name:'opponent'} in ${subjMeta.icon} ${subjMeta.name} (${myScore}-${theirScore})
        ${tied?'':(won?` <span style="color:var(--teal);font-weight:700;">+${CHALLENGE_STAKE} XP</span>`:` <span style="color:var(--coral);font-weight:700;">−${CHALLENGE_STAKE} XP</span>`)}
      </div>
      <div class="gear-item-actions"><button class="btn ghost" data-dismiss-chal="${c.id}" style="min-width:auto;">Dismiss</button></div>
    </div>`;
  }).join('');

  return `<div class="card" style="margin-bottom:16px;">
    ${incomingHTML}${awaitingHTML}${waitingHTML}${completedHTML}
  </div>`;
}

function renderChallengePick(){
  const myId = state.activePlayerId;
  const others = state.playerIds.filter(id => id!==myId && state.profiles[id] && state.profiles[id].name);
  const draft = state.challengeDraft || {};

  if(!draft.opponentId){
    const rows = others.map(id=>{
      const p = state.profiles[id];
      return `<button class="btn ghost" style="width:100%;margin-bottom:10px;justify-content:flex-start;" data-pick-opponent="${id}">${p.avatarEmoji||'🧭'} ${p.name}</button>`;
    }).join('');
    return `
    ${renderHeader()}
    <div class="card setup-card" style="margin-bottom:16px;">
      <span class="back-link" id="challengePickBackLink1">← Back</span>
      <h2 class="display" style="margin-top:0;">⚔️ Challenge a Sibling</h2>
      <p>Step 1 of 2: Who do you want to challenge?</p>
    </div>
    <div class="card">${others.length ? rows : '<p style="color:var(--text-dim);margin:0;">No other explorers to challenge yet — create another player first.</p>'}</div>`;
  }

  const opponent = state.profiles[draft.opponentId];
  const subjectRows = SUBJECTS.map(s=>{
    const blocked = playerHasActiveChallengeInSubject(myId, s.key) || playerHasActiveChallengeInSubject(draft.opponentId, s.key);
    return `<button class="btn ${blocked?'ghost':'brass'}" style="width:100%;margin-bottom:10px;justify-content:flex-start;" data-pick-subject="${s.key}" ${blocked?'disabled':''}>${s.icon} ${s.name}${blocked?' — already has an active challenge':''}</button>`;
  }).join('');
  return `
  ${renderHeader()}
  <div class="card setup-card" style="margin-bottom:16px;">
    <span class="back-link" id="challengePickBackLink2">← Choose a different sibling</span>
    <h2 class="display" style="margin-top:0;">⚔️ Challenge ${opponent.name}</h2>
    <p>Step 2 of 2: Pick a subject. You'll both play ${CHALLENGE_QUESTION_COUNT} questions — winner gets ${CHALLENGE_STAKE} bonus XP, loser loses ${CHALLENGE_STAKE} XP. They'll need to accept before it counts.</p>
  </div>
  <div class="card">${subjectRows}</div>`;
}
function attachChallengePickEvents(){
  const myId = state.activePlayerId;
  const draft = state.challengeDraft || {};
  if(!draft.opponentId){
    document.getElementById('challengePickBackLink1').addEventListener('click', ()=>{ state.screen='dashboard'; state.challengeDraft=null; render(); });
    app.querySelectorAll('[data-pick-opponent]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        Sound.unlock(); Sound.click();
        state.challengeDraft = { opponentId: btn.getAttribute('data-pick-opponent') };
        render();
      });
    });
  } else {
    document.getElementById('challengePickBackLink2').addEventListener('click', ()=>{ state.challengeDraft=null; render(); });
    app.querySelectorAll('[data-pick-subject]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        Sound.unlock();
        const subject = btn.getAttribute('data-pick-subject');
        const result = createChallenge(myId, draft.opponentId, subject);
        if(result.ok){
          Sound.badge();
          await saveChallenges(state.challenges);
          state.challengeDraft = null;
          state.screen = 'dashboard';
          render();
        } else {
          Sound.click();
          window.alert(result.reason);
        }
      });
    });
  }
}

function startChallengeRound(challengeId){
  const c = state.challenges.find(x=>x.id===challengeId);
  if(!c) return;
  const p = getActiveProfile();
  const track = getActiveTrack();
  const levels = track.subjects[c.subject].levels;
  const targetLevel = p.levelBySubject[c.subject] || 0;
  const usedQuestions = new Set();
  const avoidIds = getTodayAskedSet(p);
  const questions = [];
  for(let i=0;i<CHALLENGE_QUESTION_COUNT;i++){
    const picked = pickNextUniqueQuestion(levels, targetLevel, usedQuestions, avoidIds, []);
    questions.push(picked.q);
    usedQuestions.add(picked.q);
    recordAskedToday(p, picked.q._id);
  }
  state.challengeRound = { challengeId, questions, idx:0, correctCount:0, awaitingNext:false, chosenIdx:null };
  state.screen = 'challenge-battle';
  if(SETTINGS.musicOn){ Sound.unlock(); Sound.startAmbient(c.subject); startMusicRotation(); }
  render();
}

function renderChallengeBattle(){
  const s = state.challengeRound;
  const c = state.challenges.find(x=>x.id===s.challengeId);
  const subjMeta = SUBJECTS.find(x=>x.key===c.subject);
  const q = s.questions[s.idx];
  const dots = s.questions.map((_,i)=>{
    if(i<s.idx) return '✅';
    if(i===s.idx) return '⚔️';
    return '⬜';
  }).join(' ');
  return `
  ${renderHeader()}
  <div class="card">
    <div class="session-header">
      <span class="level-chip" style="background:linear-gradient(135deg,#FF2E63,#B14AFF);color:#fff;">⚔️ CHALLENGE · ${subjMeta.icon} ${subjMeta.name}</span>
    </div>
    <p style="font-weight:700;color:var(--violet);margin:8px 0;">Question ${s.idx+1} of ${CHALLENGE_QUESTION_COUNT} — ${dots}</p>
    <div class="q-card">
      ${renderQuestionBody(q)}
      <div id="chalChoicesWrap">
        ${q.c.map((choice,i)=>`<button class="choice" data-idx="${i}">${choice}</button>`).join('')}
      </div>
      <div id="chalExplainWrap"></div>
      <div id="chalNextWrap" style="margin-top:16px;"></div>
    </div>
  </div>`;
}
function attachChallengeBattleEvents(){
  const s = state.challengeRound;
  app.querySelectorAll('#chalChoicesWrap .choice').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(s.awaitingNext) return;
      Sound.unlock();
      const idx = parseInt(btn.getAttribute('data-idx'));
      s.awaitingNext = true; s.chosenIdx = idx;
      const q = s.questions[s.idx];
      const correct = idx === q.a;
      app.querySelectorAll('#chalChoicesWrap .choice').forEach((b,i)=>{
        b.disabled = true;
        if(i===q.a) b.classList.add('correct');
        else if(i===idx) b.classList.add('incorrect');
      });
      document.getElementById('chalExplainWrap').innerHTML = `<div class="explain">${correct?'✅ Correct! ':'❌ '}${q.n}</div>`;
      if(correct){ s.correctCount += 1; Sound.correct(); } else { Sound.incorrect(); }
      if(s.idx >= CHALLENGE_QUESTION_COUNT-1){
        document.getElementById('chalNextWrap').innerHTML = `<button class="btn brass" id="chalNextBtn">Finish Challenge</button>`;
        document.getElementById('chalNextBtn').addEventListener('click', ()=> endChallengeRound());
      } else {
        document.getElementById('chalNextWrap').innerHTML = `<button class="btn brass" id="chalNextBtn">Next Question →</button>`;
        document.getElementById('chalNextBtn').addEventListener('click', ()=>{ s.idx += 1; s.awaitingNext=false; s.chosenIdx=null; render(); });
      }
    });
  });
}
async function endChallengeRound(){
  const s = state.challengeRound;
  stopMusicRotation();
  const p = getActiveProfile();
  await submitChallengeScore(s.challengeId, state.activePlayerId, s.correctCount);
  await saveProfile(state.activePlayerId, p);
  state.screen = 'dashboard';
  render();
}

/* =========================================================================
   INIT
   ========================================================================= */
async function init(){
  addIdsToTrackQuestions(trackA); addIdsToTrackQuestions(trackB); addIdsToTrackQuestions(trackC); addIdsToTrackQuestions(trackAdult);
  const [playerIds, settings, challenges] = await Promise.all([migrateLegacyProfilesIfNeeded(), loadSettings(), loadChallenges()]);
  state.playerIds = playerIds;
  const profiles = await Promise.all(playerIds.map(id=>loadProfile(id)));
  state.profiles = {};
  playerIds.forEach((id,i)=> state.profiles[id] = profiles[i]);
  SETTINGS = settings;
  state.challenges = challenges;
  state.screen = 'pick-track';
  render();
  if(SETTINGS.musicOn){
    document.body.addEventListener('click', function unlockOnce(){
      Sound.unlock(); Sound.startAmbient();
      document.body.removeEventListener('click', unlockOnce);
    }, {once:true});
  }
}
init();
</script>
