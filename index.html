<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Explorer's Guild</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Public+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0D1128;
    --bg-deep-2:#171233;
    --panel:#FFFFFF;
    --panel-tint:#F6F3FF;
    --text-dark:#1C1533;
    --text-dim:#5B5470;
    --ink-text:#EAF0FF;
    --line: rgba(234,240,255,0.14);

    --violet:#7C5CFF;
    --violet-light:#9B82FF;
    --teal:#00D9C0;
    --teal-light:#4CF0DD;
    --amber:#FFB020;
    --amber-light:#FFCB61;
    --coral:#FF4D6D;
    --coral-light:#FF7590;

    --math:#FF9F1C;
    --science:#00D9C0;
    --history:#FF4D6D;
    --reading:#4D8DFF;
    --writing:#B14AFF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 700px 500px at 12% -6%, rgba(124,92,255,0.35), transparent 60%),
      radial-gradient(ellipse 600px 480px at 92% 8%, rgba(0,217,192,0.25), transparent 55%),
      radial-gradient(ellipse 700px 600px at 50% 110%, rgba(255,77,109,0.18), transparent 55%),
      linear-gradient(160deg, var(--bg-deep-2), var(--bg-deep) 55%);
    background-attachment:fixed;
    color:var(--ink-text);
    font-family:'Public Sans', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }
  body::before{
    content:'';
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      radial-gradient(1.5px 1.5px at 10% 20%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 80% 15%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 60% 65%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1.5px 1.5px at 30% 80%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 90% 75%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1.5px 1.5px at 45% 40%, rgba(255,255,255,0.3), transparent);
    background-size:100% 100%;
    animation:twinkle 4s ease-in-out infinite alternate;
  }
  @keyframes twinkle{from{opacity:0.5;}to{opacity:1;}}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  @keyframes popIn{0%{transform:scale(0.3) translateY(14px);opacity:0;}65%{transform:scale(1.12);opacity:1;}100%{transform:scale(1);}}
  @keyframes floatY{0%,100%{transform:translateY(0px);}50%{transform:translateY(-6px);}}
  @keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 4px currentColor);}50%{filter:drop-shadow(0 0 16px currentColor);}}
  @keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
  @keyframes confettiFall{
    0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
    100%{transform:translateY(240px) rotate(380deg);opacity:0;}
  }
  .confetti-piece{position:fixed;top:0;width:9px;height:9px;border-radius:3px;pointer-events:none;z-index:999;animation:confettiFall 1.7s ease-in forwards;}
  .stamp{animation:popIn .45s cubic-bezier(.3,1.4,.5,1);}
  .display{font-family:'Baloo 2', sans-serif;}
  .mono{font-family:'JetBrains Mono', monospace;}
  .app{max-width:1000px;margin:0 auto;padding:28px 20px 80px;position:relative;z-index:1;}

  /* ---------- Header ---------- */
  .brand{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
  .brand-badge{
    width:50px;height:50px;border-radius:16px;
    background:linear-gradient(135deg, var(--violet), var(--teal));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 3px rgba(234,240,255,0.08), 0 6px 18px rgba(124,92,255,0.45);
    animation:floatY 3.5s ease-in-out infinite;
  }
  .brand h1{font-family:'Baloo 2',sans-serif;font-size:24px;margin:0;font-weight:700;letter-spacing:0.2px;
    background:linear-gradient(90deg, #fff, var(--teal-light));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .brand p{margin:0;font-size:12px;color:var(--violet-light);letter-spacing:1.8px;text-transform:uppercase;font-weight:700;}
  .brand-spacer{flex:1;}
  .sound-controls{display:flex;gap:8px;}
  .sound-btn{
    width:42px;height:42px;border-radius:14px;border:1px solid var(--line);
    background:rgba(255,255,255,0.06);color:var(--ink-text);cursor:pointer;font-size:18px;
    display:flex;align-items:center;justify-content:center;transition:all .15s ease;
    backdrop-filter:blur(6px);
  }
  .sound-btn:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,217,192,0.3);}
  .sound-btn.off{opacity:.4;}

  .hero-banner{margin:-4px 0 22px;filter:drop-shadow(0 10px 30px rgba(124,92,255,0.25));}
  .hero-banner svg{width:100%;height:auto;display:block;}

  .node-illustration{transition:transform .15s ease;}
  .node-btn{cursor:pointer;}
  .node-btn:hover .node-illustration{transform:translateY(-4px) scale(1.05);}
  .node-glow{animation:pulseGlow 2.2s ease-in-out infinite;}

  /* ---------- Profile tabs ---------- */
  .profile-tabs{display:flex;gap:10px;margin-bottom:26px;flex-wrap:wrap;}
  .profile-tab{
    flex:1; min-width:150px;
    background:rgba(255,255,255,0.05); border:1.5px solid var(--line); border-radius:16px;
    padding:13px 15px; cursor:pointer; transition:all .18s ease; text-align:left;
    backdrop-filter:blur(8px);
  }
  .profile-tab:hover{border-color:var(--violet-light); transform:translateY(-2px);}
  .profile-tab.active{border-color:var(--teal); background:linear-gradient(135deg, rgba(0,217,192,0.18), rgba(124,92,255,0.10)); box-shadow:0 4px 20px rgba(0,217,192,0.2);}
  .profile-tab .name{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:16px;}
  .profile-tab .sub{font-size:11.5px;color:#B7B4D6;margin-top:2px;}
  .profile-tab .flame{font-size:12px;color:var(--amber-light);margin-top:6px;display:flex;align-items:center;gap:5px;font-weight:600;}

  /* ---------- Card base ---------- */
  .card{
    background:linear-gradient(180deg, var(--panel), var(--panel-tint));
    color:var(--text-dark);
    border-radius:22px;
    padding:24px;
    box-shadow:0 20px 50px rgba(5,5,20,0.45), 0 0 0 1px rgba(124,92,255,0.15);
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:'';
    position:absolute; top:0; left:0; right:0; height:5px;
    background:linear-gradient(90deg, var(--violet), var(--teal), var(--amber), var(--coral));
  }

  /* ---------- Setup screen ---------- */
  .setup-card h2{margin-top:0;font-family:'Baloo 2',sans-serif;}
  .setup-card input{
    width:100%; padding:13px 15px; border-radius:12px; border:2px solid #E1DBFF;
    font-size:15px; font-family:inherit; background:#FBFAFF; margin-top:6px; color:var(--text-dark);
  }
  .setup-card input:focus{outline:none;border-color:var(--violet);}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    background:linear-gradient(135deg, var(--violet), #5B3FE0); color:#F5F0FF; border:none; border-radius:14px;
    padding:13px 22px; font-size:15px; font-weight:700; cursor:pointer;
    font-family:'Public Sans',sans-serif; transition:transform .12s ease, box-shadow .15s ease;
    box-shadow:0 6px 18px rgba(124,92,255,0.4);
  }
  .btn:hover{transform:translateY(-2px) scale(1.015); box-shadow:0 10px 26px rgba(124,92,255,0.55);}
  .btn:active{transform:translateY(0px) scale(0.98);}
  .btn.brass{background:linear-gradient(135deg, var(--amber), #FF8A3D); box-shadow:0 6px 18px rgba(255,176,32,0.4);}
  .btn.brass:hover{box-shadow:0 10px 26px rgba(255,176,32,0.55);}
  .btn.ghost{background:rgba(124,92,255,0.06);border:2px solid var(--violet);color:var(--violet);box-shadow:none;}
  .btn.ghost:hover{background:rgba(124,92,255,0.12);box-shadow:0 6px 16px rgba(124,92,255,0.2);}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}

  /* ---------- Dashboard: trail map ---------- */
  .trail-wrap{margin:20px 0 28px;}
  .trail-svg{width:100%;height:auto;display:block;}
  .node-label{font-family:'Baloo 2',sans-serif;font-weight:700;}
  .trail-path-glow{animation:dashFlow 1.6s linear infinite;}
  @keyframes dashFlow{to{stroke-dashoffset:-24;}}

  .stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:22px;}
  .stat-pill{
    background:rgba(255,255,255,0.06); border:1.5px solid var(--line); border-radius:16px;
    padding:13px 16px; flex:1; min-width:130px; backdrop-filter:blur(8px);
  }
  .stat-pill .num{font-family:'JetBrains Mono',monospace;font-size:23px;font-weight:700;
    background:linear-gradient(90deg, var(--teal-light), var(--violet-light));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .stat-pill .lbl{font-size:11px;color:#B7B4D6;text-transform:uppercase;letter-spacing:1.2px;font-weight:700;}

  .section-title{font-family:'Baloo 2',sans-serif;font-size:20px;font-weight:700;margin:26px 0 12px;color:var(--ink-text);}

  /* ---------- Badges / passport ---------- */
  .passport{display:flex;flex-wrap:wrap;gap:12px;}
  .stamp{
    width:90px;height:90px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    background:linear-gradient(150deg, #fff, var(--panel-tint));
    border:3px solid var(--amber); color:var(--text-dark); text-align:center; padding:6px;
    font-size:10.5px; font-weight:700; line-height:1.2;
    box-shadow:0 6px 18px rgba(255,176,32,0.35);
  }
  .stamp .emoji{font-size:23px;margin-bottom:2px;}
  .stamp.locked{opacity:.28; border-style:dashed; border-color:#6b6690; box-shadow:none;}

  /* ---------- Subject session ---------- */
  .session-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .timer{
    font-family:'JetBrains Mono',monospace; font-size:27px; font-weight:700;
    background:linear-gradient(135deg, rgba(124,92,255,0.12), rgba(0,217,192,0.12)); border:2px solid var(--violet-light); border-radius:14px; padding:8px 18px;
    color:var(--violet);
  }
  .timer.warn{color:var(--coral); border-color:var(--coral); animation:pulseGlow 0.9s ease-in-out infinite;}
  .level-chip{
    display:inline-block; background:linear-gradient(135deg, var(--teal), #00A88F); color:#053B34; font-size:11.5px; font-weight:800;
    padding:6px 14px; border-radius:999px; text-transform:uppercase; letter-spacing:0.5px;
  }
  .score-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:12px 0;}
  .score-badge{
    display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:800;
    background:var(--panel-tint);border:1.5px solid #E1DBFF;border-radius:999px;padding:6px 13px;color:var(--text-dark);
  }
  .score-badge.alt{background:#EFEBFF;}
  .combo-flame{
    font-size:13px;font-weight:800;color:#FF8A00;
    background:linear-gradient(135deg,#FFF3E0,#FFE0B2);border:1.5px solid #FFB020;border-radius:999px;padding:6px 13px;
    animation:popIn .3s ease-out;
  }
  .combo-bonus{color:var(--amber);font-weight:800;}
  .mascot-bubble{
    width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:19px;border:2px solid; animation:floatY 2.4s ease-in-out infinite;
  }
  .battle-arena{
    display:flex;align-items:center;gap:14px;margin:14px 0 18px;
    background:var(--panel-tint);border-radius:16px;padding:16px;
  }
  .battle-arena.dark{background:rgba(255,255,255,0.06);}
  .combatant{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:8px;}
  .combatant-label{font-weight:800;font-size:13.5px;color:var(--text-dark);text-align:center;}
  .battle-arena.dark .combatant-label{color:#EDE6FF;}
  .combatant-icon{
    display:inline-flex;align-items:center;justify-content:center;border-radius:50%;position:relative;
  }
  .player-portrait{width:64px;height:64px;border:3px solid #7C5CFF;background:#7C5CFF33;}
  .player-emoji-badge{font-size:32px;}
  .weapon-badge{position:absolute;bottom:-4px;right:-4px;font-size:16px;background:#1C1533;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,0.3);}
  .boss-portrait{width:104px;height:104px;filter:drop-shadow(0 0 16px rgba(255,45,99,0.5));}
  .boss-emoji-badge{position:absolute;font-size:46px;}
  .boss-aura{animation:bossAuraPulse 2s ease-in-out infinite;}
  @keyframes bossAuraPulse{0%,100%{opacity:.3;}50%{opacity:.6;}}
  .vs-badge{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:15px;color:var(--coral);flex-shrink:0;}
  .hp-wrap{display:flex;flex-direction:column;gap:4px;width:100%;}
  .hp-bar-bg{height:16px;border-radius:999px;background:rgba(0,0,0,0.12);overflow:hidden;}
  .hp-bar-fill{height:100%;border-radius:999px;transition:width .4s ease;}
  .hp-bar-fill.player{background:linear-gradient(90deg,#00D9C0,#00A88F);}
  .hp-bar-fill.boss{background:linear-gradient(90deg,#FF4D6D,#B14AFF);}
  @keyframes lungeRight{0%{transform:translateX(0);}35%{transform:translateX(16px) scale(1.15);}100%{transform:translateX(0);}}
  @keyframes lungeLeft{0%{transform:translateX(0);}35%{transform:translateX(-16px) scale(1.15);}100%{transform:translateX(0);}}
  @keyframes shakeHit{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
  @keyframes flashHit{0%,100%{filter:none;}40%{filter:brightness(1.8) saturate(2);}}
  .combatant-icon.attack-right{animation:lungeRight .4s ease;}
  .combatant-icon.attack-left{animation:lungeLeft .4s ease;}
  .combatant-icon.hit-shake{animation:shakeHit .4s ease, flashHit .4s ease;}
  .impact-star{
    position:absolute; top:-10px; right:-10px; font-size:20px; pointer-events:none;
    animation:impactPop .5s ease forwards;
  }
  @keyframes impactPop{0%{transform:scale(0.3) rotate(0deg);opacity:1;}100%{transform:scale(1.6) rotate(30deg);opacity:0;}}
  .hp-text{font-size:11.5px;font-weight:700;color:var(--text-dim);}
  .battle-arena.dark .hp-text{color:#D8CFFF;}
  .node-disabled{cursor:default;}
  .q-card{margin-top:6px;}
  .q-text{font-size:24px;font-weight:700;line-height:1.4;margin-bottom:20px;font-family:'Baloo 2',sans-serif;}
  .passage-box{
    background:var(--panel-tint); border:2px solid #D9CFFF; border-radius:14px;
    padding:16px 18px; margin-bottom:16px; font-size:16px; line-height:1.7; color:var(--text-dark);
  }
  .passage-label{font-weight:800;font-size:12.5px;text-transform:uppercase;letter-spacing:0.6px;color:var(--violet);margin-bottom:8px;}
  .choice{
    display:block; width:100%; text-align:left; padding:16px 19px; margin-bottom:12px;
    border-radius:14px; border:2px solid #E1DBFF; background:#FBFAFF; cursor:pointer;
    font-size:18px; font-family:inherit; color:var(--text-dark); transition:all .12s ease;
    font-weight:600;
  }
  .choice:hover{border-color:var(--violet); transform:translateX(3px); box-shadow:0 4px 14px rgba(124,92,255,0.18);}
  .choice.correct{background:linear-gradient(135deg,#DFFBF3,#C8F5E8);border-color:var(--teal); box-shadow:0 4px 16px rgba(0,217,192,0.3);}
  .choice.incorrect{background:linear-gradient(135deg,#FFE4EA,#FFD1DC);border-color:var(--coral); box-shadow:0 4px 16px rgba(255,77,109,0.25);}
  .choice:disabled{cursor:default;}
  .explain{
    margin-top:14px; padding:15px 17px; border-radius:14px; background:var(--panel-tint);
    font-size:14px; border-left:5px solid var(--violet); font-weight:500;
  }
  .open-prompt{font-size:16px; line-height:1.6; margin-bottom:14px;}
  .guidance{background:var(--panel-tint); border-radius:14px; padding:15px 17px; font-size:13.5px; margin-bottom:16px; border:1.5px dashed #C9BBFF;}
  .match-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .match-col{display:flex;flex-direction:column;gap:10px;}
  .match-btn{
    padding:14px 12px; border-radius:12px; border:2px solid #E1DBFF; background:#FBFAFF;
    font-family:inherit; font-size:14px; font-weight:600; color:var(--text-dark); cursor:pointer;
    text-align:center; transition:all .15s ease; min-height:56px; display:flex; align-items:center; justify-content:center;
  }
  .match-btn.def{font-size:12.5px; font-weight:500; line-height:1.3;}
  .match-btn:hover:not([disabled]){border-color:var(--amber); transform:translateY(-1px);}
  .match-btn.selected{border-color:var(--amber); background:linear-gradient(135deg,#FFF3D6,#FFE7A8); box-shadow:0 0 0 2px var(--amber);}
  .match-btn.matched{background:linear-gradient(135deg,#DFFBF3,#C8F5E8); border-color:var(--teal); opacity:0.7; cursor:default;}
  .match-btn.wrong{background:linear-gradient(135deg,#FFE4EA,#FFD1DC); border-color:var(--coral); animation:shakeHit .4s ease;}
  @media (max-width:600px){ .match-btn{font-size:12.5px; padding:10px 8px; min-height:48px;} }
  .guidance ul{margin:6px 0 0; padding-left:18px;}
  textarea{
    width:100%; min-height:110px; border-radius:12px; border:2px solid #E1DBFF;
    font-family:inherit; font-size:14.5px; padding:12px; background:#FBFAFF; color:var(--text-dark);
  }
  textarea:focus{outline:none;border-color:var(--violet);}

  .progressbar{height:10px;border-radius:999px;background:var(--panel-tint);overflow:hidden;margin-bottom:16px;}
  .progressbar > div{height:100%;background:linear-gradient(90deg, var(--violet), var(--teal));
    background-size:200% 100%; animation:shimmer 1.6s linear infinite;}

  .summary-stat{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1.5px solid #EDE8FF;font-size:15px;font-weight:600;}
  .summary-stat:last-child{border-bottom:none;}

  .back-link{color:var(--teal-light);cursor:pointer;font-size:13.5px;font-weight:700;display:inline-flex;align-items:center;gap:5px;margin-bottom:14px;}
  .back-link:hover{text-decoration:underline;}

  @media (max-width:600px){
    .q-text{font-size:20px;}
    .choice{font-size:16px;padding:14px 16px;}
    .timer{font-size:20px;padding:6px 12px;}
  }

  .hidden{display:none !important;}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
/* =========================================================================
   SUMMER EXPLORER'S GUILD — data + engine
   ========================================================================= */

const SUBJECTS = [
  {key:'math',    name:'Math Mountain',   icon:'⛰️'},
  {key:'science', name:'Science Station', icon:'🔬'},
  {key:'history', name:'History Hall',    icon:'🏛️'},
  {key:'reading', name:'Reading Realm',   icon:'📖'},
  {key:'writing', name:'Writing Woods',   icon:'✍️'}
];

const SESSION_MINUTES = 20;
const RANKS = ['Explorer','Adventurer','Master','Legend'];

/* ---- helper for building MCQ objects tersely: [question, choices[], correctIndex, note] */
function Q(q,c,a,n,passage=null){ return {q, c, a, n, passage}; }

/* =========================================================================
   TRACK A — Rising 3rd Grade (Advanced): 3rd mastery -> push into 4th Q1-Q2
   ========================================================================= */
const trackA = {
  id:'A', label:'Rising 3rd Grade', tagline:'Every quest levels you up — one adventure at a time!',
  levelNames:['2nd Grade Review','3rd Grade + SOLs','4th Grade Q1–Q2'],
  // Content mix: 25% 2nd grade review / 50% 3rd grade (incl. SOLs) / 25% 4th grade,
  // except math, which skews further into 4th grade content per request.
  mixWeights:{ default:[0.25,0.50,0.25], math:[0.15,0.35,0.50] },
  subjects:{
    math:{ levels:[
      [ // L0: 2nd grade review — regrouping, skip counting, comparing, time, shapes
        Q('What is 48 + 27?',['65','75','85','95'],1,'Add the ones (8+7=15, regroup 1 ten), then tens: 40+20+10=70, plus 5 = 75.'),
        Q('What is 82 − 47?',['25','35','45','55'],1,'Regroup: 82−47 = 35.'),
        Q('Skip counting by 5s: 5, 10, 15, 20, ___?',['22','24','25','30'],2,'Each step adds 5: 20+5=25.'),
        Q('Which number is greater: 342 or 324?',['342','324','They are equal','Cannot tell'],0,'Comparing tens digits: 342 has 4 tens, 324 has 2 tens, so 342 is greater.'),
        Q('A shape has exactly 3 sides. What shape is it?',['Square','Triangle','Pentagon','Hexagon'],1,'A shape with 3 sides is a triangle.'),
        Q('Jake had 36 marbles in his collection. For his birthday, his friend gave him 28 more. How many marbles does Jake have now?',['54','64','74','84'],1,'Regroup the ones: 6+8=14 (carry 1 ten), then 30+20+10=60, plus 4 = 64.'),

    reading:{ levels:[
      [ // L0: 2nd grade review — synonyms/antonyms, sequencing, simple character feelings

        Q('Which word means the opposite (antonym) of "fast"?',['Quick','Slow','Loud','Happy'],1,'"Slow" is the opposite of "fast."'),

        Q('Why was Jayden nervous at first?',['He didn\'t like his friends','He had never been on a big field trip before','He was late for the bus','He forgot his lunch'],1,'The passage states Jayden was nervous because he had never been on a big field trip before.',"On Friday, Mr. Bennett's class took a trip to the science museum. At first, Jayden was nervous because he had never been on a big field trip before. But once they arrived, he saw a giant dinosaur skeleton and forgot all about his nerves. He asked the museum guide so many questions that his friends started calling him 'Dr. Jayden.' By the end of the day, Jayden decided that when he grew up, he wanted to study dinosaurs for a living."),
        Q('What is the best word to describe Jayden by the end of the passage?',['Fearful','Curious','Careless','Angry'],1,'Asking many questions and wanting to study dinosaurs shows Jayden became curious.',"On Friday, Mr. Bennett's class took a trip to the science museum. At first, Jayden was nervous because he had never been on a big field trip before. But once they arrived, he saw a giant dinosaur skeleton and forgot all about his nerves. He asked the museum guide so many questions that his friends started calling him 'Dr. Jayden.' By the end of the day, Jayden decided that when he grew up, he wanted to study dinosaurs for a living."),
        Q('Which sentence contains a metaphor?',['The classroom was a zoo during recess prep.','The classroom was noisy like a zoo.','The classroom was very noisy.','The classroom had animals in it.'],0,'This directly compares the classroom to a zoo without "like" or "as," making it a metaphor.'),

        Q('If two texts about the same topic disagree, a strong reader should:',['Believe whichever text is longer','Compare evidence in each and think critically','Ignore both texts','Assume both are equally true without checking'],1,'Comparing evidence across sources builds critical thinking about reliability.'),
        Q('What is the main argument in favor of starting school later, according to the passage?',['Teachers want shorter days','Teen brains naturally wake up later, making early classes hard','Students want more homework time','Buses are too slow'],1,'The passage explains that teenagers\' brains naturally want to wake up later.',"Many students argue that middle and high schools should start later in the morning. They point to research showing that teenagers' brains naturally want to stay up later and wake up later, making early classes hard to focus in. Supporters of later start times believe grades and moods would improve. However, some parents and teachers worry that starting later would make after-school sports and jobs more difficult to schedule. Because of these tradeoffs, many school districts have debated the idea for years without making a final decision."),

    writing:{ levels:[

      [ // L1: 3rd grade + SOL — topic sentences, transitions, narrative structure

/* =========================================================================
   PROCEDURAL MATH GENERATOR
   Hand-authoring 500 unique, correct questions per tier isn't realistic in
   one pass — but math problems are highly templatable, so this generates
   effectively unlimited, verifiably-correct unique problems per tier by
   randomizing numbers within each tier's existing topic scope. Every
   generated question's answer is computed programmatically (not guessed),
   and duplicates are filtered out by question text.
   ========================================================================= */
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function choose(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function buildMCQ(correctLabel, distractorLabels){
  correctLabel = String(correctLabel);
  const uniqueDistractors = [...new Set(distractorLabels.map(String))].filter(d=>d!==correctLabel).slice(0,3);
  let filler=0;
  while(uniqueDistractors.length<3){ uniqueDistractors.push(correctLabel+'_'+(filler++)); }
  const options = shuffle([correctLabel, ...uniqueDistractors]);
  return { c: options, a: options.indexOf(correctLabel) };
}

function genAddition(minA,maxA,minB,maxB){
  const a=randInt(minA,maxA), b=randInt(minB,maxB), ans=a+b;
  const {c,a:ai}=buildMCQ(ans, [ans+10,ans-10,ans+1]);
  return Q(`What is ${a} + ${b}?`, c, ai, `${a} + ${b} = ${ans}.`);
}
function genSubtraction(minA,maxA,minGap,maxGap){
  const a=randInt(minA,maxA), b=randInt(minGap, Math.max(minGap,Math.min(maxGap, a-1)));
  const ans=a-b;
  const {c,a:ai}=buildMCQ(ans, [ans+10,ans-10,ans+1]);
  return Q(`What is ${a} − ${b}?`, c, ai, `${a} − ${b} = ${ans}.`);
}
function genMultiplication(minA,maxA,minB,maxB){
  const a=randInt(minA,maxA), b=randInt(minB,maxB), ans=a*b;
  const {c,a:ai}=buildMCQ(ans, [ans+b,ans-b,a*(b+1)]);
  return Q(`What is ${a} × ${b}?`, c, ai, `${a} × ${b} = ${ans}.`);
}
function genDivision(minDivisor,maxDivisor,minQuotient,maxQuotient){
  const b=randInt(minDivisor,maxDivisor), q=randInt(minQuotient,maxQuotient), a=b*q;
  const {c,a:ai}=buildMCQ(q, [q+1,q-1,q+2]);
  return Q(`${a} ÷ ${b} = ?`, c, ai, `${b} × ${q} = ${a}, so ${a} ÷ ${b} = ${q}.`);
}
function genCompare(minV,maxV){
  let a=randInt(minV,maxV), b=randInt(minV,maxV);
  while(a===b) b=randInt(minV,maxV);
  const bigger = Math.max(a,b);
  const opts=[String(a),String(b),'They are equal','Cannot tell'];
  const ai = a>b?0:1;
  return Q(`Which number is greater: ${a} or ${b}?`, opts, ai, `${bigger} is greater.`);
}
function genSkipCounting(step,startMin,startMax){
  const start=randInt(startMin,startMax);
  const seq=[start,start+step,start+step*2,start+step*3];
  const ans=start+step*4;
  const {c,a:ai}=buildMCQ(ans, [ans+step,ans-step,ans-1]);
  return Q(`Skip counting by ${step}s: ${seq.join(', ')}, ___?`, c, ai, `Each step adds ${step}: ${seq[3]}+${step}=${ans}.`);
}
function genAreaRect(minSide,maxSide){
  const l=randInt(minSide,maxSide), w=randInt(minSide,maxSide), ans=l*w;
  const {c,a:ai}=buildMCQ(ans, [l+w, 2*(l+w), ans+2]);
  return Q(`A rectangle is ${l} units long and ${w} units wide. What is its area?`, c, ai, `Area = length × width = ${l} × ${w} = ${ans}.`);
}
function genPerimeterRect(minSide,maxSide){

  return Q(`What is the perimeter of a rectangle ${l} cm long and ${w} cm wide?`, c.map(x=>x+' cm'), ai, `Perimeter = 2(length+width) = 2(${l}+${w}) = ${ans} cm.`);
}
function genPerimeterSquare(minSide,maxSide){
  const side=randInt(minSide,maxSide), ans=4*side;

}
function gcd(a,b){ return b===0 ? a : gcd(b, a%b); }
function coprimeFractionBases(maxDenom){
  const bases=[];
  for(let d=2; d<=maxDenom; d++){
    for(let n=1; n<d; n++){ if(gcd(n,d)===1) bases.push([n,d]); }
  }
  return bases;
}
function genFractionEquivalence(){
  const bases = coprimeFractionBases(20);
  const [n,d]=choose(bases);
  const k=randInt(2,5);
  const correct=`${n*k}/${d*k}`;
  const {c,a:ai}=buildMCQ(correct, [`${n*k+1}/${d*k}`, `${n}/${d*k}`, `${n*k}/${d*k+1}`]);
  return Q(`Which fraction is equivalent to ${n}/${d}?`, c, ai, `${n}/${d} scaled by ${k} is ${n*k}/${d*k}.`);
}
function genFractionAddSameDenom(){

  const {c,a:ai}=buildMCQ(correct, [`${ans}/${2*d}`, `${n1}/${d}`, `${ans+1}/${d}`]);
  return Q(`${n1}/${d} + ${n2}/${d} = ?`, c, ai, `Same denominator: add numerators, keep denominator: ${n1}+${n2}=${ans}, so ${ans}/${d}.`);
}
function genDecimalTenths(){
  const denom = choose([10,100]);
  const n=randInt(1,denom-1);
  const correct = denom===10 ? `0.${n}` : `0.${n<10?'0'+n:n}`;
  const wrongPad = denom===10 ? `0.0${n}` : `0.${n}`;
  const {c,a:ai}=buildMCQ(correct, [wrongPad, `${n}.${denom===10?'10':'100'}`, denom===10?`0.1${n}`:`0.${n}1`]);
  return Q(`Which decimal is the same as the fraction ${n}/${denom}?`, c, ai, `${n}/${denom} written as a decimal is ${correct}.`);
}
function genDecimalAdd(){

}
function genVolume(){

function genOrderOfOps(){
  const a=randInt(2,9), b=randInt(1,9), cc=randInt(2,9), d=randInt(1,cc-1);
  const ans=a+b*(cc-d);
  const {c,a:ai}=buildMCQ(ans, [ans+2,ans-2,(a+b)*(cc-d)]);
  return Q(`Using order of operations, what is ${a} + ${b} × (${cc} - ${d})?`, c, ai, `Parentheses first: ${cc}-${d}=${cc-d}, then ${b}×${cc-d}=${b*(cc-d)}, then ${a}+${b*(cc-d)}=${ans}.`);
}
function genRatioScale(){
  const pairs=[[2,3],[1,2],[3,4],[2,5],[3,5]];
  const [r1,r2]=choose(pairs);
  const k=randInt(2,6);
  const given=r1*k, ans=r2*k;
  const {c,a:ai}=buildMCQ(ans, [ans+r2, Math.max(1,ans-r2), given]);
  return Q(`If a recipe uses a ratio of ${r1} cups flour to ${r2} cups sugar, how much sugar is needed for ${given} cups of flour?`, c.map(x=>x+' cups'), ai, `${given} cups of flour is ${k} times ${r1}, so sugar scales the same way: ${r2}×${k}=${ans} cups.`);
}
function genIntegerAdd(range){
  const a=randInt(-range,range), b=randInt(-range,range), ans=a+b;
  const {c,a:ai}=buildMCQ(ans, [ans+2,ans-2,-ans]);

}
function genIntegerMultiply(range){
  const a=randInt(-range,-1), b=randInt(1,range), ans=a*b;
  const {c,a:ai}=buildMCQ(ans, [Math.abs(ans), ans+b, ans-b]);
  return Q(`${a} × ${b} = ?`, c, ai, `A negative times a positive is negative: ${a} × ${b} = ${ans}.`);
}
function genMean(avgMin,avgMax){
  const avg=randInt(avgMin,avgMax), total=avg*5;
  let vals=[], remaining=total;
  for(let i=0;i<4;i++){
    const maxV=Math.max(1, Math.min(remaining-(4-i), avg*2));
    const v=randInt(1,maxV);
    vals.push(v); remaining-=v;
  }
  if(remaining<1) return genMean(avgMin,avgMax);
  vals.push(remaining);
  const {c,a:ai}=buildMCQ(avg, [avg+1,avg-1,avg+2]);
  return Q(`What is the mean (average) of ${shuffle(vals).join(', ')}?`, c, ai, `Sum = ${total}, divided by 5 values = ${avg}.`);
}
function genLinearEquation(){

function genSlope(){

function genComplementaryFind(){

function fillMathLevelToTarget(levelArr, generators, target){
  const seen = new Set(levelArr.map(q=>q.q));
  let attempts=0;
  while(levelArr.length<target && attempts<target*25){
    attempts++;
    const gen = choose(generators);
    let q;
    try{ q = gen(); }catch(e){ continue; }
    if(!q || seen.has(q.q)) continue;
    seen.add(q.q);
    levelArr.push(q);
  }
}

    correctBySubject:{math:0,science:0,history:0,reading:0,writing:0},
    answeredBySubject:{math:0,science:0,history:0,reading:0,writing:0},
    streak:0, lastActiveDate:null,
    badges:[],
    completedTodaySubjects:[], // subjects whose boss has been defeated TODAY
    lastActiveDayForFullQuest:null,
    bossLastCompletedDate:null, bossWinsTotal:0, // "final boss" tracking
    earnings:{ ipad:0, tv:0, free:0 }, // accumulated, unredeemed minutes
    earningsLog:[], // recent {date, type, minutes, reason} entries, newest first
    dailyLog:{}, // date -> { subjects:{math:{correct,total},...}, bossesDefeated:[], finalBossResult:null, xpEarned:0 }
    reviewQueue:[], // spaced-repetition: [{id, subject, dueDate, missCount}]

    subjectMomentum:{math:0,science:0,history:0,reading:0,writing:0}, // recent performance, drives adaptive difficulty

/* ---------- Spaced repetition (Review Realm) ---------- */
// Question ids are stable strings derived from their fixed position in the
// track's data (subject:level:index) since arrays are never reordered.
function questionId(subjectKey, levelIdx, qIdx){ return `${subjectKey}:${levelIdx}:${qIdx}`; }
function findQuestionById(track, id){
  const [subjectKey, levelIdx, qIdx] = id.split(':');
  const levels = track.subjects[subjectKey].levels;
  const li = parseInt(levelIdx), qi = parseInt(qIdx);
  if(!levels[li] || !levels[li][qi]) return null;
  return { q: levels[li][qi], subject: subjectKey, levelIdx: li };
}
function addIdsToTrackQuestions(track){
  // idempotent: tags every question object with its own stable id, once
  Object.keys(track.subjects).forEach(subjectKey=>{
    track.subjects[subjectKey].levels.forEach((qs, li)=>{
      qs.forEach((q, qi)=>{ if(!q._id) q._id = questionId(subjectKey, li, qi); });
    });
  });
}
function recordMiss(p, track, subjectKey, questionObj){
  if(!questionObj._id) return;
  const today = todayStr();
  const existing = p.reviewQueue.find(item=>item.id===questionObj._id);
  if(existing){
    existing.missCount += 1;
    existing.dueDate = today; // due again soon since they missed it again
  } else {
    const due = new Date(); due.setDate(due.getDate()+2);
    p.reviewQueue.push({ id: questionObj._id, subject: subjectKey, dueDate: due.toISOString().slice(0,10), missCount:1 });
  }
  if(p.reviewQueue.length>60) p.reviewQueue.shift();
}
function reviewsDueToday(p){
  const today = todayStr();
  return p.reviewQueue.filter(item=>item.dueDate<=today);
}

/* ---------- Day-over-day enemy scaling ---------- */
// Counts distinct calendar days this explorer has played (not a "streak" —
// it never resets, so enemies keep getting tougher across the whole summer).
function registerDayPlayed(p){
  const today = todayStr();
  if(p.lastDayCounted !== today){
    p.totalDaysPlayed = (p.totalDaysPlayed||0) + 1;
    p.lastDayCounted = today;
  }
}

/* Lets a player start today over: HP refills, today's boss completions and
   daily-XP reward tiers reset so they can re-earn them — but total XP,
   badges, and streak are untouched since that's real permanent progress.
   Deliberately does NOT clear todayAskedIds/todayAskedDate, so the question
   picker (see pickNextUniqueQuestion) keeps avoiding whatever was already
   shown today, guaranteeing a fresh set of questions post-reset. */
function resetToday(p){
  const today = todayStr();
  p.completedTodaySubjects = [];
  if(p.bossLastCompletedDate === today) p.bossLastCompletedDate = null;
  p.hp = PLAYER_MAX_HP; p.hpDate = today;
  p.dailyLog[today] = {
    subjects:{math:{correct:0,total:0},science:{correct:0,total:0},history:{correct:0,total:0},reading:{correct:0,total:0},writing:{correct:0,total:0}},
    bossesDefeated:[], finalBossResult:null, xpEarned:0, rewardTiersClaimed:[]
  };
}
const MAX_DIFFICULTY_DAY = 15; // difficulty ramps up until day 15, then holds steady
function dayDifficultyFactor(p){
  return Math.min(MAX_DIFFICULTY_DAY, Math.max(0, (p.totalDaysPlayed||1) - 1));
}
function scaledBossMaxHP(p){ return BOSS_MAX_HP + Math.round(dayDifficultyFactor(p) * 6); }
function scaledWrongDamage(p){ return Math.round(WRONG_DAMAGE + dayDifficultyFactor(p) * 1.1); }

/* ---------- Persistent daily HP ---------- */
// HP now carries across every battle within the same day (not reset per
// battle) — it only refills to full when the calendar date changes.
function getDailyHP(p){
  const today = todayStr();
  if(p.hpDate !== today || p.hp===null || p.hp===undefined){
    p.hp = PLAYER_MAX_HP;
    p.hpDate = today;
  }
  return p.hp;
}
function setDailyHP(p, value){
  p.hp = Math.max(0, Math.min(PLAYER_MAX_HP, value));
  p.hpDate = todayStr();
}

/* ---------- Adaptive performance momentum ---------- */
// A light rolling signal (not a grade/ability label — never shown on screen)
// that nudges the weighted question mix toward harder or easier content
// based on how the last few answers went, layered on top of the track's
// base curriculum mix.
function updateMomentum(p, subjectKey, correct){
  const cur = p.subjectMomentum[subjectKey] || 0;
  const next = correct ? Math.min(4, cur+1) : Math.max(-4, cur-1);
  p.subjectMomentum[subjectKey] = next;
}
function momentumAdjustedWeights(baseWeights, momentum){
  const n = baseWeights.length;
  if(n<2) return baseWeights;
  const w = baseWeights.slice();
  const shift = Math.min(0.5, Math.abs(momentum) * 0.08); // up to 40% of mass shifted at momentum=±5
  if(momentum>=2){
    // shift mass from the lowest tier toward the highest tier
    const move = Math.min(w[0], shift);
    w[0] -= move; w[n-1] += move;
  } else if(momentum<=-2){
    const move = Math.min(w[n-1], shift);
    w[n-1] -= move; w[0] += move;
  }
  return w;
}

function todayLogEntry(p){
  const today = todayStr();
  if(!p.dailyLog[today]){
    p.dailyLog[today] = {
      subjects:{math:{correct:0,total:0},science:{correct:0,total:0},history:{correct:0,total:0},reading:{correct:0,total:0},writing:{correct:0,total:0}},
      bossesDefeated:[], finalBossResult:null, xpEarned:0, rewardTiersClaimed:[]
    };
  }
  if(!p.dailyLog[today].rewardTiersClaimed) p.dailyLog[today].rewardTiersClaimed = [];
  return p.dailyLog[today];
}

function pruneDailyLog(p, keepDays=21){
  const keys = Object.keys(p.dailyLog).sort();
  while(keys.length>keepDays){ delete p.dailyLog[keys.shift()]; }
}

const EARNING_TYPES = [
  {id:'ipad', emoji:'📱', label:'iPad Time'},
  {id:'tv', emoji:'📺', label:'TV Time'},
  {id:'free', emoji:'🎈', label:'Free Time'}
];
function grantEarning(p, minutes, reason){
  const type = EARNING_TYPES[Math.floor(Math.random()*EARNING_TYPES.length)];
  p.earnings[type.id] += minutes;
  p.earningsLog.unshift({ date: todayStr(), type: type.id, minutes, reason });
  if(p.earningsLog.length>40) p.earningsLog.length = 40;
  return type;
}

/* Rewards are now earned from the day's AGGREGATE XP total, not handed out
   after every single battle — crossing each XP milestone for the day grants
   a reward exactly once. */
const XP_REWARD_TIERS = [
  {xp:100, minutes:10},
  {xp:250, minutes:15},
  {xp:450, minutes:15},
  {xp:700, minutes:20},
  {xp:1000, minutes:25}
];
function nextXPRewardTier(p){
  const log = todayLogEntry(p);
  return XP_REWARD_TIERS.find(t=>!log.rewardTiersClaimed.includes(t.xp)) || null;
}
function checkDailyXPRewards(p){
  const log = todayLogEntry(p);
  const earned = [];
  XP_REWARD_TIERS.forEach(tier=>{
    if(log.xpEarned >= tier.xp && !log.rewardTiersClaimed.includes(tier.xp)){
      log.rewardTiersClaimed.push(tier.xp);
      const type = grantEarning(p, tier.minutes, `Reached ${tier.xp} XP today!`);
      earned.push({ type, minutes: tier.minutes, xp: tier.xp });
    }
  });
  return earned;
}

/* =========================================================================
   STORAGE ABSTRACTION
   Uses Claude's artifact storage (window.storage) when this file is viewed
   inside Claude.ai, so a parent can revisit the same artifact anytime.
   Falls back to the browser's own localStorage when the file is downloaded
   and opened directly (e.g., double-clicked, or put on each kid's device) —
   in that case, data is saved per-device/per-browser.
   ========================================================================= */
const Store = (function(){
  const hasClaudeStorage = (typeof window !== 'undefined' && window.storage && typeof window.storage.get === 'function');
  return {
    mode: hasClaudeStorage ? 'claude-artifact' : 'local-browser',
    async get(key){
      if(hasClaudeStorage){
        try{
          const res = await window.storage.get(key, false);
          return (res && res.value) ? res.value : null;
        }catch(e){ return null; }
      } else {
        try{ return window.localStorage.getItem('segw:'+key); }catch(e){ return null; }
      }
    },
    async set(key, value){
      if(hasClaudeStorage){
        try{ await window.storage.set(key, value, false); return true; }catch(e){ return false; }
      } else {
        try{ window.localStorage.setItem('segw:'+key, value); return true; }catch(e){ return false; }
      }
    }
  };
})();

/* =========================================================================
   FORWARD-COMPATIBLE PROFILE LOADING
   Whenever this app is updated with new features (new profile fields, new
   tracked stats, etc.), a returning player's saved data won't have those
   new fields yet. Rather than crash or silently drop old progress, every
   loaded profile is deep-merged onto a fresh defaultProfile(): any field
   the saved profile already has is kept exactly as-is (preserving real
   progress), and any field that's new since their last visit is filled in
   with its default value automatically. Arrays (badges, reviewQueue, etc.)
   are taken as-is from the save rather than merged item-by-item.
   Going forward: purely additive schema changes (new fields) need NO extra
   migration code — just add the field to defaultProfile() above. Only a
   field being renamed or changing shape would need a manual migration step.
   ========================================================================= */
function deepMergeDefaults(saved, defaults){
  if(typeof defaults !== 'object' || defaults===null || Array.isArray(defaults)){
    return saved!==undefined ? saved : defaults;
  }
  const result = {};
  for(const key in defaults){
    result[key] = (saved && Object.prototype.hasOwnProperty.call(saved,key))
      ? deepMergeDefaults(saved[key], defaults[key])
      : defaults[key];
  }
  if(saved && typeof saved==='object' && !Array.isArray(saved)){
    for(const key in saved){ if(!(key in result)) result[key] = saved[key]; }
  }
  return result;
}

async function loadProfile(playerId){
  const raw = await Store.get('profile:'+playerId);
  if(raw){
    try{
      const saved = JSON.parse(raw);
      return deepMergeDefaults(saved, defaultProfile(saved.grade));
    }catch(e){ /* corrupted save — fall through to a fresh profile */ }
  }
  return defaultProfile();
}
async function saveProfile(playerId, profile){
  await Store.set('profile:'+playerId, JSON.stringify(profile));
}

/* One-time migration: earlier versions of this app had exactly three fixed
   player slots ('A','B','C', one per grade). If someone's returning with
   progress saved that way and hasn't been migrated to the new dynamic
   player-list system yet, bring those three across as real players so
   nobody loses their summer's progress. */
async function migrateLegacyProfilesIfNeeded(){
  const existingIds = await loadPlayerIds();
  if(existingIds) return existingIds;
  const legacyGrades = {A:3, B:4, C:6};
  const ids = [];
  for(const legacyId of ['A','B','C']){
    const raw = await Store.get('profile:'+legacyId);
    if(raw){
      try{
        const saved = JSON.parse(raw);
        if(saved && saved.name){
          saved.grade = legacyGrades[legacyId];
          await Store.set('profile:'+legacyId, JSON.stringify(saved));
          ids.push(legacyId);
        }
      }catch(e){}
    }
  }
  await Store.set('playerIds', JSON.stringify(ids));
  return ids;
}

   at random each time a battle starts, so the soundtrack varies. All still
   fully synthesized (no external audio files). */
const MUSIC_RIFFS = [
  [392.00,523.25,587.33,523.25,466.16,523.25,392.00,349.23], // Adventure Start
  [329.63,392.00,440.00,392.00,349.23,392.00,329.63,293.66], // Calm Trail
  [440.00,554.37,659.25,554.37,493.88,554.37,440.00,415.30], // Bright Heroic
  [261.63,329.63,392.00,329.63,293.66,329.63,261.63,246.94], // Mellow Wander
  [493.88,587.33,698.46,587.33,523.25,587.33,493.88,440.00], // Playful Sprint
  [369.99,440.00,523.25,440.00,392.00,440.00,369.99,329.63], // Mysterious Grove
  [523.25,659.25,783.99,659.25,587.33,659.25,523.25,493.88], // Epic Soar
  [293.66,349.23,415.30,349.23,329.63,349.23,293.66,277.18], // Moody Depths
  [415.30,523.25,622.25,523.25,466.16,523.25,415.30,392.00], // Bold Charge
  [349.23,440.00,523.25,440.00,392.00,440.00,349.23,329.63]  // Classic Quest
];

const Sound = (function(){
  let ctx = null;
  let unlocked = false;
  let musicSchedulerId = null;
  let musicStep = 0;
  let currentTrackIndex = -1;

  function getCtx(){
    if(!ctx){
      const AC = window.AudioContext || window.webkitAudioContext;
      ctx = new AC();
    }
    return ctx;
  }
  function unlock(){
    if(unlocked) return;
    const c = getCtx();
    if(c.state === 'suspended') c.resume();
    unlocked = true;
  }

  function tone(freq, start, dur, type='sine', peakGain=0.18, glideTo=null){
    const c = getCtx();
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, c.currentTime + start);
    if(glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, c.currentTime + start + dur*0.9);
    gain.gain.setValueAtTime(0, c.currentTime + start);
    gain.gain.linearRampToValueAtTime(peakGain, c.currentTime + start + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + start + dur);
    osc.connect(gain).connect(c.destination);
    osc.start(c.currentTime + start);
    osc.stop(c.currentTime + start + dur + 0.05);
  }

  /* short filtered-noise burst — used for percussive "hi-hat"/"snap" hits */
  function noiseHit(start, dur, peakGain=0.12, hp=4000){
    const c = getCtx();
    const bufferSize = Math.max(1, Math.floor(c.sampleRate * dur));
    const buffer = c.createBuffer(1, bufferSize, c.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
    const src = c.createBufferSource();
    src.buffer = buffer;
    const filter = c.createBiquadFilter();
    filter.type = 'highpass'; filter.frequency.value = hp;
    const gain = c.createGain();
    gain.gain.setValueAtTime(peakGain, c.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + start + dur);
    src.connect(filter).connect(gain).connect(c.destination);
    src.start(c.currentTime + start);
  }

  /* punchy low "kick"-style thump for the beat */
  function kick(start, peakGain=0.22){
    const c = getCtx();
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, c.currentTime + start);
    osc.frequency.exponentialRampToValueAtTime(45, c.currentTime + start + 0.11);
    gain.gain.setValueAtTime(peakGain, c.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + start + 0.16);
    osc.connect(gain).connect(c.destination);
    osc.start(c.currentTime + start);
    osc.stop(c.currentTime + start + 0.2);
  }

  function click(){
    if(!SETTINGS.sfxOn) return;
    tone(680, 0, 0.05, 'square', 0.10);
  }
  function correct(){
    if(!SETTINGS.sfxOn) return;
    // bright ascending arpeggio with a snappy attack — feels like a game "ding! ding! ding!"
    tone(659.25, 0, 0.09, 'square', 0.13);
    tone(880.00, 0.06, 0.10, 'square', 0.13);
    tone(1174.66, 0.12, 0.20, 'triangle', 0.16);
    noiseHit(0.12, 0.08, 0.06, 6000);
  }
  function incorrect(){
    if(!SETTINGS.sfxOn) return;
    // punchy downward buzzer, quick — energetic rather than sad
    tone(300, 0, 0.14, 'sawtooth', 0.14, 130);
  }
  function levelUp(){
    if(!SETTINGS.sfxOn) return;
    [523.25,659.25,783.99,1046.5,1318.5].forEach((f,i)=> tone(f, i*0.07, 0.22, 'square', 0.15));
    noiseHit(0.28, 0.15, 0.08, 5000);
  }
  function badge(){
    if(!SETTINGS.sfxOn) return;
    [783.99,987.77,1174.66,1567.98,1975.5].forEach((f,i)=> tone(f, i*0.055, 0.3, 'triangle', 0.15));
    tone(2400, 0.05, 0.4, 'sine', 0.05);
  }
  function questComplete(){
    if(!SETTINGS.sfxOn) return;
    // triumphant layered chord fanfare
    [523.25,659.25,783.99].forEach(f=> tone(f, 0, 0.5, 'square', 0.11));
    [659.25,830.61,987.77].forEach(f=> tone(f, 0.18, 0.5, 'square', 0.11));
    [783.99,987.77,1174.66,1567.98].forEach(f=> tone(f, 0.36, 0.7, 'triangle', 0.14));
    for(let i=0;i<5;i++) kick(0.36 + i*0.02, 0.1);
  }
  function tick(){
    if(!SETTINGS.sfxOn) return;
    tone(950, 0, 0.045, 'square', 0.07);
  }
  function hitVillain(){
    if(!SETTINGS.sfxOn) return;
    // sword-slash feel: quick pitch-drop swoosh + a metallic clang
    tone(720, 0, 0.09, 'sawtooth', 0.13, 260);
    noiseHit(0.02, 0.07, 0.10, 8500);
  }
  function hitPlayer(){
    if(!SETTINGS.sfxOn) return;
    // low impact thud, like getting knocked back
    tone(190, 0, 0.18, 'sawtooth', 0.17, 75);
    noiseHit(0, 0.06, 0.09, 1800);
  }
  function villainDefeated(){
    if(!SETTINGS.sfxOn) return;
    // dramatic collapse: descending groan + rumble, then a triumphant sting
    tone(480, 0, 0.55, 'sawtooth', 0.16, 55);
    noiseHit(0.08, 0.35, 0.13, 2500);
    [523.25,659.25,783.99,1046.5].forEach((f,i)=> tone(f, 0.42+i*0.08, 0.32, 'triangle', 0.14));
  }

  /* Energetic looping background beat: steady kick/hi-hat pulse + a bouncy
     arpeggiated synth riff on top, scheduled at 128 BPM. All synthesized —
     no external audio files. */
  function startAmbient(forceIdx){
    if(!SETTINGS.musicOn) return;
    stopAmbient();
    const bpm = 128;
    const stepDur = 60/bpm/2; // 8th notes
    let idx = (forceIdx!==undefined && forceIdx!==null) ? forceIdx : Math.floor(Math.random()*MUSIC_RIFFS.length);
    if(idx===currentTrackIndex && MUSIC_RIFFS.length>1) idx = (idx+1) % MUSIC_RIFFS.length;
    currentTrackIndex = idx;
    const riff = MUSIC_RIFFS[idx];
    musicStep = 0;
    function scheduleStep(){
      if(!SETTINGS.musicOn) return;
      const beatInBar = musicStep % 8;
      if(beatInBar===0 || beatInBar===4) kick(0, 0.16);
      if(beatInBar%2===1) noiseHit(0, 0.04, 0.045, 7000);
      tone(riff[beatInBar], 0, stepDur*0.92, 'triangle', 0.06);
      if(beatInBar===0) tone(riff[beatInBar]/2, 0, stepDur*1.8, 'sine', 0.05);
      musicStep++;
      musicSchedulerId = setTimeout(scheduleStep, stepDur*1000);
    }
    scheduleStep();
  }
  function stopAmbient(){
    if(musicSchedulerId) clearTimeout(musicSchedulerId);
    musicSchedulerId = null;
  }

  return { unlock, click, correct, incorrect, levelUp, badge, questComplete, tick, startAmbient, stopAmbient, hitVillain, hitPlayer, villainDefeated };
})();

function fireConfetti(count=26){
  const colors = ['#7C5CFF','#00D9C0','#FF4D6D','#FFB020','#4D8DFF','#B14AFF'];

    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random()*100 + 'vw';
    el.style.top = '-10px';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDelay = (Math.random()*0.3)+'s';
    el.style.transform = `rotate(${Math.random()*360}deg)`;

  }
}

/* ---------- Avoid repeating today's questions (used by the daily reset) ---------- */
function getTodayAskedSet(p){
  const today = todayStr();
  if(p.todayAskedDate !== today){ p.todayAskedIds = []; p.todayAskedDate = today; }
  return new Set(p.todayAskedIds);
}
function recordAskedToday(p, id){
  if(!id) return;
  const today = todayStr();
  if(p.todayAskedDate !== today){ p.todayAskedIds = []; p.todayAskedDate = today; }
  if(!p.todayAskedIds.includes(id)) p.todayAskedIds.push(id);
}

function todayStr(){ return new Date().toISOString().slice(0,10); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }

   across every track/subject so no grade level, "advanced" status, or course
   name (like "Algebra I Honors") is ever visible to a child or sibling. */

function rankForLevel(track, subj, levelIdx){

function xpToTitle(xp){
  if(xp>=600) return RANKS[3];
  if(xp>=300) return RANKS[2];
  if(xp>=100) return RANKS[1];
  return RANKS[0];
}

const SUBJECT_ORDER = ['math','science','history','reading','writing'];
function isSubjectDefeatedToday(p, key){
  return p.completedTodaySubjects.includes(key) && p.lastActiveDayForFullQuest===todayStr();
}
function isFinalBossDefeatedToday(p){
  return p.bossLastCompletedDate===todayStr();
}
/* Index of the node (0-4 subject, 5 = final boss, 6 = all done) the player is
   currently standing at / should tackle next. */
function currentFrontierIndex(p){
  // Order-independent: subjects can be tackled in any sequence. This just
  // counts how many of the 5 are done today (0-5), used to (a) position the
  // avatar visually along the trail, and (b) gate the Final Boss behind
  // "all 5 done" without caring which order they were completed in.
  const defeatedCount = SUBJECT_ORDER.filter(k=>isSubjectDefeatedToday(p,k)).length;
  if(defeatedCount < 5) return defeatedCount;
  if(!isFinalBossDefeatedToday(p)) return 5;
  return 6;
}

function terrainForLocation(key, x, y, color){
  // Background terrain silhouette unique to each realm, drawn behind its node
  // so the map reads like distinct fantasy locations rather than plain dots.
  const terrains = {
    math: `<polygon points="${x-70},${y+60} ${x-20},${y-20} ${x+15},${y+15} ${x+45},${y-35} ${x+85},${y+60}" fill="${color}" opacity="0.16"/>`,
    science: `<ellipse cx="${x}" cy="${y+45}" rx="80" ry="22" fill="${color}" opacity="0.16"/><circle cx="${x-20}" cy="${y+30}" r="5" fill="${color}" opacity="0.3"/><circle cx="${x+15}" cy="${y+22}" r="3.5" fill="${color}" opacity="0.3"/>`,

    writing: `<path d="M${x-60},${y+55} Q${x-40},${y-15} ${x-15},${y+35} Q${x+5},${y-25} ${x+30},${y+30} Q${x+50},${y-10} ${x+70},${y+55} Z" fill="${color}" opacity="0.14"/>`,

function renderTrailSVG(track, profile){
  const positions = [ [80,165],[210,80],[360,160],[510,75],[660,160],[770,90] ];
  const hexColors = {math:'#FF9F1C', science:'#00D9C0', history:'#FF4D6D', reading:'#4D8DFF', writing:'#B14AFF', boss:'#FF2E63'};
  const names = {math:'Number Peaks',science:'Bubbling Springs',history:'Ancient Ruins',reading:'Storybook Grove',writing:'Inkwell Marsh',boss:'SHADOW KEEP'};
  const icons = {math:'⛰️',science:'🔬',history:'🏛️',reading:'📖',writing:'✍️',boss:'🐉'};
  const order = [...SUBJECT_ORDER, 'boss'];
  let path = `M ${positions[0][0]} ${positions[0][1]}`;
  positions.slice(1).forEach(pt=> path += ` L ${pt[0]} ${pt[1]}`);
  const frontier = currentFrontierIndex(profile);

  const terrainLayer = order.map((key,i)=> terrainForLocation(key, positions[i][0], positions[i][1], hexColors[key])).join('');

  let nodes = order.map((key,i)=>{
    const [x,y] = positions[i];
    const defeated = key==='boss' ? isFinalBossDefeatedToday(profile) : isSubjectDefeatedToday(profile, key);
    // Subjects are always selectable in any order; only the Final Boss requires all 5 done.
    const unlocked = key==='boss' ? (frontier>=5) : true;

    return `

/* ---------- Battle logic ---------- */
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function pickWeightedLevel(track, subjectKey, profile){
  const baseWeights = (track.mixWeights && (track.mixWeights[subjectKey] || track.mixWeights.default)) || null;
  if(!baseWeights) return null;
  const momentum = profile ? (profile.subjectMomentum[subjectKey]||0) : 0;
  const weights = momentumAdjustedWeights(baseWeights, momentum);
  const r = Math.random();
  let acc = 0;
  for(let i=0;i<weights.length;i++){
    acc += weights[i];
    if(r <= acc) return i;
  }
  return weights.length-1;
}

const PLAYER_MAX_HP = 100, BOSS_MAX_HP = 100;
const CORRECT_DAMAGE = 20, WRONG_DAMAGE = 18;

function startBattle(subjectKey){
  const track = getActiveTrack();
  const p = getActiveProfile();
  registerDayPlayed(p);
  const startingHP = getDailyHP(p);
  if(startingHP<=0){
    window.alert("You're out of HP for today! Rest up and come back tomorrow, or visit the Review Realm / Practice Zone in the meantime.");
    return;
  }
  if(SETTINGS.musicOn){ Sound.unlock(); Sound.startAmbient(); }
  const levels = track.subjects[subjectKey].levels;
  let startLevel = p.levelBySubject[subjectKey];
  startLevel = Math.max(0, Math.min(startLevel, levels.length-1));
  const weighted = pickWeightedLevel(track, subjectKey, p);
  if(weighted!==null) startLevel = weighted;

  const bossMaxHp = scaledBossMaxHP(p);
  const wrongDmg = scaledWrongDamage(p);

  state.battle = {
    subject: subjectKey,
    levelIdx: startLevel,
    maxLevelReached: startLevel,
    usedQuestions: new Set(), // guarantees no repeats within this battle
    correctStreak:0, wrongStreak:0,
    correctCount:0, answeredCount:0,
    xpEarned:0,
    playerHP: startingHP, bossHP: bossMaxHp, bossMaxHp, wrongDmg,
    shrineTriggered:false, showShrine:false, matching:null,
    currentQ:null, awaitingNext:false, chosenIdx:null,
    timeLeft: SESSION_MINUTES*60,
    timerId:null,
    result:null // 'victory' | 'defeat' | 'timeup'
  };
  nextBattleQuestion();
  state.screen='battle';
  render();
  startBattleTimer();
}

/* Picks the next question with a hard guarantee against repeats within the
   current battle. Prefers the target difficulty tier, falls back to any tier
   with unused questions, and only allows a repeat once every question for
   that subject has already been asked this battle. */
function pickNextUniqueQuestion(levels, targetLevelIdx, usedSet, avoidIds){
  avoidIds = avoidIds || new Set();
  // Preference 1: not used this battle AND not already asked today (covers the daily-reset case)
  let inLevel = levels[targetLevelIdx].filter(q=>!usedSet.has(q) && !avoidIds.has(q._id));
  if(inLevel.length>0){
    return { q: inLevel[Math.floor(Math.random()*inLevel.length)], levelIdx: targetLevelIdx };
  }
  let otherOptions = [];
  levels.forEach((lvlQs, li)=>{
    lvlQs.forEach(q=>{ if(!usedSet.has(q) && !avoidIds.has(q._id)) otherOptions.push({q, levelIdx:li}); });
  });
  if(otherOptions.length>0){
    return otherOptions[Math.floor(Math.random()*otherOptions.length)];
  }
  // Preference 2: relax the today-avoidance (small subjects may not have enough content) — still avoid this battle's repeats
  inLevel = levels[targetLevelIdx].filter(q=>!usedSet.has(q));
  if(inLevel.length>0){
    return { q: inLevel[Math.floor(Math.random()*inLevel.length)], levelIdx: targetLevelIdx };
  }
  otherOptions = [];
  levels.forEach((lvlQs, li)=>{
    lvlQs.forEach(q=>{ if(!usedSet.has(q)) otherOptions.push({q, levelIdx:li}); });
  });
  if(otherOptions.length>0){
    return otherOptions[Math.floor(Math.random()*otherOptions.length)];
  }
  // Fully exhausted — start a fresh cycle for this battle
  usedSet.clear();
  const fresh = levels[targetLevelIdx];
  return { q: fresh[Math.floor(Math.random()*fresh.length)], levelIdx: targetLevelIdx };
}

function nextBattleQuestion(){
  const s = state.battle;
  const track = getActiveTrack();
  const p = getActiveProfile();
  const levels = track.subjects[s.subject].levels;
  const weighted = pickWeightedLevel(track, s.subject, p);
  const targetLevel = weighted!==null ? weighted : s.levelIdx;

  const avoidIds = getTodayAskedSet(p);
  const picked = pickNextUniqueQuestion(levels, targetLevel, s.usedQuestions, avoidIds);
  s.currentQ = picked.q;
  s.levelIdx = picked.levelIdx;
  s.maxLevelReached = Math.max(s.maxLevelReached, picked.levelIdx);
  s.usedQuestions.add(picked.q);
  recordAskedToday(p, picked.q._id);
  s.awaitingNext = false;
  s.chosenIdx = null;
}

function startBattleTimer(){
  const s = state.battle;
  if(s.timerId) clearInterval(s.timerId);
  s.timerId = setInterval(()=>{
    s.timeLeft -= 1;
    if(s.timeLeft <= 0){
      clearInterval(s.timerId);
      s.result = 'timeup';

/* =========================================================================
   WISDOM SHRINE — matching mini-game data. A shared vocabulary bank per
   subject (not tied to a specific track/tier, since this is a bonus
   moment, not core assessment). Each visit picks 4 random term/definition
   pairs to match.
   ========================================================================= */
const MATCHING_BANKS = {
  math: [
    {term:'Sum', def:'The result of adding two or more numbers'},
    {term:'Product', def:'The result of multiplying two or more numbers'},
    {term:'Quotient', def:'The result of dividing one number by another'},
    {term:'Perimeter', def:'The distance all the way around a shape'},
    {term:'Area', def:'The amount of space inside a flat shape'},
    {term:'Factor', def:'A number that divides evenly into another number'},
    {term:'Numerator', def:'The top number in a fraction'},
    {term:'Denominator', def:'The bottom number in a fraction'}
  ],
  science: [
    {term:'Producer', def:'An organism that makes its own food from sunlight'},
    {term:'Consumer', def:'An organism that eats other organisms for energy'},
    {term:'Adaptation', def:'A trait that helps a living thing survive its environment'},
    {term:'Evaporation', def:'When liquid water turns into water vapor'},
    {term:'Habitat', def:'The natural environment where an organism lives'},
    {term:'Gravity', def:'The force that pulls objects toward Earth'},

    {term:'Circuit', def:'A complete loop that allows electricity to flow'}
  ],
  history: [

    {term:'Primary source', def:'Firsthand evidence created during the time period studied'},
    {term:'Tariff', def:'A tax placed on goods imported from another country'},
    {term:'Civilization', def:'An organized society with cities, government, and culture'},
    {term:'Colony', def:'A settlement controlled by a distant ruling country'},
    {term:'Constitution', def:'A written document that establishes a government\'s rules'},
    {term:'Scarcity', def:'Having limited resources but unlimited wants'},

  ],
  reading: [

    {term:'Metaphor', def:'A direct comparison without using "like" or "as"'},
    {term:'Theme', def:'The central message or lesson of a text'},
    {term:'Inference', def:'A conclusion drawn from clues rather than stated directly'},
    {term:'Setting', def:'The time and place where a story happens'},
    {term:'Personification', def:'Giving human qualities to something non-human'},
    {term:'Main idea', def:'The most important point an author is making'},
    {term:'Conflict', def:'The main problem or struggle a character faces'}
  ],
  writing: [
    {term:'Thesis', def:'The sentence that states an essay\'s main argument'},

    {term:'Counterargument', def:'An opposing viewpoint addressed in an essay'},
    {term:'Topic sentence', def:'The sentence that states a paragraph\'s main idea'},

    {term:'Narrative', def:'Writing that tells a story with characters and events'},

  ]
};
function initMatching(subjectKey){
  const bank = shuffle(MATCHING_BANKS[subjectKey]);
  const pairs = bank.slice(0,4);
  return {
    pairs,
    termOrder: shuffle([0,1,2,3]),
    defOrder: shuffle([0,1,2,3]),
    matchedSet: new Set(),
    selectedTerm: null, selectedDef: null,
    wrongTerm: null, wrongDef: null
  };
}
function tryResolveMatch(battleState){
  const m = battleState.matching;
  if(m.selectedTerm===null || m.selectedDef===null) return;
  const pairIdxTerm = m.termOrder[m.selectedTerm];
  const pairIdxDef = m.defOrder[m.selectedDef];
  if(pairIdxTerm === pairIdxDef){
    m.matchedSet.add(pairIdxTerm);
    m.selectedTerm = null; m.selectedDef = null;
    Sound.correct();
    if(m.matchedSet.size >= m.pairs.length){ fireConfetti(20); Sound.badge(); }
  } else {
    m.wrongTerm = m.selectedTerm; m.wrongDef = m.selectedDef;
    m.selectedTerm = null; m.selectedDef = null;
    Sound.incorrect();
    setTimeout(()=>{ m.wrongTerm=null; m.wrongDef=null; render(); }, 550);
  }
}

function bossMeta(subjectKey){
  const names = {math:'the Number Golem',science:'the Lab Specter',history:'the Time Warden',reading:'the Story Sphinx',writing:'the Ink Wraith'};
  const emojis = {math:'⛰️',science:'🔬',history:'🏛️',reading:'📖',writing:'✍️'};
  return { name: names[subjectKey], icon: emojis[subjectKey] };
}

const CORRECT_PHRASES = ['Direct hit! 🙌','Critical strike! 🎯','Boom! 💥','Awesome attack! ✨','Nailed it! 🔥','Great strike! 🌟','Way to go! 🚀','Fantastic! 🎉','Brilliant move! 💡','Excellent! 👏'];
const INCORRECT_PHRASES = ['Ouch, you got hit! 💪','So close! 👀','Shake it off! 🌱','Almost dodged it! ⏳','No worries — next one! 🙂','Good effort! 👍'];

function animateAttack(attackerId, defenderId, lungeClass){
  const attacker = document.getElementById(attackerId);
  const defender = document.getElementById(defenderId);
  if(attacker){ attacker.classList.add(lungeClass); setTimeout(()=>attacker.classList.remove(lungeClass), 450); }
  if(defender){
    defender.classList.add('hit-shake');
    const star = document.createElement('span');
    star.className = 'impact-star';
    star.textContent = Math.random()<0.5 ? '💥' : '⭐';
    defender.appendChild(star);
    setTimeout(()=>{ defender.classList.remove('hit-shake'); star.remove(); }, 500);
  }
}

function attachBattleEvents(){
  const s = state.battle;
  updateBattleTimerDisplay();

  const endBtn = document.getElementById('endEarlyBtn');
  if(endBtn) endBtn.addEventListener('click', ()=>{
    const ok = window.confirm('Retreat from this battle? No rewards will be earned, but there\'s no penalty either.');
    if(!ok) return;
    if(s.timerId) clearInterval(s.timerId);
    s.result = 'retreat';
    endBattle();
  });

  const claimShrineBtn = document.getElementById('claimShrineBtn');
  if(claimShrineBtn){
    claimShrineBtn.addEventListener('click', ()=>{
      Sound.unlock(); Sound.badge();
      s.playerHP = Math.min(PLAYER_MAX_HP, s.playerHP + 30);
      s.showShrine = false;
      s.matching = null;
      fireConfetti(16);
      nextBattleQuestion(); // fixes: without this, the next question's answer buttons were unresponsive
      render();
    });
  }

  app.querySelectorAll('.match-btn[data-kind="term"]:not([disabled])').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      Sound.unlock(); Sound.click();
      s.matching.selectedTerm = parseInt(btn.getAttribute('data-pos'));
      tryResolveMatch(s);
      render();
    });
  });
  app.querySelectorAll('.match-btn[data-kind="def"]:not([disabled])').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      Sound.unlock(); Sound.click();
      s.matching.selectedDef = parseInt(btn.getAttribute('data-pos'));
      tryResolveMatch(s);
      render();
    });
  });

  app.querySelectorAll('#choicesWrap .choice').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(s.awaitingNext) return;
      const idx = parseInt(btn.getAttribute('data-idx'));
      s.awaitingNext = true; s.chosenIdx = idx;
      const q = s.currentQ;
      const correct = idx === q.a;
      s.answeredCount += 1;
      const track = getActiveTrack();
      const p = getActiveProfile();
      p.answeredBySubject[s.subject] += 1;
      const log = todayLogEntry(p);
      log.subjects[s.subject].total += 1;

      app.querySelectorAll('#choicesWrap .choice').forEach((b,i)=>{
        b.disabled = true;
        if(i===q.a) b.classList.add('correct');
        else if(i===idx) b.classList.add('incorrect');
      });

      Sound.unlock();
      let comboBonus = 0;
      updateMomentum(p, s.subject, correct);
      // Damage now scales with how hard the question was (its difficulty tier),
      // not a flat amount every time — harder questions hit harder both ways.
      const difficultyMult = 1 + s.levelIdx * 0.25;
      if(correct){
        s.correctCount += 1; s.correctStreak += 1; s.wrongStreak = 0;
        p.correctBySubject[s.subject] += 1;
        log.subjects[s.subject].correct += 1;
        const xpGain = 10 + s.levelIdx*5;
        comboBonus = s.correctStreak>=3 ? 5 * (s.correctStreak-2) : 0;
        s.xpEarned += xpGain + comboBonus;
        const dmg = Math.round((CORRECT_DAMAGE + Math.min(15, comboBonus)) * difficultyMult);
        s.bossHP = Math.max(0, s.bossHP - dmg);
        Sound.correct();
        Sound.hitVillain();
        animateAttack('playerIcon','bossIcon','attack-right');
        if(s.correctStreak>0 && s.correctStreak%3===0){ fireConfetti(14); Sound.levelUp(); }
      } else {
        s.correctStreak = 0; s.wrongStreak += 1;
        const dmgTaken = Math.round(s.wrongDmg * difficultyMult);
        s.playerHP = Math.max(0, s.playerHP - dmgTaken);
        Sound.incorrect();
        Sound.hitPlayer();
        animateAttack('bossIcon','playerIcon','attack-left');
        recordMiss(p, track, s.subject, q);
      }

      const bossBar = document.getElementById('bossHPBar'), bossTxt = document.getElementById('bossHPBarText');
      const playerBar = document.getElementById('playerHPBar'), playerTxt = document.getElementById('playerHPBarText');
      if(bossBar) bossBar.style.width = Math.max(0,Math.round(100*s.bossHP/s.bossMaxHp))+'%';
      if(bossTxt) bossTxt.textContent = `${Math.max(0,s.bossHP)}/${s.bossMaxHp} HP`;
      if(playerBar) playerBar.style.width = Math.max(0,Math.round(100*s.playerHP/PLAYER_MAX_HP))+'%';
      if(playerTxt) playerTxt.textContent = `${Math.max(0,s.playerHP)}/${PLAYER_MAX_HP} HP`;

      const scoreRow = document.getElementById('scoreRow');
      if(scoreRow) scoreRow.innerHTML = scoreRowHTML(s);

      if(!track.mixWeights){
        const maxLevel = track.subjects[s.subject].levels.length - 1;
        if(s.correctStreak>=3){ s.levelIdx = Math.min(maxLevel, s.levelIdx+1); s.correctStreak=0; setTimeout(()=>Sound.levelUp(), 350); }
        if(s.wrongStreak>=2){ s.levelIdx = Math.max(0, s.levelIdx-1); s.wrongStreak=0; }
      }

      const phrase = correct
        ? CORRECT_PHRASES[Math.floor(Math.random()*CORRECT_PHRASES.length)]
        : INCORRECT_PHRASES[Math.floor(Math.random()*INCORRECT_PHRASES.length)];
      const bonusNote = comboBonus>0 ? ` <span class="combo-bonus">+${comboBonus} combo bonus!</span>` : '';
      document.getElementById('explainWrap').innerHTML = `<div class="explain">${correct?'⚔️':'💥'} <strong>${phrase}</strong>${bonusNote}<br>${q.n}</div>`;

      // Boss defeated
      if(s.bossHP<=0){
        Sound.villainDefeated();
        document.getElementById('nextWrap').innerHTML = `<button class="btn brass" id="nextBtn">See Victory! 🏆</button>`;
        document.getElementById('nextBtn').addEventListener('click', ()=>{
          Sound.unlock(); if(s.timerId) clearInterval(s.timerId);
          s.result = 'victory'; endBattle();
        });
        return;
      }
      // Player defeated
      if(s.playerHP<=0){
        document.getElementById('nextWrap').innerHTML = `<button class="btn" id="nextBtn">Continue →</button>`;
        document.getElementById('nextBtn').addEventListener('click', ()=>{
          Sound.unlock(); if(s.timerId) clearInterval(s.timerId);
          s.result = 'defeat'; endBattle();
        });
        return;
      }
      // Mid-battle Wisdom Shrine opportunity (once per battle, when HP drops to half or below)
      const offerShrine = !s.shrineTriggered && s.playerHP <= PLAYER_MAX_HP/2;
      const nextLabel = offerShrine ? 'Rest at a Wisdom Shrine 🏕️' : 'Next Question →';
      document.getElementById('nextWrap').innerHTML = `<button class="btn" id="nextBtn">${nextLabel}</button>`;
      document.getElementById('nextBtn').addEventListener('click', ()=>{
        Sound.unlock(); Sound.click();
        if(offerShrine){ s.shrineTriggered = true; s.showShrine = true; s.matching = initMatching(s.subject); render(); }
        else { nextBattleQuestion(); render(); }
      });
    });
  });
}

async function endBattle(){
  const s = state.battle;
  const track = getActiveTrack();
  const p = getActiveProfile();

  setDailyHP(p, s.playerHP); // HP persists for the rest of the day, win or lose

  p.xpTotal += s.xpEarned;
  p.xpBySubject[s.subject] += s.xpEarned;
  p.levelBySubject[s.subject] = track.mixWeights ? s.maxLevelReached : s.levelIdx;
  const log = todayLogEntry(p);
  log.xpEarned += s.xpEarned;

  const newBadges = [];
  let dailyRewardsEarned = [];

  if(s.result==='victory'){
    // streak + daily-reset handling only happens on an actual win
    const today = todayStr();
    if(p.lastActiveDate !== today){
      if(p.lastActiveDate && daysBetween(p.lastActiveDate, today)===1) p.streak += 1;
      else p.streak = 1;
      p.lastActiveDate = today;
      p.completedTodaySubjects = [];
    }
    if(!p.completedTodaySubjects.includes(s.subject)) p.completedTodaySubjects.push(s.subject);
    p.lastActiveDayForFullQuest = today;
    if(!log.bossesDefeated.includes(s.subject)) log.bossesDefeated.push(s.subject);

    if(p.streak>=3 && !p.badges.includes('streak3')){ p.badges.push('streak3'); newBadges.push('streak3'); }
    if(p.streak>=7 && !p.badges.includes('streak7')){ p.badges.push('streak7'); newBadges.push('streak7'); }
    if(p.streak>=21 && !p.badges.includes('streak21')){ p.badges.push('streak21'); newBadges.push('streak21'); }
    if(p.completedTodaySubjects.length>=5 && !p.badges.includes('fullquest')){ p.badges.push('fullquest'); newBadges.push('fullquest'); }
    const maxLevel = track.subjects[s.subject].levels.length - 1;
    const masteryId = s.subject+'-master';
    if(p.levelBySubject[s.subject]>=maxLevel && !p.badges.includes(masteryId)){ p.badges.push(masteryId); newBadges.push(masteryId); }
  }

  dailyRewardsEarned = checkDailyXPRewards(p);

  pruneDailyLog(p);
  await saveProfile(state.activePlayerId, p);

  state.battle.newBadges = newBadges;
  state.battle.dailyRewardsEarned = dailyRewardsEarned;
  state.screen = 'battle-result';
  render();
}

   hardest tier. Available once per day per explorer.

function startFinalBoss(){
  const p = getActiveProfile();
  if(currentFrontierIndex(p) < 5){ return; } // safety check — must clear all 5 realms first
  registerDayPlayed(p);
  const startingHP = getDailyHP(p);
  if(startingHP<=0){
    window.alert("You're out of HP for today! Rest up and come back tomorrow.");
    return;
  }
  if(SETTINGS.musicOn){ Sound.unlock(); Sound.startAmbient(); }
  const track = getActiveTrack();
  const questions = SUBJECTS.map(s=>{
    const levels = track.subjects[s.key].levels;
    const toughest = levels[levels.length-1];
    const avoidIds = getTodayAskedSet(p);
    let candidates = toughest.filter(q=>!avoidIds.has(q._id));
    if(candidates.length===0) candidates = toughest; // pool exhausted for today — allow a repeat rather than blocking play
    const q = candidates[Math.floor(Math.random()*candidates.length)];
    recordAskedToday(p, q._id);
    return { subjectKey:s.key, subjectName:s.name, subjectIcon:s.icon, q };
  });
  const bossMaxHp = scaledBossMaxHP(p);
  const correctDmg = bossMaxHp/4; // preserves "4 of 5 correct wins" regardless of day scaling
  const wrongDmg = scaledWrongDamage(p);
  state.finalBoss = {
    questions: shuffle(questions),
    idx:0, correctCount:0,
    playerHP: startingHP, bossHP: bossMaxHp, bossMaxHp, correctDmg, wrongDmg,
    timeLeft: 8*60, timerId:null,
    awaitingNext:false, chosenIdx:null, result:null
  };
  state.screen = 'finalboss';
  render();
  startFinalBossTimer();
}

function startFinalBossTimer(){
  const bs = state.finalBoss;
  if(bs.timerId) clearInterval(bs.timerId);
  bs.timerId = setInterval(()=>{
    bs.timeLeft -= 1;
    if(bs.timeLeft<=0){ clearInterval(bs.timerId); bs.result='timeup'; endFinalBoss(); }

async function endFinalBoss(){
  const bs = state.finalBoss;
  const p = getActiveProfile();
  setDailyHP(p, bs.playerHP); // HP persists for the rest of the day
  const won = bs.result==='victory';
  const today = todayStr();
  const log = todayLogEntry(p);
  log.finalBossResult = won ? 'won' : 'lost';
  if(won) p.bossLastCompletedDate = today;
  const xpEarned = won ? 100 : bs.correctCount * 15;
  p.xpTotal += xpEarned;
  log.xpEarned += xpEarned;

  const newBadges = [];
  if(won){
    p.bossWinsTotal = (p.bossWinsTotal||0) + 1;
    if(!p.badges.includes('boss-slayer')){ p.badges.push('boss-slayer'); newBadges.push('boss-slayer'); }
    if(p.bossWinsTotal>=5 && !p.badges.includes('boss-champion')){ p.badges.push('boss-champion'); newBadges.push('boss-champion'); }
  }
  const dailyRewardsEarned = checkDailyXPRewards(p);
  pruneDailyLog(p);
  await saveProfile(state.activePlayerId, p);

  state.finalBoss.xpEarned = xpEarned;
  state.finalBoss.newBadges = newBadges;
  state.finalBoss.dailyRewardsEarned = dailyRewardsEarned;
  state.screen = 'finalboss-result';
  render();
}

/* =========================================================================
   PRACTICE MODE — unlimited, no HP, no boss, doesn't touch map progress or
   earnings. For a lower-pressure day, or extra reps on a tricky subject.

function startPractice(subjectKey){
  const track = getActiveTrack();
  const p = getActiveProfile();
  const levels = track.subjects[subjectKey].levels;
  let startLevel = p.levelBySubject[subjectKey];
  startLevel = Math.max(0, Math.min(startLevel, levels.length-1));
  const weighted = pickWeightedLevel(track, subjectKey, p);
  if(weighted!==null) startLevel = weighted;

  state.practice = {
    subject: subjectKey, levelIdx: startLevel, maxLevelReached: startLevel,
    usedQuestions: new Set(), correctStreak:0, wrongStreak:0,
    correctCount:0, answeredCount:0, xpEarned:0,
    currentQ:null, awaitingNext:false,
    timeLeft: SESSION_MINUTES*60, timerId:null
  };
  nextPracticeQuestion();
  state.screen = 'practice';
  render();
  startPracticeTimer();
}
function nextPracticeQuestion(){
  const s = state.practice;
  const track = getActiveTrack();
  const p = getActiveProfile();
  const levels = track.subjects[s.subject].levels;
  const weighted = pickWeightedLevel(track, s.subject, p);
  const targetLevel = weighted!==null ? weighted : s.levelIdx;
  const picked = pickNextUniqueQuestion(levels, targetLevel, s.usedQuestions);
  s.currentQ = picked.q; s.levelIdx = picked.levelIdx;
  s.maxLevelReached = Math.max(s.maxLevelReached, picked.levelIdx);
  s.usedQuestions.add(picked.q);
  s.awaitingNext = false;
}
function startPracticeTimer(){
  const s = state.practice;
  if(s.timerId) clearInterval(s.timerId);
  s.timerId = setInterval(()=>{
    s.timeLeft -= 1;
    if(s.timeLeft<=0){ clearInterval(s.timerId); endPractice(); }
    else updatePracticeTimerDisplay();
  }, 1000);
}
function updatePracticeTimerDisplay(){
  const el = document.getElementById('timerDisplay');
  if(!el) return;
  const s = state.practice;
  const m = Math.floor(s.timeLeft/60), sec = s.timeLeft%60;
  el.textContent = `${m}:${sec.toString().padStart(2,'0')}`;
  el.parentElement.classList.toggle('warn', s.timeLeft<=60);
}
function renderPractice(){

  const track = getActiveTrack();
  const subjMeta = SUBJECTS.find(x=>x.key===s.subject);
  const q = s.currentQ;
  const m = Math.floor(s.timeLeft/60), sec = s.timeLeft%60;

        ${q.c.map((choice,i)=>`<button class="choice" data-idx="${i}">${choice}</button>`).join('')}
      </div>

      <div id="nextWrap" style="margin-top:16px;"></div>
    </div>
    <div style="margin-top:10px;"><span class="back-link" id="endPracticeBtn">End practice</span></div>
  </div>`;
