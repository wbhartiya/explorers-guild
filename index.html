function attachPracticeEvents(){
  const s = state.practice;
  updatePracticeTimerDisplay();
  const endBtn = document.getElementById('endPracticeBtn');
  if(endBtn) endBtn.addEventListener('click', ()=>{ if(s.timerId) clearInterval(s.timerId); endPractice(); });

  app.querySelectorAll('#choicesWrap .choice').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(s.awaitingNext) return;
      s.awaitingNext = true;
      Sound.unlock();
      const idx = parseInt(btn.getAttribute('data-idx'));
      const q = s.currentQ;
      const correct = idx === q.a;
      s.answeredCount += 1;
      const track = getActiveTrack();
      const p = getActiveProfile();
      p.answeredBySubject[s.subject] += 1;
      const log = todayLogEntry(p);
      log.subjects[s.subject].total += 1;

      app.querySelectorAll('#choicesWrap .choice').forEach((b,i)=>{
        b.disabled = true;
        if(i===q.a) b.classList.add('correct');
        else if(i===idx) b.classList.add('incorrect');
      });

      let comboBonus = 0;
      if(correct){
        s.correctCount += 1; s.correctStreak += 1; s.wrongStreak = 0;
        p.correctBySubject[s.subject] += 1;
        log.subjects[s.subject].correct += 1;
        comboBonus = s.correctStreak>=3 ? 5 * (s.correctStreak-2) : 0;
        s.xpEarned += 8 + comboBonus;
        Sound.correct();
      } else {
        s.correctStreak = 0; s.wrongStreak += 1;
        Sound.incorrect();
        recordMiss(p, track, s.subject, q);
      }

      const scoreRow = document.getElementById('scoreRow');
      if(scoreRow) scoreRow.innerHTML = scoreRowHTML(s);

      const phrase = correct
        ? CORRECT_PHRASES[Math.floor(Math.random()*CORRECT_PHRASES.length)]
        : INCORRECT_PHRASES[Math.floor(Math.random()*INCORRECT_PHRASES.length)];
      document.getElementById('explainWrap').innerHTML = `<div class="explain">${correct?'✅':'💡'} <strong>${phrase}</strong><br>${q.n}</div>`;
      document.getElementById('nextWrap').innerHTML = `<button class="btn" id="nextBtn">Next Question →</button>`;
      document.getElementById('nextBtn').addEventListener('click', ()=>{
        Sound.unlock(); Sound.click();
        nextPracticeQuestion(); render();
      });
    });
  });
}
async function endPractice(){
  const s = state.practice;
  const p = getActiveProfile();
  p.xpTotal += s.xpEarned;
  p.xpBySubject[s.subject] += s.xpEarned;
  await saveProfile(state.activePlayerId, p);
  state.screen = 'practice-result';
  render();
}
function renderPracticeResult(){
  const s = state.practice;
  const subjMeta = SUBJECTS.find(x=>x.key===s.subject);
  const acc = s.answeredCount? Math.round(100*s.correctCount/s.answeredCount): 0;
  return `
  ${renderHeader()}
  <div class="card">
    <h2 class="display" style="margin-top:0;">🎯 Practice Complete!</h2>
    <p>${subjMeta.icon} ${subjMeta.name} — no pressure, just reps!</p>
    <div class="summary-stat"><span>Questions answered</span><strong>${s.answeredCount}</strong></div>
    <div class="summary-stat"><span>Correct</span><strong>${s.correctCount} (${acc}%)</strong></div>
    <div class="summary-stat"><span>XP earned</span><strong>+${s.xpEarned}</strong></div>
    <div style="margin-top:22px;">
      <button class="btn brass" id="practiceBackBtn">Back to Realm Map</button>
    </div>
  </div>`;
}
function attachPracticeResultEvents(){
  document.getElementById('practiceBackBtn').addEventListener('click', ()=>{ state.screen='dashboard'; render(); });
  Sound.unlock(); Sound.click();
}

function renderEarnings(){
  const p = getActiveProfile();
  const total = p.earnings.ipad + p.earnings.tv + p.earnings.free;
  return `
  ${renderHeader()}
  <div class="card">
    <span class="back-link" id="earningsBackLink">← Back to Realm Map</span>
    <h2 class="display" style="margin-top:0;">🎁 ${p.name}'s Summer Earnings</h2>
    <p>Show this screen to a parent to redeem your rewards!</p>
    <div class="stats-row">
      ${EARNING_TYPES.map(t=>`<div class="stat-pill"><div class="num">${p.earnings[t.id]}</div><div class="lbl">${t.emoji} ${t.label} (min)</div></div>`).join('')}
    </div>
    <div class="summary-stat"><strong>Total earned</strong><strong>${total} minutes</strong></div>

    <div class="section-title">Recent Rewards</div>
    ${p.earningsLog.length===0 ? `<p style="color:var(--text-dim);">No rewards earned yet — defeat a boss to start earning!</p>` :
      p.earningsLog.slice(0,10).map(e=>{
        const t = EARNING_TYPES.find(x=>x.id===e.type);
        return `<div class="summary-stat"><span>${t.emoji} ${e.reason}</span><strong>+${e.minutes} min ${t.label}</strong></div>`;
      }).join('')}

    ${total>0 ? `<div style="margin-top:22px;"><button class="btn brass" id="redeemBtn">✅ Parent: Mark as Redeemed</button></div>` : ''}
  </div>`;
}
function attachEarningsEvents(){
  document.getElementById('earningsBackLink').addEventListener('click', ()=>{ state.screen='dashboard'; render(); });
  const redeemBtn = document.getElementById('redeemBtn');
  if(redeemBtn) redeemBtn.addEventListener('click', async ()=>{
    const p = getActiveProfile();
    const ok = window.confirm('Parent confirmation: mark all current earnings as redeemed and reset the counter to zero?');
    if(!ok) return;
    p.earnings = { ipad:0, tv:0, free:0 };
    await saveProfile(state.activePlayerId, p);
    render();
  });
}

/* =========================================================================
   PARENT DASHBOARD — a read-only view across all three explorers: today's
   activity, accuracy by subject (flagging weak spots), streaks, badges,
   and earnings — accessible from the player-select screen.
   ========================================================================= */
function renderParentDashboard(){
  const today = todayStr();
  const cards = (state.playerIds.length===0 ? [] : state.playerIds).map(tid=>{
    const p = state.profiles[tid];
    if(!p) return '';
    const track = TRACKS[tid];
    if(!p.name){
      return `<div class="card"><h3 class="display" style="margin-top:0;">${track.label}</h3><p style="color:var(--text-dim);">Not set up yet.</p></div>`;
    }
    const todayLog = p.dailyLog[today];
    const totalAnswered = Object.values(p.answeredBySubject).reduce((a,b)=>a+b,0);
    const totalCorrect = Object.values(p.correctBySubject).reduce((a,b)=>a+b,0);
    const overallAcc = totalAnswered ? Math.round(100*totalCorrect/totalAnswered) : 0;

    const subjectRows = SUBJECTS.map(s=>{
      const c = p.correctBySubject[s.key], t = p.answeredBySubject[s.key];
      const acc = t ? Math.round(100*c/t) : null;
      const needsFocus = acc!==null && acc<60 && t>=5;
      const todaySub = todayLog ? todayLog.subjects[s.key] : null;
      const todayStr2 = todaySub && todaySub.total>0 ? ` (today: ${todaySub.correct}/${todaySub.total})` : '';
      return `<div class="summary-stat"><span>${s.icon} ${s.name}${todayStr2}</span><strong style="${needsFocus?'color:var(--coral);':''}">${acc===null?'—':acc+'%'}${needsFocus?' 🔍 needs focus':''}</strong></div>`;
    }).join('');

    const bossesToday = todayLog ? todayLog.bossesDefeated.length : 0;
    const finalBossToday = todayLog ? todayLog.finalBossResult : null;
    const totalEarnings = p.earnings.ipad + p.earnings.tv + p.earnings.free;

    return `
    <div class="card" style="margin-bottom:16px;">
      <h3 class="display" style="margin-top:0;">${p.avatarEmoji||'🧭'} ${p.name} <span style="font-size:13px;color:var(--text-dim);font-family:'Public Sans',sans-serif;font-weight:600;">(${track.label})</span></h3>

      <div class="stats-row">
        <div class="stat-pill"><div class="num">${p.xpTotal}</div><div class="lbl">Total XP</div></div>
        <div class="stat-pill"><div class="num">${p.streak}</div><div class="lbl">Day Streak</div></div>
        <div class="stat-pill"><div class="num">${overallAcc}%</div><div class="lbl">Overall Accuracy</div></div>
        <div class="stat-pill"><div class="num">${p.badges.length}</div><div class="lbl">Badges</div></div>
      </div>

      <div class="section-title" style="margin-top:16px;font-size:16px;">Today's Progress</div>
      <div class="summary-stat"><span>Bosses defeated today</span><strong>${bossesToday} / 5</strong></div>
      <div class="summary-stat"><span>Final Boss</span><strong>${finalBossToday==='won'?'👑 Defeated':finalBossToday==='lost'?'Attempted, not yet defeated':'Not attempted'}</strong></div>

      <div class="section-title" style="margin-top:16px;font-size:16px;">Accuracy by Subject (all-time)</div>
      ${subjectRows}

      <div class="section-title" style="margin-top:16px;font-size:16px;">Earnings Ledger</div>
      <div class="summary-stat"><span>Unredeemed rewards</span><strong>${totalEarnings} min total</strong></div>
      <div class="summary-stat"><span>📱 iPad / 📺 TV / 🎈 Free</span><strong>${p.earnings.ipad} / ${p.earnings.tv} / ${p.earnings.free} min</strong></div>
    </div>`;
  }).join('');

  return `
  ${renderHeader()}
  <div class="card setup-card" style="margin-bottom:16px;">
    <span class="back-link" id="parentBackLink">← Back</span>
    <h2 class="display" style="margin-top:0;">👪 Parent Dashboard</h2>
    <p>A read-only overview of each explorer's progress — no login required, so use discretion about who sees this screen.</p>
  </div>
  ${state.playerIds.length===0 ? `<div class="card"><p style="color:var(--text-dim);text-align:center;">No explorers created yet.</p></div>` : cards}`;
}
function attachParentDashboardEvents(){
  document.getElementById('parentBackLink').addEventListener('click', ()=>{ state.screen='pick-track'; render(); });
}

/* =========================================================================
   LEADERBOARD — friendly competition between the three explorers, ranked
   by total XP (with badge count as a tiebreaker/secondary stat).
   ========================================================================= */
function renderLeaderboard(){
  const rows = state.playerIds.map(tid=>{
    const p = state.profiles[tid];
    if(!p) return null;
    const track = TRACKS[tid];
    if(!p.name) return null;
    return { tid, name: p.name, avatar: p.avatarEmoji||'🧭', color: p.avatarColor||'#7C5CFF', xp: p.xpTotal, badges: p.badges.length, streak: p.streak, trackLabel: track.label };
  }).filter(Boolean).sort((a,b)=> b.xp - a.xp);

  const medals = ['🥇','🥈','🥉'];
  const rowsHTML = rows.length===0
    ? `<p style="color:var(--text-dim);text-align:center;">No explorers set up yet!</p>`
    : rows.map((r,i)=>`
      <div style="display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;margin-bottom:10px;background:${i===0?'linear-gradient(135deg,#FFF3D6,#FFE7A8)':'var(--panel-tint)'};border:2px solid ${i===0?'var(--amber)':'transparent'};">
        <div style="font-size:26px;width:34px;text-align:center;">${medals[i]||('#'+(i+1))}</div>
        <div style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;background:${r.color}33;border:2px solid ${r.color};flex-shrink:0;">${r.avatar}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:800;font-size:16px;">${r.name}</div>
          <div style="font-size:12px;color:var(--text-dim);">${r.trackLabel} · 🔥 ${r.streak} day streak</div>
        </div>
        <div style="text-align:right;">
          <div class="mono" style="font-weight:800;font-size:19px;color:var(--violet);">${r.xp} XP</div>
          <div style="font-size:12px;color:var(--text-dim);">🏅 ${r.badges} badges</div>
        </div>
      </div>
    `).join('');

  return `
  ${renderHeader()}
  <div class="card setup-card" style="margin-bottom:16px;">
    <span class="back-link" id="leaderboardBackLink">← Back</span>
    <h2 class="display" style="margin-top:0;">🏆 Family Leaderboard</h2>
    <p>Ranked by total XP earned this summer — go for it!</p>
  </div>
  <div class="card">${rowsHTML}</div>`;
}
function attachLeaderboardEvents(){
  document.getElementById('leaderboardBackLink').addEventListener('click', ()=>{ state.screen='pick-track'; render(); });
}

/* =========================================================================
   INIT
   ========================================================================= */
async function init(){
  addIdsToTrackQuestions(trackA); addIdsToTrackQuestions(trackB); addIdsToTrackQuestions(trackC);
  const [playerIds, settings] = await Promise.all([migrateLegacyProfilesIfNeeded(), loadSettings()]);
  state.playerIds = playerIds;
  const profiles = await Promise.all(playerIds.map(id=>loadProfile(id)));
  state.profiles = {};
  playerIds.forEach((id,i)=> state.profiles[id] = profiles[i]);
  SETTINGS = settings;
  state.screen = 'pick-track';
  render();
  if(SETTINGS.musicOn){
    document.body.addEventListener('click', function unlockOnce(){
      Sound.unlock(); Sound.startAmbient();
      document.body.removeEventListener('click', unlockOnce);
    }, {once:true});
  }
}
init();
</script>
</body>
</html>
